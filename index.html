<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f0a">
<title>Merle — Analyse Sonore</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap');
:root{--bg:#0a0f0a;--surf:#111a11;--bdr:#1e2e1e;--acc:#7ecf6e;--acc2:#f0c84a;--txt:#c8d8c0;--mut:#4a5e44}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;height:100%;overflow:hidden;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
header{padding:14px 20px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;color:var(--acc)}
header .sub-title{font-size:10px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase;flex:1}
.iz{position:relative;display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px dashed var(--bdr);border-radius:8px;cursor:pointer;flex-shrink:0;max-width:160px;overflow:hidden}
.iz.has{border-color:var(--acc);border-style:solid}
.iz input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.icn{width:16px;height:16px;flex-shrink:0;fill:none;stroke:var(--acc);stroke-width:1.8}
.lbl{font-size:10px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.tip{display:none;margin:6px 16px 0;font-size:10px;color:var(--mut);line-height:1.6;padding:10px 12px;background:var(--surf);border-radius:8px;border:1px solid var(--bdr)}
.tip strong{color:var(--acc2)}
.viz{flex:1;margin:8px 16px;position:relative;border-radius:10px;overflow:hidden;background:var(--surf);border:1px solid var(--bdr);min-height:0}
canvas{position:absolute;inset:0;width:100%;height:100%}
#pc{pointer-events:none}
.em{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mut);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.em svg{opacity:.3}
#ph{position:absolute;top:0;bottom:0;width:40px;transform:translateX(-50%);display:none;cursor:ew-resize;touch-action:none;z-index:10}
#ph::after{content:'';position:absolute;top:0;bottom:0;left:50%;width:1.5px;transform:translateX(-50%);background:rgba(255,255,255,.7);box-shadow:0 0 6px rgba(255,255,255,.4)}
.fl{position:absolute;left:4px;top:0;bottom:0;pointer-events:none}
.fl span{position:absolute;font-size:8px;color:rgba(200,216,192,.45);transform:translateY(-50%)}
.tl{position:absolute;bottom:4px;left:28px;right:8px;display:flex;justify-content:space-between;pointer-events:none}
.tl span{font-size:8px;color:rgba(200,216,192,.4)}
.ov{position:absolute;inset:0;background:rgba(10,15,10,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ov.on{display:flex}
.sp{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.ot{font-size:11px;color:var(--acc);letter-spacing:.1em;text-transform:uppercase}
.ob{width:150px;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
#ob{height:100%;width:0%;background:var(--acc);transition:width .12s}
.ctrl{flex-shrink:0;padding:0 16px 12px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:10px}
.rl{font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;min-width:40px;flex-shrink:0}
#pb{width:40px;height:40px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#rwb{width:30px;height:30px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#rwb:disabled{opacity:.3}#rwb svg{fill:var(--acc)}
#pb:disabled{opacity:.3}#pb svg{fill:var(--bg)}
.pw{flex:1;height:28px;position:relative;display:flex;align-items:center}
.pt{width:100%;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
#pf{height:100%;width:0%;background:var(--acc)}
.pw input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0}
#td{font-size:10px;color:var(--mut);white-space:nowrap;min-width:60px;text-align:right}
.sbs{display:flex;gap:5px;flex:1}
.sb,.mdb{flex:1;height:30px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px}
.sb{border-radius:14px;height:30px;flex:1;font-size:11px;color:var(--txt);padding:0 4px}
#modeSbs .mdb{flex:0 0 auto;width:34px;font-size:16px;padding:0}
.mdb:disabled{opacity:.35;cursor:default}
.fic{display:flex;align-items:center;gap:6px;flex:1}
.fic label{font-size:9px;color:var(--mut)}
.fic input{width:62px;height:28px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px;text-align:center;-webkit-appearance:none}
.fic input:focus{outline:none;border-color:var(--acc)}

.dot{width:8px;height:8px;border-radius:50%;background:rgb(255,80,80);flex-shrink:0}
#sel{position:absolute;top:0;bottom:0;background:rgba(126,207,110,.15);border-left:1.5px solid var(--acc);border-right:1.5px solid var(--acc);display:none;pointer-events:none}
#selrd{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--acc);background:rgba(10,15,10,.8);padding:3px 8px;border-radius:6px;display:none;pointer-events:none;white-space:nowrap}
.trsp-btn{width:30px;height:30px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--mut)}
.trsp-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(126,207,110,.08)}
.sb.on,.mdb.on{background:rgba(126,207,110,.15);border-color:var(--acc);color:var(--acc)}
#zoomBadge{position:absolute;top:6px;right:6px;display:none;align-items:center;gap:6px;background:rgba(240,200,74,.14);border:1px solid var(--acc2);border-radius:8px;padding:4px 6px;z-index:20}
#zoomBadge.on{display:flex}
#zoomTxt{font-size:10px;color:var(--acc2);white-space:nowrap}
#zoomExit{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--acc2);color:#0a0f0a;border:none;border-radius:50%;font-family:'DM Mono',monospace;font-size:12px;line-height:1;padding:0}
#panLeft,#panRight,#zoomOut{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(240,200,74,.15);border:1px solid var(--acc2);border-radius:6px;color:var(--acc2);font-size:13px;padding:0;cursor:pointer}
#panLeft:disabled,#panRight:disabled{opacity:.25;cursor:default}
.viz.zoomed{border-color:var(--acc2);box-shadow:inset 0 0 0 1px rgba(240,200,74,.4)}
.pl{width:36px;height:20px;background:var(--bdr);border-radius:10px;position:relative;border:none;flex-shrink:0;transition:background .2s}
.pl.on{background:rgba(240,200,74,.3)}
.pl::after{content:'';position:absolute;width:14px;height:14px;background:var(--mut);border-radius:50%;top:3px;left:3px;transition:transform .2s,background .2s}
.pl.on::after{transform:translateX(16px);background:var(--acc2)}
/* ── PIANO ───────────────────────────────────────────────────────────────── */
#pianoWrap{flex-shrink:0;padding:0 16px 10px;touch-action:none;user-select:none;-webkit-user-select:none}
#piano{position:relative;height:64px;width:100%;-webkit-touch-callout:none}
.pk{position:absolute;top:0;border-radius:0 0 4px 4px;cursor:pointer;transition:background .06s;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
.pk.w{background:#ffffff;border:1px solid #2a3e2a;z-index:1;height:100%}
.pk.b{background:#111;border:1px solid #0a0f0a;z-index:2;height:62%;top:0}
.pk.w.active{background:#a0a0a0}
.pk.b.active{background:#555}
.pk-lbl{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:7px;color:#666;pointer-events:none;font-family:'DM Mono',monospace;white-space:nowrap}
#hc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Merle</h1><span class="sub-title">analyse sonore</span>
    <div class="iz" id="iz">
      <svg class="icn" viewBox="0 0 32 32"><path d="M16 4v16M10 14l6 6 6-6M6 22v4a2 2 0 002 2h16a2 2 0 002-2v-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="lbl" id="ilbl">Importer</span>
      <input type="file" id="fi" accept="audio/*,video/*,.mov,.mp4,.m4a,.mp3,.wav,.aac">
    </div>
  </header>
  <audio id="iosAudio" playsinline preload="auto" style="display:none"></audio>
  <div class="tip" id="tip"></div>

  <div class="viz">
    <canvas id="sc"></canvas><canvas id="pc"></canvas><canvas id="hc"></canvas>
    <div id="sel"></div>
    <div id="ph"></div>
    <div class="fl" id="flbl"></div>
    <div class="tl" id="tlbl"></div>
    <div id="selrd"></div>
    <div id="zoomBadge">
      <button id="panLeft" aria-label="Décaler gauche">◀</button>
      <span id="zoomTxt"></span>
      <button id="panRight" aria-label="Décaler droite">▶</button>
      <button id="zoomOut" aria-label="Dézoomer">−</button>
      <button id="zoomExit" aria-label="Vue complète">✕</button>
    </div>
    <div class="em" id="em">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="20" cy="20" r="14"/><path d="M15 16c0-2.8 2.2-5 5-5s5 2.2 5 5v6" stroke-linecap="round"/><circle cx="20" cy="25" r="2" fill="currentColor"/>
      </svg><span>importer un fichier · glisser pour zoomer</span>
    </div>
    <div class="ov" id="ov"><div class="sp"></div><div class="ot" id="ot">Analyse…</div><div class="ob"><div id="ob"></div></div><button id="cancelBtn" style="display:none;margin-top:8px;padding:4px 14px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--mut);font-size:11px;cursor:pointer">Annuler</button></div>
  </div>


  <div class="ctrl">
    <div class="row">
      <button id="rwb" disabled><svg width="14" height="14" viewBox="0 0 14 14" fill="var(--bg)"><polygon points="1,7 7,1 7,13"/><rect x="7" y="1" width="2" height="12"/><rect x="0" y="1" width="2" height="12"/></svg></button>
      <button id="pb" disabled><svg id="pi" width="16" height="16" viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg></button>
      <div class="pw"><div class="pt"><div id="pf"></div></div><input type="range" id="pr" min="0" max="1000" value="0"></div>
      <div id="td">0:00 / 0:00</div>
      <button id="loopBtn" class="trsp-btn on" title="Boucle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="10,1 13,4 10,7"/>
          <path d="M1,4 Q1,1 4,1 L13,1"/>
          <polyline points="4,13 1,10 4,7"/>
          <path d="M13,10 Q13,13 10,13 L1,13"/>
        </svg>
      </button>
      <button id="settingsBtn" class="trsp-btn" title="Réglages">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="7" cy="7" r="2"/><line x1="7" y1="1" x2="7" y2="3"/><line x1="7" y1="11" x2="7" y2="13"/><line x1="1" y1="7" x2="3" y2="7"/><line x1="11" y1="7" x2="13" y2="7"/><line x1="2.9" y1="2.9" x2="4.3" y2="4.3"/><line x1="9.7" y1="9.7" x2="11.1" y2="11.1"/><line x1="11.1" y1="2.9" x2="9.7" y2="4.3"/><line x1="4.3" y1="9.7" x2="2.9" y2="11.1"/>
        </svg>
      </button>
    </div>
    <div class="row" style="gap:8px">
      <div class="sbs" id="modeSbs" style="flex:0 0 auto;gap:4px">
        <button class="mdb" id="modeOiseau" title="Oiseau">🐦</button>
        <button class="mdb" id="modeVoix" title="Voix">🎤</button>
        <button class="mdb" id="modeMusique" title="Musique">🎵</button>
      </div>
      <div class="sbs" style="justify-content:flex-end;gap:4px;flex:1">
        <button class="sb" data-s="0.25">x0.25</button>
        <button class="sb" data-s="0.5">x0.5</button>
        <button class="sb" data-s="0.75">x0.75</button>
        <button class="sb on" data-s="1">x1</button>
      </div>
    </div>
    <div id="settingsPanel" style="display:none;flex-direction:column;gap:10px">
      <div class="row">
        <div class="rl">Rendu</div>
        <div class="sbs" id="algoSbs">
          <button class="mdb on" id="algoWsolaOiseau">WSOLA 🐦</button>
          <button class="mdb" id="algoWsolaVoix">WSOLA 🎤</button>
          <button class="mdb" id="algoWsolaMusique">WSOLA 🎵</button>
          <button class="mdb" id="algoPV">Phase vocoder</button>
        </div>
      </div>
      <div class="row" id="rowAxis">
        <div class="rl">Axe Y</div>
        <div class="fic">
          <label>min</label><input type="number" id="ymin" value="80"  min="20"  max="10000" step="10" onfocus="this.select()">
          <span style="color:var(--mut)">–</span>
          <label>max</label><input type="number" id="ymax" value="8000" min="100" max="20000" step="100" onfocus="this.select()">
          <span style="color:var(--mut);font-size:9px">Hz</span>
          <button id="scaleToggle" title="Basculer linéaire/logarithmique" style="flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-size:9px;cursor:pointer">Lin</button>
        </div>
      </div>
      <div class="row" id="rowPitch">
        <div class="rl">Pitch</div>
        <div class="fic">
          <label>min</label><input type="number" id="pmin" value="1000" min="100" max="10000" step="100" onfocus="this.select()">
          <span style="color:var(--mut)">–</span>
          <label>max</label><input type="number" id="pmax" value="8000" min="100" max="12000" step="100" onfocus="this.select()">
          <span style="color:var(--mut);font-size:9px">Hz</span>
          <button id="pitchToggle" title="Basculer mono/multi" style="flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-size:9px;cursor:pointer">Mono</button>
        </div>
      </div>
      <div class="row">
        <div class="rl">Courbe</div><div class="dot"></div>
        <button class="pl on" id="ptg"></button>
        <div class="rl" style="min-width:0;margin-left:14px">Notes</div>
        <button class="pl on" id="ntg"></button>
      </div>
    </div>
  </div>
  <div id="pianoWrap" style="display:none"><div id="piano"></div></div>

<script>
const FFTN = 4096, NCOLS = 600;
let MFREQ = 8000;  // fréquence max du spectrogramme — change selon le mode

let actx, abuf, src, dur=0, speed=1, offset=0, t0=0;

// L'AudioContext est créé à la demande dans playPianoNote ou load()

let playing=false, showP=true, showNotes=true, busy=0, drawn=false, raf;
let currentPlayPos=0;  // position réelle mise à jour à chaque frame par loop()
let curve=[], spec=null;
let curveFull=[];  // courbe de pitch haute résolution sur tout le fichier
// Fenêtre visible (zoom) en secondes + mode boucle + sélection en cours
let viewStart=0, viewEnd=0, looping=true;
let selX0=null, selX1=null, selecting=false, draggingPH=false, draggingPHWasPlaying=false;
let sliding=false, slideStartX=0, slideStartVS=0, slideStartVE=0, slideTimer=null;
let slideCurveSnapshot=[], slideVSSnapshot=0, slideVESnapshot=0, slideMinLen=1;
let stopTimer=null;

const $ = id => document.getElementById(id);
const iz=$('iz'), ilbl=$('ilbl'), tip=$('tip'), sc=$('sc'), pc=$('pc'), ph=$('ph');
const flbl=$('flbl'), tlbl=$('tlbl'), em=$('em'), ov=$('ov'), ot=$('ot'), ob=$('ob'), cancelBtn=$('cancelBtn');
const pb=$('pb'), rwb=$('rwb'), pi=$('pi'), pf=$('pf'), pr=$('pr'), td=$('td'), ptg=$('ptg'), ntg=$('ntg');
const pmin=$('pmin'), pmax=$('pmax');
const ymin=$('ymin'), ymax=$('ymax');
const sel=$('sel'), selrd=$('selrd'), loopBtn=$('loopBtn');
const zoomBadge=$('zoomBadge'), zoomTxt=$('zoomTxt'), zoomExit=$('zoomExit');
const iosAudio=$('iosAudio');

// ── IMPORT ────────────────────────────────────────────────────────────────
$('fi').addEventListener('change', e => { const f=e.target.files[0]; if(f) load(f); });

async function load(source){
  // source = File (import manuel) ou ArrayBuffer (depuis hash URL)
  const job = ++busy;
  tip.style.display='none';
  setOv(true,'Décodage…',5);
  stopAll();

  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();

  let bytes, name;
  if(source instanceof File){
    name = source.name;
    try { bytes = await source.arrayBuffer(); }
    catch(e){ if(job!==busy)return; setOv(false); return fail(source); }
  } else {
    // ArrayBuffer passé directement (chemin URL hash)
    bytes = source;
    name = 'enregistrement.m4a';
  }
  if(job!==busy) return;

  setOv(true,'Décodage audio…',15);
  try {
    abuf = await actx.decodeAudioData(bytes.slice(0));
  } catch(e){
    if(job!==busy)return; setOv(false);
    if(source instanceof File) fail(source);
    return;
  }
  if(job!==busy) return;

  dur = abuf.duration;
  viewStart = 0; viewEnd = dur; offset = 0;
  clearStretchCache();
  specFull = null;  // libérer l'ancien spectrogramme basse résolution
  // Arrêter l'oscillateur piano s'il tourne encore
  if(typeof pianoOsc !== 'undefined' && pianoOsc){
    try{ pianoOsc.stop(); pianoOsc.disconnect(); }catch(e){}
    pianoOsc = null;
  }
  setZoomBadge(false);

  ilbl.textContent = name;
  iz.classList.add('has');
  document.getElementById('pianoWrap').style.display = 'block';
  document.querySelectorAll('#modeSbs .mdb').forEach(b=>b.disabled=false);
  const sb=$('settingsBtn'); sb.disabled=false; sb.style.opacity='';
  em.style.display='none';
  pb.disabled=false; rwb.disabled=false;

  // Calculer le spectrogramme basse résolution de façon asynchrone (ne bloque pas)
  // autoDetectMode sera appelé à la fin de computeSpecFull quand specFull est prêt
  computeSpecFull().catch(e=>console.warn('specFull:', e));

  await analyze(job);
}

// ── CHARGEMENT AUTOMATIQUE DEPUIS L'URL (#data=base64) ───────────────────
async function loadFromGithub(){
  setOv(true,'Chargement…',5);
  const fname = 'input.m4a';
  try {
    const resp = await fetch(
      'https://api.github.com/repos/nico-laposte/spectrogram/contents/'+fname,
      { headers: { 'Accept': 'application/vnd.github.v3.raw' } }
    );
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const bytes = await resp.arrayBuffer();
    await load(bytes);
    // Afficher le nom du fichier GitHub dans le bouton d'import
    ilbl.textContent = fname;
    iz.classList.add('has');
  } catch(e){
    setOv(false);
    console.warn('loadFromGithub:', e.message);
  }
}
window.addEventListener('load', ()=>{
  if(location.search.includes('auto') || location.href.includes('auto')) loadFromGithub();
});

function fail(file){
  iz.classList.remove('has');
  tip.style.display='block';
  const ext=(file.name||'').split('.').pop().toLowerCase();
  if(['mov','mp4','m4v'].includes(ext))
    tip.innerHTML='<strong>Vidéo non décodable par Safari.</strong> '
      +'Les vidéos iPhone sont souvent filmées en <strong>HEVC / H.265</strong>, un format que Safari ne sait pas décoder dans une page web. Il faut un fichier audio (ou une vidéo <strong>H.264 / AAC</strong>).<br><br>'
      +'<strong>Extraire l\'audio avec l\'app Raccourcis :</strong><br>'
      +'① Ouvrez l\'app <strong>Raccourcis</strong> → <strong>+</strong> pour un nouveau raccourci<br>'
      +'② Ajoutez l\'action <strong>Encoder le média</strong> → activez <strong>Audio uniquement</strong><br>'
      +'③ Ajoutez l\'action <strong>Enregistrer dans des fichiers</strong><br>'
      +'④ Lancez le raccourci, choisissez votre vidéo → vous obtenez un <strong>.m4a</strong> à importer ici<br><br>'
      +'<strong>Pour vos prochains enregistrements :</strong> Réglages → Appareil photo → Formats → <strong>Le plus compatible</strong> (filme en H.264/AAC), ou utilisez l\'app <strong>Dictaphone</strong> qui produit directement des fichiers .m4a importables.';
  else
    tip.innerHTML='<strong>Format non reconnu (.'+ext+').</strong> Essayez .mp3, .m4a ou .wav.';
}

// ── ANALYSE ───────────────────────────────────────────────────────────────
async function analyze(job){
  drawn=false;
  setOv(true,'Analyse…',30);
  await tick(30);

  const W = sc.parentElement.clientWidth||320;
  const H = sc.parentElement.clientHeight||200;
  sc.width=W; sc.height=H; pc.width=W; pc.height=H;

  const sr   = abuf.sampleRate;
  const data = monoMix(abuf);
  const total= data.length;
  const bins = FFTN/2;
  const maxBin = Math.min(bins-1, Math.floor(MFREQ/(sr/2)*bins));
  const cols = Math.min(NCOLS, W*2);
  const win  = hann(FFTN);
  const out  = new Float32Array(cols*maxBin);
  let gMax=0;

  // Fenêtre visible en échantillons
  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(FFTN+1, ve - vs);   // au moins une fenêtre FFT

  const STEP=12;
  for(let ci=0; ci<cols; ci+=STEP){
    if(job!==busy) return setOv(false);
    const end=Math.min(ci+STEP,cols);
    for(let c=ci;c<end;c++){
      const start=vs + Math.floor(c/cols*(span-FFTN));
      const m=fftMag(data,start,FFTN,win,maxBin);
      const off=c*maxBin;
      for(let b=0;b<maxBin;b++){ out[off+b]=m[b]; if(m[b]>gMax)gMax=m[b]; }
    }
    setOv(true,'Analyse…', 30+Math.round(ci/cols*65));
    await new Promise(r=>requestAnimationFrame(r));
  }
  if(job!==busy) return setOv(false);

  spec={out,cols,maxBin,gMax};
  try{
    drawSpec(W,H);
    if(multiPitch || pitchAlgo==='multi'){ makeCurveMusic(); drawCurveMusic(H); }
    else if(pitchAlgo==='amdf'){ makeCurveAMDF(); drawCurve(H); }
    else if(pitchAlgo==='yin'){  makeCurveYIN();  drawCurve(H); }
    else { makeCurve(); drawCurve(H); }
    freqLabels();
    timeLabels();
  }catch(err){ console.error('draw error:', err); }
  drawn=true;
  if(!playing){
    ph.style.display='block';
    drawPlayhead(offset);
  }
  setOv(false);
  if(typeof drawHighlight==='function') drawHighlight();
}

function monoMix(buf){
  if(buf.numberOfChannels===1) return buf.getChannelData(0);
  const a=buf.getChannelData(0), b=buf.getChannelData(1), o=new Float32Array(a.length);
  for(let i=0;i<a.length;i++) o[i]=(a[i]+b[i])*0.5;
  return o;
}

// FFT magnitude, returns first maxBin bins
function fftMag(data,start,N,win,maxBin){
  const re=new Float32Array(N), im=new Float32Array(N);
  for(let i=0;i<N;i++) re[i]=(data[start+i]||0)*win[i];
  for(let i=1,j=0;i<N;i++){let bit=N>>1;for(;j&bit;bit>>=1)j^=bit;j^=bit;if(i<j){const t=re[i];re[i]=re[j];re[j]=t;}}
  for(let len=2;len<=N;len<<=1){
    const ang=-2*Math.PI/len, wR=Math.cos(ang), wI=Math.sin(ang);
    for(let i=0;i<N;i+=len){
      let cR=1,cI=0;
      for(let k=0;k<len>>1;k++){
        const h=i+k+(len>>1), vR=re[h]*cR-im[h]*cI, vI=re[h]*cI+im[h]*cR;
        re[h]=re[i+k]-vR; im[h]=im[i+k]-vI; re[i+k]+=vR; im[i+k]+=vI;
        const nR=cR*wR-cI*wI; cI=cR*wI+cI*wR; cR=nR;
      }
    }
  }
  const mag=new Float32Array(maxBin);
  for(let i=0;i<maxBin;i++) mag[i]=Math.sqrt(re[i]*re[i]+im[i]*im[i]);
  return mag;
}

function hann(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=0.5*(1-Math.cos(2*Math.PI*i/(N-1)));return w;}

// ── DRAW ──────────────────────────────────────────────────────────────────
// Conversion Hz ↔ position Y selon l'échelle (linéaire ou log)
let FMIN_LOG = 80;   // borne basse de l'échelle log (Hz) — dynamique en mode musique
function hzToY(hz, H){ 
  if(!logScale) return (1 - hz/MFREQ) * H;
  const lo=Math.log2(FMIN_LOG), hi=Math.log2(MFREQ);
  return (1 - (Math.log2(Math.max(hz,FMIN_LOG)) - lo) / (hi - lo)) * H;
}
function yToHz(y, H){
  if(!logScale) return (1 - y/H) * MFREQ;
  const lo=Math.log2(FMIN_LOG), hi=Math.log2(MFREQ);
  return Math.pow(2, lo + (1 - y/H) * (hi - lo));
}

function drawSpec(W,H){
  const {out,cols,maxBin,gMax}=spec;
  const ctx=sc.getContext('2d'), img=ctx.createImageData(W,H), px=img.data;
  for(let x=0;x<W;x++){
    const ci=Math.min(Math.floor(x/W*cols),cols-1), off=ci*maxBin;
    for(let y=0;y<H;y++){
      const hz = yToHz(y, H);
      const binF = hz/MFREQ*maxBin;          // bin flottant
      const b0 = Math.floor(binF);
      const b1 = Math.min(b0+1, maxBin-1);
      const t  = binF - b0;                  // fraction pour interpolation
      const val = (out[off+b0]||0)*(1-t) + (out[off+b1]||0)*t;
      const [r,g,b]=color(val/(gMax||1));
      const i=(y*W+x)*4; px[i]=r;px[i+1]=g;px[i+2]=b;px[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

let pitchAlgo = 'peak'; // 'peak' | 'amdf' | 'yin' | 'multi'

// ── AMDF : Average Magnitude Difference Function ──────────────────────────
// Détecte la période fondamentale en cherchant le minimum de la différence
// moyenne entre le signal et sa version décalée. Plus robuste que le peak-
// picking contre les sauts d'octave.
function makeCurveAMDF(){
  const {cols} = spec;
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const total = data.length;
  const p1 = parseInt(pmin.value)||80, p2 = parseInt(pmax.value)||8000;
  // Bornes de période en samples (inverses des fréquences)
  const lagMin = Math.floor(sr / p2);
  const lagMax = Math.ceil(sr / p1);
  const frameSize = lagMax * 2;  // fenêtre temporelle = 2× période max
  const vs = Math.floor(viewStart * abuf.duration > 0 ? viewStart * sr : 0);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(frameSize + 1, ve - vs);
  const gMaxRef = (specFull && specFull.gMaxHi) ? specFull.gMaxHi : spec.gMax;

  curve = [];
  for(let c = 0; c < cols; c++){
    const pos = vs + Math.floor(c / cols * (span - frameSize));
    // Calculer l'énergie RMS pour le seuil de silence
    let rms = 0;
    for(let i = 0; i < frameSize; i++){
      const s = data[pos+i]||0; rms += s*s;
    }
    rms = Math.sqrt(rms / frameSize);
    if(rms < 0.01){ curve.push(null); continue; }

    // Calculer l'AMDF pour chaque lag
    let bestLag = -1, bestVal = Infinity;
    for(let lag = lagMin; lag <= lagMax; lag++){
      let sum = 0;
      const n = frameSize - lag;
      for(let i = 0; i < n; i++) sum += Math.abs((data[pos+i]||0) - (data[pos+i+lag]||0));
      const amdf = sum / n;
      if(amdf < bestVal){ bestVal = amdf; bestLag = lag; }
    }
    const hz = bestLag > 0 ? sr / bestLag : 0;
    curve.push(hz > 0 ? {t: c/cols, hz} : null);
  }
}

// ── YIN : algorithme de détection de pitch robuste ────────────────────────
// Basé sur la fonction de différence normalisée (d'après de Cheveigné & Kawahara 2002).
// Résistant aux sauts d'octave grâce à la normalisation cumulative.
function makeCurveYIN(){
  const {cols} = spec;
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const total = data.length;
  const p1 = parseInt(pmin.value)||80, p2 = parseInt(pmax.value)||8000;
  const lagMin = Math.floor(sr / p2);
  const lagMax = Math.ceil(sr / p1);
  const frameSize = lagMax * 2;
  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(frameSize + 1, ve - vs);
  const threshold = 0.15;  // seuil YIN standard

  curve = [];
  for(let c = 0; c < cols; c++){
    const pos = vs + Math.floor(c / cols * (span - frameSize));

    // Seuil de silence
    let rms = 0;
    for(let i = 0; i < frameSize; i++){ const s=data[pos+i]||0; rms+=s*s; }
    rms = Math.sqrt(rms / frameSize);
    if(rms < 0.01){ curve.push(null); continue; }

    // Étape 1 : fonction de différence d²(τ)
    const d = new Float32Array(lagMax + 1);
    for(let lag = 0; lag <= lagMax; lag++){
      let sum = 0;
      const n = frameSize - lag;
      for(let i = 0; i < n; i++){
        const diff = (data[pos+i]||0) - (data[pos+i+lag]||0);
        sum += diff * diff;
      }
      d[lag] = sum;
    }

    // Étape 2 : normalisation cumulative d'(τ)
    const dn = new Float32Array(lagMax + 1);
    dn[0] = 1;
    let runSum = 0;
    for(let lag = 1; lag <= lagMax; lag++){
      runSum += d[lag];
      dn[lag] = runSum > 0 ? d[lag] * lag / runSum : 1;
    }

    // Étape 3 : chercher le premier minimum sous le seuil
    let bestLag = -1;
    for(let lag = lagMin; lag <= lagMax - 1; lag++){
      if(dn[lag] < threshold && dn[lag] < dn[lag+1]){
        bestLag = lag; break;
      }
    }
    // Si aucun minimum sous le seuil, prendre le minimum absolu
    if(bestLag < 0){
      let minVal = Infinity;
      for(let lag = lagMin; lag <= lagMax; lag++){
        if(dn[lag] < minVal){ minVal = dn[lag]; bestLag = lag; }
      }
      if(minVal > 0.5){ curve.push(null); continue; }  // pas assez périodique
    }

    // Étape 4 : interpolation parabolique pour précision sub-sample
    if(bestLag > lagMin && bestLag < lagMax){
      const a=dn[bestLag-1], b=dn[bestLag], c2=dn[bestLag+1];
      const denom = 2*(2*b - a - c2);
      if(Math.abs(denom) > 1e-6) bestLag += (a - c2) / denom;
    }

    const hz = bestLag > 0 ? sr / bestLag : 0;
    curve.push(hz > 0 ? {t: c/cols, hz} : null);
  }
}

function makeCurve(){
  const {out,cols,maxBin}=spec;
  // Utiliser le gMax global (specFull) comme référence stable — évite que le seuil
  // change selon la région affichée (sinon plus de points apparaissent sur les régions calmes)
  const gMaxRef = (specFull && specFull.gMaxHi) ? specFull.gMaxHi : spec.gMax;
  const p1=parseInt(pmin.value)||1000, p2=parseInt(pmax.value)||8000;
  const b1=Math.floor(p1/MFREQ*maxBin), b2=Math.ceil(p2/MFREQ*maxBin);
  curve=[];
  for(let c=0;c<cols;c++){
    const off=c*maxBin; let mv=0,pk=-1;
    for(let b=b1;b<=Math.min(b2,maxBin-1);b++){if(out[off+b]>mv){mv=out[off+b];pk=b;}}
    curve.push(pk>=0&&mv>gMaxRef*0.04 ? {t:c/cols,hz:pk/maxBin*MFREQ} : null);
  }
}

// Convertit une fréquence en nom de note anglais + octave (ex: 440 -> "A4")
// ── MODE MUSIQUE : courbe multi-voix avec suppression des harmoniques ────────
let curveMusic = [];  // tableau de tableaux : curveMusic[col] = [{hz, midi}, ...]

function makeCurveMusic(){
  // Utiliser FFTN=4096 pour une meilleure résolution dans les graves
  // (bin = sr/4096 ≈ 10.8Hz à 44100Hz, suffisant pour distinguer C3/C#3)
  const FFTN_M = 8192;
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const total = data.length;
  const win = hann(FFTN_M);
  const bins = FFTN_M / 2;
  const maxBinM = Math.min(bins - 1, Math.floor(MFREQ / (sr/2) * bins));

  const {cols} = spec;
  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(FFTN_M + 1, ve - vs);

  const MAX_VOICES = 6;
  const HARM_TOL   = 0.015;
  const gMaxRef = (specFull && specFull.gMaxHi) ? specFull.gMaxHi : spec.gMax;
  const THRESH  = gMaxRef * 0.02;
  const b1 = Math.floor(80   / MFREQ * maxBinM);
  const b2 = Math.ceil(4200  / MFREQ * maxBinM);

  curveMusic = [];
  for(let c = 0; c < cols; c++){
    const start = vs + Math.floor(c / cols * (span - FFTN_M));
    const mag = fftMag(data, start, FFTN_M, win, maxBinM);

    // 1) Trouver tous les pics locaux avec interpolation de Quinn (optimisée Hann)
    const peaks = [];
    for(let b = b1+1; b < Math.min(b2, maxBinM-1); b++){
      const v = mag[b];
      if(v > THRESH && v > mag[b-1] && v > mag[b+1]){
        // Interpolation de Quinn : correction sub-bin bornée à ±0.5
        // Plus précise que la parabole simple pour les fenêtres de Hann
        const alpha = mag[b-1] / v;
        const beta  = mag[b+1] / v;
        // Formule de Quinn (approximation 1er ordre)
        let offset = 0.5 * (beta - alpha) / (1 + alpha + beta);
        // Borner l'offset pour éviter les valeurs aberrantes
        offset = Math.max(-0.5, Math.min(0.5, offset));
        const bFine = b + offset;
        const hz = bFine / bins * (sr / 2);
        peaks.push({b, hz, v});
      }
    }
    peaks.sort((a,b) => b.v - a.v);

    // 2) Supprimer les harmoniques
    const fundamentals = [];
    for(const p of peaks){
      let isHarmonic = false;
      for(const f of fundamentals){
        const ratio = p.hz / f.hz;
        const nearest = Math.round(ratio);
        if(nearest >= 2 && nearest <= 8 && Math.abs(ratio - nearest) / nearest < HARM_TOL){
          isHarmonic = true; break;
        }
      }
      if(!isHarmonic){
        const n = hzToNote(p.hz);
        if(n) fundamentals.push({hz: p.hz, midi: n.midi, label: n.label});
        if(fundamentals.length >= MAX_VOICES) break;
      }
    }
    curveMusic.push({t: c/cols, notes: fundamentals});
  }
}

function drawCurveMusic(H){
  const ctx=pc.getContext('2d'), W=pc.width;
  ctx.clearRect(0,0,W,H);
  if(!curveMusic.length) return;
  const yOf=hz=>hzToY(hz,H);

  // Points de la courbe — respecte showP
  if(showP){
    ctx.fillStyle='rgba(255,80,80,.95)';
    for(const frame of curveMusic){
      const x=frame.t*W;
      for(const n of frame.notes){
        const y=yOf(n.hz);
        ctx.beginPath(); ctx.arc(x,y,1.8,0,6.283); ctx.fill();
      }
    }
  }

  // Étiquettes des notes tenues — respecte showNotes indépendamment
  if(showNotes) labelHeldNotesMusic(ctx,W,H,yOf);
}

function labelHeldNotesMusic(ctx,W,H,yOf){
  const MIN_LEN=5;
  ctx.font='600 9px "DM Mono",monospace';
  ctx.textBaseline='top';
  ctx.textAlign='center';

  // Pour chaque voix MIDI, trouver les segments tenus
  // Regrouper par midi sur des fenêtres glissantes
  const midiMap={};  // midi → [{t, hz}]
  for(const frame of curveMusic){
    const seen=new Set();
    for(const n of frame.notes){
      seen.add(n.midi);
      if(!midiMap[n.midi]) midiMap[n.midi]=[];
      midiMap[n.midi].push({t:frame.t, hz:n.hz, label:n.label});
    }
  }

  const placed=[];
  for(const midi of Object.keys(midiMap)){
    const pts=midiMap[midi];
    let i=0;
    while(i<pts.length){
      // Grouper les points consécutifs (tolérance de 2 trames)
      let j=i+1;
      while(j<pts.length && pts[j].t-pts[j-1].t < 3/curveMusic.length) j++;
      const cnt=j-i;
      if(cnt>=MIN_LEN){
        const midT=(pts[i].t+pts[j-1].t)/2;
        const avgHz=pts.slice(i,j).reduce((s,p)=>s+p.hz,0)/cnt;
        const x=midT*W, baseY=yOf(avgHz)-16;
        const w=ctx.measureText(pts[i].label).width;
        let y=baseY;
        // Anti-collision : vérifier tous les labels déjà placés
        let changed=true;
        while(changed){
          changed=false;
          for(const p of placed){
            if(Math.abs(p.x-x)<w+6 && Math.abs(p.y-y)<12){ y-=13; changed=true; break; }
          }
        }
        if(y<2) y=yOf(avgHz)+5;
        placed.push({x,y});
        ctx.fillStyle='rgba(10,15,10,.55)';
        ctx.fillRect(x-w/2-2,y,w+4,11);
        ctx.fillStyle='rgba(255,225,140,.95)';
        ctx.fillText(pts[i].label,x,y+1);
      }
      i=j;
    }
  }
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,80,80,.95)';
}

function hzToNote(hz){
  if(!hz||hz<=0) return null;
  const names=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const midi=Math.round(69 + 12*Math.log2(hz/440));
  const name=names[((midi%12)+12)%12];
  const oct=Math.floor(midi/12)-1;
  return {label:name+oct, midi, cents:Math.round(100*(69+12*Math.log2(hz/440)-midi))};
}

function drawCurve(H){
  const ctx=pc.getContext('2d'), W=pc.width; H=H||pc.height;
  ctx.clearRect(0,0,W,H);
  if(!curve.length) return;
  const yOf=hz=>hzToY(hz,H);

  if(showP){
    const p1=parseInt(pmin.value)||1000, p2=parseInt(pmax.value)||8000;
    // Bande de plage pitch (discrète)
    const y1=(1-p2/MFREQ)*H, y2=(1-p1/MFREQ)*H;
    ctx.fillStyle='rgba(240,200,74,.04)'; ctx.fillRect(0,y1,W,y2-y1);
    ctx.strokeStyle='rgba(240,200,74,.15)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    [y1,y2].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});
    ctx.setLineDash([]);
    // Points de pitch façon Praat
    ctx.fillStyle='rgba(255,80,80,.95)';
    for(const p of curve){
      if(!p) continue;
      const x=p.t*W, y=yOf(p.hz);
      ctx.beginPath(); ctx.arc(x,y,1.6,0,6.283); ctx.fill();
    }
  }

  // Étiquettes de notes (indépendantes de l'affichage de la courbe)
  if(showNotes) labelHeldNotes(ctx,W,H,yOf);
}

// Détecte les plateaux de hauteur stables et y pose une étiquette de note,
// en évitant les superpositions (espacement minimal en pixels).
function labelHeldNotes(ctx,W,H,yOf){
  const MIN_LEN = window._overrideMinLen !== undefined ? window._overrideMinLen : 5;
  ctx.font='600 9px "DM Mono", monospace';
  ctx.textBaseline='middle';
  ctx.textAlign='center';

  // 1) collecter les segments tenus candidats
  const labels=[];
  let i=0;
  while(i<curve.length){
    if(!curve[i]){ i++; continue; }
    const n0=hzToNote(curve[i].hz);
    let j=i+1, sumHz=curve[i].hz, cnt=1;
    while(j<curve.length && curve[j]){
      const nj=hzToNote(curve[j].hz);
      if(!nj || nj.midi!==n0.midi) break;
      sumHz+=curve[j].hz; cnt++; j++;
    }
    if(cnt>=MIN_LEN){
      const midT=(curve[i].t+curve[j-1].t)/2;
      const avgHz=sumHz/cnt;
      labels.push({x:midT*W, y:yOf(avgHz), lab:hzToNote(avgHz).label});
    }
    i=j;
  }

  if(!labels.length) return;

  // 2) chaque étiquette est posée juste AU-DESSUS de son point sur la courbe
  ctx.textBaseline='top';
  for(const L of labels){
    const w=ctx.measureText(L.lab).width;
    let y=L.y-28;                      // au-dessus du point de la courbe
    if(y < 0) y=L.y+5;                 // si trop haut, repasser en dessous
    ctx.fillStyle='rgba(10,15,10,.55)';
    ctx.fillRect(L.x-w/2-2, y, w+4, 11);
    ctx.fillStyle='rgba(255,225,140,.95)';
    ctx.fillText(L.lab, L.x, y+1);
  }
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,80,80,.95)';
}

function freqLabels(){
  flbl.innerHTML='';
  const H = sc.height || 300;
  const marks = stretchMode==='voix'
    ? [6000,4000,2000,1000,500,250,125]
    : [10000,8000,6000,4000,2000,1000,500];
  marks.forEach(hz=>{
    if(hz>MFREQ||hz<FMIN_LOG) return;
    const s=document.createElement('span');
    s.textContent=hz>=1000?hz/1000+'k':hz;
    s.style.top=(hzToY(hz,H)/H*100)+'%';
    flbl.appendChild(s);
  });
}
function timeLabels(){
  tlbl.innerHTML='';
  for(let i=0;i<=5;i++){const s=document.createElement('span');s.textContent=fmt(viewStart+i/5*(viewEnd-viewStart));tlbl.appendChild(s);}
}

function color(t){
  t=Math.pow(Math.max(0,Math.min(1,t)),.35);
  const s=[[0,[10,15,10]],[.15,[10,40,30]],[.35,[20,80,60]],[.55,[60,150,80]],[.72,[140,210,60]],[.88,[230,220,40]],[1,[255,240,180]]];
  for(let i=1;i<s.length;i++){if(t<=s[i][0]){const lo=s[i-1][1],hi=s[i][1],f=(t-s[i-1][0])/(s[i][0]-s[i-1][0]);return[lo[0]+f*(hi[0]-lo[0]),lo[1]+f*(hi[1]-lo[1]),lo[2]+f*(hi[2]-lo[2])].map(Math.round);}}
  return[255,240,180];
}

// ── PLAYBACK ──────────────────────────────────────────────────────────────
// ── TIME-STRETCH (OLA, hauteur préservée) ───────────────────────────────────
// Cache des buffers ralentis par vitesse. ×1 = abuf direct (pas de traitement).
let stretchCache = {};        // { "0.5": AudioBuffer, ... }
let specFull = null;          // spectrogramme basse résolution du fichier entier
let playBuf = null;           // buffer actuellement joué (abuf ou version étirée)
let stretchMode = 'oiseau';   // 'oiseau' | 'voix' | 'musique'
let logScale  = false;        // true = axe Y logarithmique
let multiPitch = false;       // true = détection multi-notes (mode musique)
let stretchAlgo = 'wsola-oiseau';  // 'wsola-oiseau' | 'wsola-musique' | 'pv'


// Calcule un spectrogramme basse résolution du fichier entier.
// Utilisé pour le rendu en temps réel pendant le glissement.
// Dessine le spectrogramme basse résolution pour la fenêtre [vs, ve]
// Utilisé pendant le glissement pour un rendu temps réel sans recalcul FFT
// Dessine la courbe haute résolution sauvegardée, décalée selon la nouvelle fenêtre
function drawCurveFromFull(vs, ve){
  const ctx=pc.getContext('2d'), W=pc.width, H=pc.height;
  ctx.clearRect(0,0,W,H);
  if(!showP) return;
  const winLen = ve - vs;
  const snapLen = slideVESnapshot - slideVSSnapshot;
  if(winLen<=0 || snapLen<=0) return;
  const yOf=hz=>hzToY(hz,H);

  if(multiPitch || pitchAlgo==='multi'){
    ctx.fillStyle='rgba(255,80,80,.9)';
    const visible = [];
    for(const frame of curveMusic){
      const tAbs = slideVSSnapshot + frame.t * snapLen;
      if(tAbs < vs || tAbs > ve) continue;
      const x = (tAbs - vs) / winLen * W;
      for(const n of frame.notes){
        const y = yOf(n.hz);
        ctx.beginPath(); ctx.arc(x,y,1.8,0,6.283); ctx.fill();
      }
      visible.push({t:(tAbs-vs)/winLen, notes:frame.notes});
    }
    if(showNotes && visible.length >= 2){
      const savedCM = curveMusic;
      curveMusic = visible;
      try{ labelHeldNotesMusic(ctx,W,H,yOf); }catch(e){}
      curveMusic = savedCM;
    }
    ctx.fillStyle='rgba(255,80,80,.9)';
    return;
  }

  // Mode oiseau / voix — courbe mono-voix depuis snapshot
  // La courbe snapshot couvre [slideVSSnapshot, slideVESnapshot] en proportion t∈[0,1]
  // On la remonte en temps absolu, puis on la projette sur la nouvelle fenêtre [vs, ve]
  ctx.fillStyle='rgba(255,80,80,.9)';
  const visible=[];
  for(const p of slideCurveSnapshot){
    if(!p) continue;
    const tAbs = slideVSSnapshot + p.t * snapLen;
    if(tAbs < vs || tAbs > ve) continue;
    const x = (tAbs - vs) / winLen * W;
    const y = yOf(p.hz);
    ctx.beginPath(); ctx.arc(x,y,1.6,0,6.283); ctx.fill();
    visible.push({t:(tAbs-vs)/winLen, hz:p.hz});
  }
  if(showNotes && visible.length >= 2){
    const savedCurve = curve;
    curve = visible;
    const savedML = window._overrideMinLen;
    window._overrideMinLen = slideMinLen;
    try { labelHeldNotes(ctx, W, H, yOf); } catch(e){}
    curve = savedCurve;
    window._overrideMinLen = savedML;
  }
  ctx.fillStyle='rgba(255,80,80,.9)';
}

function drawSpecFromFull(vs, ve){
  if(!specFull) return;
  const {out, cols, maxBin, gMax, dur:totalDur} = specFull;
  const W=sc.width, H=sc.height;
  const ctx=sc.getContext('2d');
  const img=ctx.createImageData(W,H), px=img.data;
  // specFull.maxBin couvre jusqu'à Nyquist — utiliser sr/2 pour le mapping
  const nyquist = abuf.sampleRate / 2;
  for(let x=0; x<W; x++){
    const t = vs + (x/W) * (ve-vs);
    const ci = Math.min(Math.floor(t/totalDur * cols), cols-1);
    const off = ci * maxBin;
    for(let y=0; y<H; y++){
      const hz = yToHz(y, H);
      const binF = hz/nyquist*maxBin;
      const b0 = Math.min(Math.floor(binF), maxBin-1);
      const b1 = Math.min(b0+1, maxBin-1);
      const tf  = binF - b0;
      const val = (out[off+b0]||0)*(1-tf) + (out[off+b1]||0)*tf;
      const [r,g,b]=color(val/(gMax||1));
      const i=(y*W+x)*4; px[i]=r; px[i+1]=g; px[i+2]=b; px[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

async function computeSpecFull(){
  if(!abuf) return;
  const COLS_LO = 400, FFTN_LO = 512;
  const data = monoMix(abuf);
  const sr = abuf.sampleRate;
  const total = data.length;
  const bins = FFTN_LO / 2;
  // Toujours couvrir jusqu'à Nyquist pour que autoDetectMode soit stable
  // quel que soit le mode courant au moment du calcul
  const maxBin = bins - 1;
  const win = hann(FFTN_LO);
  const out = new Float32Array(COLS_LO * maxBin);
  let gMax = 0;
  // Traitement par chunks pour ne pas bloquer le thread
  for(let c=0; c<COLS_LO; c++){
    if(c % 20 === 0) await tick(1);  // pause toutes les 20 colonnes
    const start = Math.floor(c / COLS_LO * (total - FFTN_LO));
    const m = fftMag(data, start, FFTN_LO, win, maxBin);
    const off = c * maxBin;
    for(let b=0; b<maxBin; b++){ out[off+b]=m[b]; if(m[b]>gMax) gMax=m[b]; }
  }

  // gMax haute résolution sur 50 points échantillonnés
  const FFTN_HI = 2048;
  const binsHi = FFTN_HI / 2;
  const maxBinHi = Math.min(binsHi-1, Math.floor(MFREQ/(sr/2)*binsHi));
  const winHi = hann(FFTN_HI);
  let gMaxHi = 0;
  const COLS_SCAN = 50;
  for(let c=0; c<COLS_SCAN; c++){
    if(c % 10 === 0) await tick(1);
    const start = Math.floor(c / COLS_SCAN * (total - FFTN_HI));
    const m = fftMag(data, start, FFTN_HI, winHi, maxBinHi);
    for(let b=0; b<maxBinHi; b++) if(m[b]>gMaxHi) gMaxHi=m[b];
  }

  specFull = {out, cols:COLS_LO, maxBin, gMax, gMaxHi, dur};

  // Détection automatique du mode — specFull est maintenant prêt
  autoDetectMode();

  // Courbe de pitch sur tout le fichier
  const p1=parseInt(pmin.value)||1000, p2=parseInt(pmax.value)||8000;
  const b1f=Math.floor(p1/MFREQ*maxBin), b2f=Math.ceil(p2/MFREQ*maxBin);
  curveFull=[];
  for(let c=0;c<COLS_LO;c++){
    const off=c*maxBin; let mv=0,pk=-1;
    for(let b=b1f;b<=Math.min(b2f,maxBin-1);b++){if(out[off+b]>mv){mv=out[off+b];pk=b;}}
    const t = c/COLS_LO * total/sr;
    curveFull.push(pk>=0&&mv>gMaxHi*0.04 ? {t, hz:pk/maxBin*MFREQ} : null);
  }
}

// Détecte automatiquement le mode parmi oiseau / voix / musique.
// Trois métriques sur 16 extraits répartis dans le fichier :
//   ratioHigh  : énergie > 2kHz / totale   → élevé chez l'oiseau
//   nPeaks     : nombre de pics spectraux   → élevé en musique polyphonique
//   ratioLow   : énergie < 300Hz / totale   → élevé en musique (basses)
let _detectingMode = false;

function autoDetectMode(){
  if(!specFull || !specFull.out || _detectingMode) return;
  _detectingMode = true;

  const { out, cols, maxBin } = specFull;
  // Utiliser la fréquence de Nyquist réelle, pas MFREQ (qui peut être 1200 en mode musique)
  const nyquist = abuf.sampleRate / 2;

  let totalEnergy=0, birdEnergy=0, voiceEnergy=0;
  let centroidSum=0, frameCount=0;

  for(let c=0; c<cols; c++){
    const off = c*maxBin;
    let colE=0, colCNum=0;
    for(let b=0; b<maxBin; b++){
      const e = out[off+b]*out[off+b];
      const hz = (b/maxBin)*nyquist;
      colE     += e;
      colCNum  += e*hz;
      if(hz>=2000 && hz<=8000) birdEnergy  += e;
      if(hz>=80   && hz<=1000) voiceEnergy += e;
    }
    if(colE > 0){
      totalEnergy  += colE;
      centroidSum  += colCNum/colE;
      frameCount++;
    }
  }

  if(frameCount===0) return;

  const avgCentroid = centroidSum/frameCount;
  const birdRatio   = birdEnergy  / (totalEnergy||1);
  const voiceRatio  = voiceEnergy / (totalEnergy||1);

  let detectedMode;
  if(birdRatio > 0.4){
    detectedMode = 'oiseau';
  } else if(avgCentroid > 500){
    detectedMode = 'voix';
  } else {
    detectedMode = 'musique';
  }

  if(detectedMode === stretchMode){ _detectingMode=false; return; }
  $('mode'+detectedMode.charAt(0).toUpperCase()+detectedMode.slice(1)).click();
  _detectingMode = false;
}

// Overlap-add time stretch. factor>1 allonge (ralentit) sans changer la hauteur.
// Sur un signal mono. Fenêtre de Hann, recouvrement 50%.
function timeStretchOLA(input, sr, factor){
  const N = input.length;
  const frame = 1024;
  const synHop = frame >> 1;
  const anaHop = synHop / factor;
  const outLen = Math.ceil(N * factor) + frame;
  const out = new Float32Array(outLen);
  const winSum = new Float32Array(outLen);
  const w = hann(frame);
  let ana = 0, syn = 0;
  while(ana + frame < N){
    const a0 = Math.floor(ana);
    for(let i=0;i<frame;i++){
      const s = (input[a0+i]||0) * w[i];
      out[syn+i]    += s;
      winSum[syn+i] += w[i];
    }
    ana += anaHop;
    syn += synHop;
  }
  for(let i=0;i<outLen;i++){ if(winSum[i]>1e-6) out[i] /= winSum[i]; }
  const buf = actx.createBuffer(1, outLen, sr);
  buf.getChannelData(0).set(out);
  return buf;
}

// Phase vocoder time stretch — meilleur sur la voix humaine.
// Préserve la cohérence de phase entre trames successives.
function timeStretchPV(input, sr, factor){
  const N = input.length;
  const fftSize = factor >= 3 ? 8192 : factor >= 2 ? 4096 : 2048;
  const maxHop = Math.floor(fftSize * 0.75 / factor);  // garantit overlap suffisant
  const hop = Math.min(fftSize >> 2, maxHop);
  const synHop = Math.round(hop * factor);
  const outLen = Math.ceil(N * factor) + fftSize;
  const out = new Float32Array(outLen);
  const winSum = new Float32Array(outLen);
  // sqrt-Hann pour meilleure reconstruction
  const w = new Float32Array(fftSize);
  for(let i=0;i<fftSize;i++) w[i]=Math.sqrt(0.5-0.5*Math.cos(2*Math.PI*i/(fftSize-1)));

  const phaseAcc  = new Float32Array(fftSize/2);
  const lastPhase = new Float32Array(fftSize/2);
  const TWO_PI = 2*Math.PI;

  let anaPos=0, synPos=0;
  const totalFrames = Math.ceil((N-fftSize)/hop)||1;
  let frameCount=0;

  while(anaPos + fftSize < N){
    const re = new Float32Array(fftSize);
    const im = new Float32Array(fftSize);
    for(let i=0;i<fftSize;i++) re[i]=(input[Math.floor(anaPos)+i]||0)*w[i];
    fftInPlace(re, im);

    // Magnitudes et phases
    const mag   = new Float32Array(fftSize/2);
    const phase = new Float32Array(fftSize/2);
    for(let k=0;k<fftSize/2;k++){
      mag[k]  =Math.sqrt(re[k]*re[k]+im[k]*im[k]);
      phase[k]=Math.atan2(im[k],re[k]);
    }

    // Identity phase locking : détecter les pics
    const isPeak = new Uint8Array(fftSize/2);
    for(let k=1;k<fftSize/2-1;k++){
      if(mag[k]>mag[k-1]&&mag[k]>mag[k+1]) isPeak[k]=1;
    }

    // 1) Propager la phase des pics
    for(let k=0;k<fftSize/2;k++){
      if(!isPeak[k]) continue;
      let dPhase=phase[k]-lastPhase[k]-(TWO_PI*k*hop/fftSize);
      dPhase-=TWO_PI*Math.round(dPhase/TWO_PI);
      phaseAcc[k]+=synHop*(TWO_PI*k/fftSize+dPhase/hop);
    }

    // 2) Bins voisins : phase relative au pic le plus proche — O(N) deux passes
    const nearestPeak=new Int32Array(fftSize/2).fill(-1);
    let last=-1;
    for(let k=0;k<fftSize/2;k++){if(isPeak[k])last=k; if(last>=0)nearestPeak[k]=last;}
    last=-1;
    for(let k=fftSize/2-1;k>=0;k--){
      if(isPeak[k])last=k;
      if(last>=0&&(nearestPeak[k]<0||Math.abs(last-k)<Math.abs(nearestPeak[k]-k)))nearestPeak[k]=last;
    }
    const newRe=new Float32Array(fftSize);
    const newIm=new Float32Array(fftSize);
    for(let k=0;k<fftSize/2;k++){
      const p=nearestPeak[k];
      const accPhase=isPeak[k]?phaseAcc[k]:(p>=0?phaseAcc[p]+(phase[k]-phase[p]):phaseAcc[k]);
      lastPhase[k]=phase[k];
      newRe[k]=mag[k]*Math.cos(accPhase);
      newIm[k]=mag[k]*Math.sin(accPhase);
      if(k>0&&k<fftSize/2){newRe[fftSize-k]=newRe[k];newIm[fftSize-k]=-newIm[k];}
    }

    ifftInPlace(newRe, newIm);
    for(let i=0;i<fftSize;i++){
      out[synPos+i]    +=newRe[i]*w[i];
      winSum[synPos+i] +=w[i]*w[i];
    }
    anaPos+=hop; synPos+=synHop;
    frameCount++;
    if(frameCount%30===0) setOv(true, undefined, Math.min(95,Math.round(frameCount/totalFrames*100)));
  }

  for(let i=0;i<outLen;i++){if(winSum[i]>1e-6) out[i]/=winSum[i];}
  const buf=actx.createBuffer(1,outLen,sr);
  buf.getChannelData(0).set(out);
  return buf;
}

// FFT en place (Cooley-Tukey radix-2)
function fftInPlace(re, im){
  const N = re.length;
  for(let i=1,j=0;i<N;i++){
    let bit=N>>1;
    for(;j&bit;bit>>=1) j^=bit;
    j^=bit;
    if(i<j){ let t=re[i]; re[i]=re[j]; re[j]=t; t=im[i]; im[i]=im[j]; im[j]=t; }
  }
  for(let len=2;len<=N;len<<=1){
    const ang=-2*Math.PI/len;
    const wRe=Math.cos(ang), wIm=Math.sin(ang);
    for(let i=0;i<N;i+=len){
      let curRe=1, curIm=0;
      for(let j=0;j<len/2;j++){
        const uRe=re[i+j], uIm=im[i+j];
        const vRe=re[i+j+len/2]*curRe-im[i+j+len/2]*curIm;
        const vIm=re[i+j+len/2]*curIm+im[i+j+len/2]*curRe;
        re[i+j]=uRe+vRe; im[i+j]=uIm+vIm;
        re[i+j+len/2]=uRe-vRe; im[i+j+len/2]=uIm-vIm;
        const newRe=curRe*wRe-curIm*wIm;
        curIm=curRe*wIm+curIm*wRe; curRe=newRe;
      }
    }
  }
}

function ifftInPlace(re, im){
  for(let i=0;i<im.length;i++) im[i]=-im[i];
  fftInPlace(re, im);
  const N=re.length;
  for(let i=0;i<N;i++){ re[i]/=N; im[i]=-im[i]/N; }
}

// ── WEB WORKER POUR LE TIME-STRETCH ─────────────────────────────────────────
// Le Worker contient toutes les fonctions de calcul (hann, FFT, WSOLA, PV).
// Il tourne dans un thread séparé → l'interface reste réactive pendant le calcul.
const WORKER_CODE = `
function hann(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=0.5*(1-Math.cos(2*Math.PI*i/(N-1)));return w;}

function fftInPlace(re,im){
  const N=re.length;
  for(let i=1,j=0;i<N;i++){
    let bit=N>>1;
    for(;j&bit;bit>>=1)j^=bit;
    j^=bit;
    if(i<j){let t=re[i];re[i]=re[j];re[j]=t;t=im[i];im[i]=im[j];im[j]=t;}
  }
  for(let len=2;len<=N;len<<=1){
    const ang=-2*Math.PI/len,wRe=Math.cos(ang),wIm=Math.sin(ang);
    for(let i=0;i<N;i+=len){
      let cRe=1,cIm=0;
      for(let j=0;j<len/2;j++){
        const uRe=re[i+j],uIm=im[i+j];
        const vRe=re[i+j+len/2]*cRe-im[i+j+len/2]*cIm;
        const vIm=re[i+j+len/2]*cIm+im[i+j+len/2]*cRe;
        re[i+j]=uRe+vRe;im[i+j]=uIm+vIm;
        re[i+j+len/2]=uRe-vRe;im[i+j+len/2]=uIm-vIm;
        const nr=cRe*wRe-cIm*wIm;cIm=cRe*wIm+cIm*wRe;cRe=nr;
      }
    }
  }
}
function ifftInPlace(re,im){
  for(let i=0;i<im.length;i++)im[i]=-im[i];
  fftInPlace(re,im);
  const N=re.length;
  for(let i=0;i<N;i++){re[i]/=N;im[i]=-im[i]/N;}
}

function wsola(input,factor,options){
  options=options||{};
  if(factor<=0)return input;
  if(Math.abs(factor-1)<0.001){const b=new Float32Array(input.length);b.set(input);return b;}
  const frameSize=options.frameSize||1024;
  const overlap=options.overlap||0.75;
  const searchRadius=options.searchRadius||128;
  const synthesisHop=Math.floor(frameSize*(1-overlap));
  const analysisHop=synthesisHop/factor;
  const outputLength=Math.round(input.length*factor);
  const output=new Float32Array(outputLength);
  const weight=new Float32Array(outputLength);
  const win=new Float32Array(frameSize);
  for(let i=0;i<frameSize;i++)win[i]=0.5-0.5*Math.cos(2*Math.PI*i/(frameSize-1));
  let inPos=0,outPos=0;
  const totalFrames=Math.ceil((outputLength-frameSize)/synthesisHop)||1;
  let frameCount=0;
  for(let i=0;i<frameSize;i++){output[i]+=(input[i]||0)*win[i];weight[i]+=win[i];}
  inPos+=analysisHop;outPos+=synthesisHop;
  while(outPos+frameSize<outputLength&&inPos+frameSize<input.length){
    const expectedInPos=Math.round(inPos);
    let bestOffset=0,bestScore=-Infinity;
    const prevOutPos=outPos-synthesisHop;
    for(let offset=-searchRadius;offset<=searchRadius;offset++){
      const candidatePos=expectedInPos+offset;
      if(candidatePos<0||candidatePos+frameSize>=input.length)continue;
      let corr=0,eA=0,eB=0;
      for(let i=0;i<synthesisHop;i++){
        const a=input[candidatePos+i];
        const b=output[prevOutPos+synthesisHop+i];
        corr+=a*b;eA+=a*a;eB+=b*b;
      }
      const score=corr/(Math.sqrt(eA*eB)+1e-12);
      if(score>bestScore){bestScore=score;bestOffset=offset;}
    }
    const bestInPos=expectedInPos+bestOffset;
    for(let i=0;i<frameSize;i++){
      const outIndex=outPos+i;
      if(outIndex>=outputLength)break;
      output[outIndex]+=(input[bestInPos+i]||0)*win[i];
      weight[outIndex]+=win[i];
    }
    inPos+=analysisHop;outPos+=synthesisHop;
    frameCount++;
    if(frameCount%30===0)postMessage({type:'progress',pct:Math.round(frameCount/totalFrames*100)});
  }
  for(let i=0;i<outputLength;i++)if(weight[i]>1e-12)output[i]/=weight[i];
  return output;
}

function timeStretchPV(input,factor){
  const N=input.length;
  const fftSize=2048;
  const maxHop=Math.floor(fftSize*0.75/factor);const hop=Math.min(fftSize>>2,maxHop);
  const synHop=Math.round(hop*factor);
  const outLen=Math.ceil(N*factor)+fftSize;
  const out=new Float32Array(outLen);
  const winSum=new Float32Array(outLen);
  const w=new Float32Array(fftSize);
  for(let i=0;i<fftSize;i++)w[i]=Math.sqrt(0.5-0.5*Math.cos(2*Math.PI*i/(fftSize-1)));
  const phaseAcc=new Float32Array(fftSize/2);
  const lastPhase=new Float32Array(fftSize/2);
  const TWO_PI=2*Math.PI;
  let anaPos=0,synPos=0;
  const totalFrames=Math.ceil((N-fftSize)/hop)||1;
  let frameCount=0;
  while(anaPos+fftSize<N){
    const re=new Float32Array(fftSize),im=new Float32Array(fftSize);
    for(let i=0;i<fftSize;i++)re[i]=(input[Math.floor(anaPos)+i]||0)*w[i];
    fftInPlace(re,im);
    const mag=new Float32Array(fftSize/2),phase=new Float32Array(fftSize/2);
    for(let k=0;k<fftSize/2;k++){mag[k]=Math.sqrt(re[k]*re[k]+im[k]*im[k]);phase[k]=Math.atan2(im[k],re[k]);}
    const isPeak=new Uint8Array(fftSize/2);
    for(let k=1;k<fftSize/2-1;k++)if(mag[k]>mag[k-1]&&mag[k]>mag[k+1])isPeak[k]=1;
    for(let k=0;k<fftSize/2;k++){
      if(!isPeak[k])continue;
      let dPhase=phase[k]-lastPhase[k]-(TWO_PI*k*hop/fftSize);
      dPhase-=TWO_PI*Math.round(dPhase/TWO_PI);
      phaseAcc[k]+=synHop*(TWO_PI*k/fftSize+dPhase/hop);
    }
    const nearestPeak2=new Int32Array(fftSize/2).fill(-1);
    let lp2=-1;
    for(let k=0;k<fftSize/2;k++){if(isPeak[k])lp2=k;if(lp2>=0)nearestPeak2[k]=lp2;}
    lp2=-1;
    for(let k=fftSize/2-1;k>=0;k--){
      if(isPeak[k])lp2=k;
      if(lp2>=0&&(nearestPeak2[k]<0||Math.abs(lp2-k)<Math.abs(nearestPeak2[k]-k)))nearestPeak2[k]=lp2;
    }
    const newRe=new Float32Array(fftSize),newIm=new Float32Array(fftSize);
    for(let k=0;k<fftSize/2;k++){
      const p=nearestPeak2[k];
      const accPhase=isPeak[k]?phaseAcc[k]:(p>=0?phaseAcc[p]+(phase[k]-phase[p]):phaseAcc[k]);
      lastPhase[k]=phase[k];
      newRe[k]=mag[k]*Math.cos(accPhase);newIm[k]=mag[k]*Math.sin(accPhase);
      if(k>0&&k<fftSize/2){newRe[fftSize-k]=newRe[k];newIm[fftSize-k]=-newIm[k];}
    }
    ifftInPlace(newRe,newIm);
    for(let i=0;i<fftSize;i++){out[synPos+i]+=newRe[i]*w[i];winSum[synPos+i]+=w[i]*w[i];}
    anaPos+=hop;synPos+=synHop;
    frameCount++;
    if(frameCount%30===0)postMessage({type:'progress',pct:Math.round(frameCount/totalFrames*100)});
  }
  for(let i=0;i<outLen;i++)if(winSum[i]>1e-6)out[i]/=winSum[i];
  return out;
}

self.onmessage=function(e){
  const {mode,factor,samples}=e.data;
  // samples est un ArrayBuffer transféré — le convertir en Float32Array
  const input=new Float32Array(samples);
  let result;
  if(mode==='voix'){
    result=timeStretchPV(input,factor);
  } else if(mode==='musique'){
    result=wsola(input,factor,{frameSize:4096,overlap:0.75,searchRadius:512});
  } else if(mode==='wsola-voix'){
    result=wsola(input,factor,{frameSize:2048,overlap:0.75,searchRadius:256});
  } else {
    result=wsola(input,factor,{frameSize:1024,overlap:0.75,searchRadius:128});
  }
  postMessage({type:'done',samples:result.buffer},[result.buffer]);
};

let stretchWorker = null;
let workerFailed = false;  // si le Worker a échoué, on bascule en synchrone

function getStretchWorker(){
  if(workerFailed) return null;
  if(!stretchWorker){
    try{
      const blob=new Blob([WORKER_CODE],{type:'application/javascript'});
      stretchWorker=new Worker(URL.createObjectURL(blob));
    } catch(e){
      console.warn('Worker creation failed:', e);
      workerFailed=true;
      return null;
    }
  }
  return stretchWorker;
}

// Fallback synchrone (même code que le Worker mais sur le thread principal)
function timeStretchSync(samples, mode, factor){
  if(mode==='voix'){
    // PV inline simplifié
    const N=samples.length;
    const fftSize=factor>=3?8192:factor>=2?4096:2048;
    const maxHop=Math.floor(fftSize*0.75/factor);const hop=Math.min(fftSize>>2,maxHop);
    const synHop=Math.round(hop*factor);
    const outLen=Math.ceil(N*factor)+fftSize;
    const out=new Float32Array(outLen);
    const winSum=new Float32Array(outLen);
    const w=new Float32Array(fftSize);
    for(let i=0;i<fftSize;i++) w[i]=Math.sqrt(0.5-0.5*Math.cos(2*Math.PI*i/(fftSize-1)));
    const phaseAcc=new Float32Array(fftSize/2);
    const lastPhase=new Float32Array(fftSize/2);
    const TWO_PI=2*Math.PI;
    let anaPos=0,synPos=0;
    while(anaPos+fftSize<N){
      const re=new Float32Array(fftSize),im=new Float32Array(fftSize);
      for(let i=0;i<fftSize;i++) re[i]=(samples[Math.floor(anaPos)+i]||0)*w[i];
      fftInPlace(re,im);
      const mag=new Float32Array(fftSize/2),phase=new Float32Array(fftSize/2);
      for(let k=0;k<fftSize/2;k++){mag[k]=Math.sqrt(re[k]*re[k]+im[k]*im[k]);phase[k]=Math.atan2(im[k],re[k]);}
      const isPeak=new Uint8Array(fftSize/2);
      for(let k=1;k<fftSize/2-1;k++) if(mag[k]>mag[k-1]&&mag[k]>mag[k+1]) isPeak[k]=1;
      for(let k=0;k<fftSize/2;k++){
        if(!isPeak[k]) continue;
        let dPhase=phase[k]-lastPhase[k]-(TWO_PI*k*hop/fftSize);
        dPhase-=TWO_PI*Math.round(dPhase/TWO_PI);
        phaseAcc[k]+=synHop*(TWO_PI*k/fftSize+dPhase/hop);
      }
      // Précalcul O(N) du pic le plus proche
      const nearPeak=new Int32Array(fftSize/2).fill(-1);
      let lp=-1;
      for(let k=0;k<fftSize/2;k++){if(isPeak[k])lp=k;if(lp>=0)nearPeak[k]=lp;}
      lp=-1;
      for(let k=fftSize/2-1;k>=0;k--){
        if(isPeak[k])lp=k;
        if(lp>=0&&(nearPeak[k]<0||Math.abs(lp-k)<Math.abs(nearPeak[k]-k)))nearPeak[k]=lp;
      }
      const nRe=new Float32Array(fftSize),nIm=new Float32Array(fftSize);
      for(let k=0;k<fftSize/2;k++){
        let acc;
        if(isPeak[k]){acc=phaseAcc[k];}
        else{const p=nearPeak[k];acc=p>=0?phaseAcc[p]+(phase[k]-phase[p]):phaseAcc[k];}
        lastPhase[k]=phase[k];
        nRe[k]=mag[k]*Math.cos(acc);nIm[k]=mag[k]*Math.sin(acc);
        if(k>0&&k<fftSize/2){nRe[fftSize-k]=nRe[k];nIm[fftSize-k]=-nIm[k];}
      }
      ifftInPlace(nRe,nIm);
      for(let i=0;i<fftSize;i++){out[synPos+i]+=nRe[i]*w[i];winSum[synPos+i]+=w[i]*w[i];}
      anaPos+=hop;synPos+=synHop;
    }
    for(let i=0;i<outLen;i++) if(winSum[i]>1e-6) out[i]/=winSum[i];
    return out;
  } else {
    // WSOLA
    const opts=mode==='musique'
      ?{frameSize:4096,overlap:0.75,searchRadius:512}
      :mode==='wsola-voix'
      ?{frameSize:2048,overlap:0.75,searchRadius:256}
      :{frameSize:1024,overlap:0.75,searchRadius:128};
    const frameSize=opts.frameSize,overlap=opts.overlap,searchRadius=opts.searchRadius;
    const synthesisHop=Math.floor(frameSize*(1-overlap));
    const analysisHop=synthesisHop/factor;
    const outputLength=Math.round(samples.length*factor);
    const output=new Float32Array(outputLength);
    const weight=new Float32Array(outputLength);
    const win=new Float32Array(frameSize);
    for(let i=0;i<frameSize;i++) win[i]=0.5-0.5*Math.cos(2*Math.PI*i/(frameSize-1));
    let inPos=0,outPos=0;
    for(let i=0;i<frameSize;i++){output[i]+=(samples[i]||0)*win[i];weight[i]+=win[i];}
    inPos+=analysisHop;outPos+=synthesisHop;
    while(outPos+frameSize<outputLength&&inPos+frameSize<samples.length){
      const exp=Math.round(inPos);
      let bestOffset=0,bestScore=-Infinity;
      const prev=outPos-synthesisHop;
      for(let offset=-searchRadius;offset<=searchRadius;offset++){
        const cp=exp+offset;
        if(cp<0||cp+frameSize>=samples.length) continue;
        let corr=0,eA=0,eB=0;
        for(let i=0;i<synthesisHop;i++){const a=samples[cp+i],b=output[prev+synthesisHop+i];corr+=a*b;eA+=a*a;eB+=b*b;}
        const score=corr/(Math.sqrt(eA*eB)+1e-12);
        if(score>bestScore){bestScore=score;bestOffset=offset;}
      }
      const bp=exp+bestOffset;
      for(let i=0;i<frameSize;i++){const oi=outPos+i;if(oi>=outputLength)break;output[oi]+=(samples[bp+i]||0)*win[i];weight[oi]+=win[i];}
      inPos+=analysisHop;outPos+=synthesisHop;
    }
    for(let i=0;i<outputLength;i++) if(weight[i]>1e-12) output[i]/=weight[i];
    return output;
  }
}

function clearStretchCache(){ stretchCache={}; }

// Récupère (ou calcule) le buffer à jouer pour la vitesse demandée
const STRETCH_CACHE_MAX = 3;
async function getPlayBuffer(spd, silent=false){
  if(!spd||isNaN(spd)||spd<=0) spd=1;
  if(Math.abs(spd-1)<0.001) return abuf;
  const key=stretchMode+':'+stretchAlgo+':'+String(spd);
  if(stretchCache[key]) return stretchCache[key];
  if(!silent){
    setOv(true,'Préparation ×'+spd+'…',0);
    cancelBtn.style.display='block';
    await tick(20);
  }
  const mono=monoMix(abuf);
  const factor=1/spd;
  // L'algo détermine le Worker et le mode passé au moteur
  const algoMode = stretchAlgo==='pv'           ? 'voix'
                 : stretchAlgo==='wsola-musique' ? 'musique'
                 : stretchAlgo==='wsola-voix'    ? 'wsola-voix'
                 : 'oiseau';
  const worker = stretchAlgo !== 'pv' ? getStretchWorker() : null;

  let _wasCancelled = false;
  if(worker){
    const samples=mono.slice();
    stretched = await new Promise((resolve,reject)=>{
      const timeout=setTimeout(()=>{ reject(new Error('Worker timeout')); }, 30000);
      _cancelReject = ()=>{ _wasCancelled=true; clearTimeout(timeout); reject(new Error('cancelled')); };
      function onMsg(e){
        if(e.data.type==='progress'){
          if(!silent) setOv(true, undefined, e.data.pct);
        } else if(e.data.type==='done'){
          clearTimeout(timeout);
          _cancelReject = null;
          worker.removeEventListener('message',onMsg);
          worker.removeEventListener('error',onErr);
          resolve(new Float32Array(e.data.samples));
        }
      }
      function onErr(e){
        clearTimeout(timeout);
        _cancelReject = null;
        worker.removeEventListener('message',onMsg);
        worker.removeEventListener('error',onErr);
        reject(e);
      }
      worker.addEventListener('message',onMsg);
      worker.addEventListener('error',onErr);
      worker.postMessage({mode:algoMode,factor,samples:samples.buffer},[samples.buffer]);
    }).catch(err=>{
      if(err.message === 'cancelled') return null;
      console.warn('Worker failed, falling back to sync:', err);
      stretchWorker=null; workerFailed=true;
      return null;
    });
  }

  // Fallback synchrone si Worker indisponible (pas si annulé)
  if(!stretched && !_wasCancelled){
    stretched = await timeStretchSyncAsync(mono, algoMode, factor);
  }
  if(!stretched){ cancelBtn.style.display='none'; if(!silent) setOv(false); return abuf; }
  const buf=actx.createBuffer(1,stretched.length,abuf.sampleRate);
  buf.getChannelData(0).set(stretched);
  const keys=Object.keys(stretchCache);
  if(keys.length >= STRETCH_CACHE_MAX) delete stretchCache[keys[0]];
  stretchCache[key]=buf;
  cancelBtn.style.display='none';
  if(!silent) setOv(false);
  return buf;
}

// ── PLAYBACK ────────────────────────────────────────────────────────────────
// On joue playBuf à playbackRate=1 → hauteur préservée.
// Lecture confinée à la fenêtre visible [viewStart, viewEnd] (temps réel).
// Le buffer étiré a une échelle = temps_réel / speed.
// Garantit un contexte audio en état 'running'. Gère l'état iOS 'interrupted'.
async function ensureContext(){
  if(actx && actx.state==='running') return;
  // 1) tenter resume()
  if(actx){
    try{ await actx.resume(); }catch(e){}
    let tries=0;
    while(actx.state!=='running' && actx.state!=='closed' && tries<8){ await tick(10); tries++; }
    if(actx.state==='running') return;
  }
  // 2) échec → recréer un contexte neuf et y reconstruire le buffer PCM
  const oldBuf = abuf;
  try{ if(actx) actx.close(); }catch(e){}
  actx = new (window.AudioContext||window.webkitAudioContext)();
  try{ await actx.resume(); }catch(e){}
  if(oldBuf){
    // recopier les données PCM dans un buffer du nouveau contexte
    const nb = actx.createBuffer(oldBuf.numberOfChannels, oldBuf.length, oldBuf.sampleRate);
    for(let ch=0; ch<oldBuf.numberOfChannels; ch++){
      nb.copyToChannel ? nb.copyToChannel(oldBuf.getChannelData(ch), ch)
                       : nb.getChannelData(ch).set(oldBuf.getChannelData(ch));
    }
    abuf = nb;
  }
  clearStretchCache();   // les buffers étirés appartenaient à l'ancien contexte
}

// iosAudio keep-alive : maintient la session audio iOS active (mode silencieux)
// Joue un WAV silencieux court en boucle — aucun lien avec le contenu réel
function makeSilentWavURL(){
  const sr=44100, dur=2, len=sr*dur;
  const buf=new ArrayBuffer(44+len*2);
  const v=new DataView(buf);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  w(0,'RIFF'); v.setUint32(4,36+len*2,true); w(8,'WAVE');
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,1,true); v.setUint32(24,sr,true);
  v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,'data'); v.setUint32(40,len*2,true);
  // données = zéros (silence)
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}
const SILENT_WAV_URL = makeSilentWavURL();

async function play(){
  if(!abuf) return;
  clearTimeout(stopTimer);
  try{
    if(actx){ actx.resume();
      const b=actx.createBuffer(1,1,actx.sampleRate);
      const s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); s.start(0);
    }
  }catch(e){}
  await ensureContext();
  playBuf = await getPlayBuffer(speed);

  // iosAudio keep-alive : active la session audio iOS → mode silencieux contourné
  try{
    if(iosAudio.paused){
      iosAudio.src = SILENT_WAV_URL;
      iosAudio.loop = true;
      iosAudio.volume = 0;
      await iosAudio.play();
    }
  }catch(e){ console.warn('iosAudio.play:', e); }

  stopSrc();
  src=actx.createBufferSource(); src.buffer=playBuf;
  src.playbackRate.value=1; src.connect(actx.destination);

  const lo = viewStart / speed, hi = viewEnd / speed;
  if(offset < viewStart) offset = viewStart;
  if(offset >= viewEnd) offset = viewStart;  // hors région → retour début seulement si dépassement réel
  const bufOffset = offset / speed;

  src.loop = true;   // toujours en boucle native — c'est loop() qui gère l'arrêt
  src.loopStart = lo;
  src.loopEnd   = hi;

  t0=actx.currentTime;
  try{
    src.start(0, bufOffset);
  }catch(err){ console.error('start error:', err); return; }
  playing=true; setIcon(true); ph.style.display='block';
  src.onended=()=>{ if(playing){ stopAll(); } };
  loop();
}

function pause(){
  if(!playing) return;
  clearTimeout(stopTimer);
  offset = currentPlayPos;  // position exacte telle que vue par loop()
  if(offset > viewEnd) offset = viewEnd;
  if(offset < viewStart) offset = viewStart;
  if(!iosAudio.paused) iosAudio.pause();
  stopSrc();
  playing=false; setIcon(false); cancelAnimationFrame(raf);
}

function stopAll(){
  clearTimeout(stopTimer);
  if(!iosAudio.paused){ iosAudio.pause(); iosAudio.loop = false; }
  stopSrc();
  playing=false; offset=viewStart; setIcon(false);
  cancelAnimationFrame(raf);
  if(drawn){
    ph.style.display='block';
    drawPlayhead(viewStart);
    pf.style.width='0%'; pr.value=0;
    td.textContent=fmt(viewStart)+' / '+fmt(viewEnd);
  }
}
function stopSrc(){ if(src){src.onended=null;try{src.stop();}catch(e){}src.disconnect();src=null;} }
function loop(){
  if(!playing)return;
  const winLen = viewEnd - viewStart;
  let pos = offset + (actx.currentTime - t0) * speed;
  if(looping && winLen>0){
    while(pos >= viewEnd) pos -= winLen;
  } else if(pos >= viewEnd){
    // Fin naturelle sans boucle → curseur reste à la fin
    currentPlayPos = viewEnd;
    stopSrc();
    iosAudio.pause();
    playing=false; setIcon(false); cancelAnimationFrame(raf);
    offset = viewEnd;
    if(drawn){
      drawPlayhead(viewEnd);
      pf.style.width='100%'; pr.value=1000;
      td.textContent=fmt(viewEnd)+' / '+fmt(viewEnd);
    }
    return;
  }
  currentPlayPos = pos;
  drawPlayhead(pos);
  const r = winLen>0 ? (pos - viewStart)/winLen : 0;
  pf.style.width=(r*100)+'%'; pr.value=Math.round(r*1000);
  td.textContent=fmt(pos)+' / '+fmt(viewEnd);
  raf=requestAnimationFrame(loop);
}
// Place la tête de lecture (pos en temps réel) relativement à la fenêtre
function drawPlayhead(pos){
  if(!drawn) return;
  const winLen = viewEnd - viewStart;
  const r = winLen>0 ? (pos - viewStart)/winLen : 0;
  ph.style.left = (Math.max(0,Math.min(1,r))*100)+'%';
}

// ── SÉLECTION PAR GLISSEMENT (zoom sur région) ──────────────────────────────
const viz = sc.parentElement;
function evX(e){
  const rect = viz.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return Math.max(0, Math.min(rect.width, cx)) / rect.width;  // 0..1 dans la fenêtre
}
function xToTime(r){ return viewStart + r*(viewEnd-viewStart); }

function selStart(e){
  if(!drawn) return;
  if(e.target && e.target.closest && e.target.closest('#zoomBadge')) return;

  // Un doigt sur le curseur blanc → drag de position
  if(e.target && e.target.closest && e.target.closest('#ph')){
    draggingPH=true;
    draggingPHWasPlaying=playing;
    if(playing) pause();
    e.preventDefault(); return;
  }

  // En vue générale : sélection simple, pas de long press
  if(!viz.classList.contains('zoomed')){
    selecting=true; selX0=evX(e); selX1=selX0;
    sel.style.display='block'; selrd.style.display='block';
    updateSelUI(); e.preventDefault(); return;
  }

  // Mode zoom : long press (400ms) → slide, court tap → sélection zoom
  const startX = e.touches ? e.touches[0].clientX : e.clientX;
  const startY = e.touches ? e.touches[0].clientY : e.clientY;
  slideTimer = setTimeout(()=>{
    if(selecting){
      selecting=false;
      sel.style.display='none'; selrd.style.display='none';
      sliding=true;
      slideStartX=startX;
      slideStartVS=viewStart; slideStartVE=viewEnd;
      slideCurveSnapshot = curve.slice();
      slideVSSnapshot = viewStart;
      slideVESnapshot = viewEnd;
      const nonNull = curve.filter(p=>p).length;
      slideMinLen = Math.max(1, Math.floor(nonNull / 20));
      drawSpecFromFull(viewStart, viewEnd);
      drawCurveFromFull(viewStart, viewEnd);
      tlbl.innerHTML='<span style="position:absolute;left:0;right:0;text-align:center;color:var(--acc);font-size:10px">← Glisser →</span>';
      sc.style.outline='2px solid rgba(126,207,110,.5)';
    }
  }, 400);

  selecting=true; selX0=evX(e); selX1=selX0;
  sel.style.display='block'; selrd.style.display='block';
  updateSelUI();
  e.preventDefault();
}
function selMove(e){
  if(sliding){
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const rect = viz.getBoundingClientRect();
    const dx = (slideStartX - cx) / rect.width;  // déplacement relatif
    const winLen = slideStartVE - slideStartVS;
    let ns = slideStartVS + dx * winLen;
    let ne = slideStartVE + dx * winLen;
    if(ns<0){ ne-=ns; ns=0; }
    if(ne>dur){ ns-=(ne-dur); ne=dur; }
    viewStart=Math.max(0,ns); viewEnd=Math.min(dur,ne);
    // Redessiner depuis specFull en temps réel
    drawSpecFromFull(viewStart, viewEnd);
    drawCurveFromFull(viewStart, viewEnd);
    setZoomBadge(true);
    e.preventDefault(); return;
  }
  if(draggingPH){
    const r=evX(e);
    offset=xToTime(r);
    offset=Math.max(viewStart, Math.min(viewEnd, offset));
    const winLen=viewEnd-viewStart;
    const rr=winLen>0?(offset-viewStart)/winLen:0;
    pf.style.width=(rr*100)+'%'; pr.value=Math.round(rr*1000);
    td.textContent=fmt(offset)+' / '+fmt(viewEnd);
    drawPlayhead(offset);
    e.preventDefault(); return;
  }
  if(!selecting) return;
  if(slideTimer){ clearTimeout(slideTimer); slideTimer=null; }
  selX1=evX(e); updateSelUI(); e.preventDefault();
}
function selEnd(e){
  clearTimeout(slideTimer); slideTimer=null;
  if(sliding){
    sliding=false;
    sc.style.outline='';
    const w=playing; if(w) pause();
    ph.style.display='none';
    clearStretchCache();
    setZoomBadge(true);
    const job=busy;
    analyze(job).then(()=>{
      if(job!==busy) return;
      timeLabels();
      ph.style.display='block'; drawPlayhead(offset);
      if(w) play();
    });
    e.preventDefault(); return;
  }
  if(draggingPH){
    draggingPH=false;
    if(draggingPHWasPlaying) play();
    e.preventDefault(); return;
  }
  if(!selecting) return;
  selecting=false;
  const a=Math.min(selX0,selX1), b=Math.max(selX0,selX1);
  sel.style.display='none'; selrd.style.display='none';
  // Ignorer les sélections trop petites (tap accidentel)
  if(b-a < 0.02){ return; }
  const t0s=xToTime(a), t1s=xToTime(b);
  // Capturer la position courante AVANT la pause (pause() modifie offset)
  const currentPos = playing
    ? Math.min(viewEnd, Math.max(viewStart, currentPlayPos))
    : offset;
  const w=playing; if(w) pause();
  viewStart=t0s; viewEnd=t1s;
  offset = (currentPos >= t0s && currentPos < t1s) ? currentPos : t0s;
  clearStretchCache();
  setZoomBadge(true);
  ph.style.display='none';
  const job=busy;
  analyze(job).then(()=>{
    if(job!==busy) return;
    // Repositionner la tête au bon endroit après le redessin
    const winLen = viewEnd - viewStart;
    const r = winLen>0 ? (offset - viewStart)/winLen : 0;
    pf.style.width=(r*100)+'%'; pr.value=Math.round(r*1000);
    td.textContent=fmt(offset)+' / '+fmt(viewEnd);
    ph.style.display='block';
    drawPlayhead(offset);
    if(w) play();
  });
}
function setZoomBadge(on){
  zoomBadge.classList.toggle('on', on);
  viz.classList.toggle('zoomed', on);
  if(on){ zoomTxt.textContent = fmt(viewStart)+' → '+fmt(viewEnd); updatePanButtons(); }
}
function updateSelUI(){
  const a=Math.min(selX0,selX1), b=Math.max(selX0,selX1);
  sel.style.left=(a*100)+'%'; sel.style.width=((b-a)*100)+'%';
  selrd.textContent = fmt(xToTime(a))+' → '+fmt(xToTime(b));
}
viz.addEventListener('touchstart', selStart, {passive:false});
viz.addEventListener('touchmove',  selMove,  {passive:false});
viz.addEventListener('touchend',   selEnd);
viz.addEventListener('mousedown',  selStart);
window.addEventListener('mousemove',selMove);
window.addEventListener('mouseup',  selEnd);

function updatePanButtons(){
  const pl=document.getElementById('panLeft');
  const pr=document.getElementById('panRight');
  if(!pl||!pr) return;
  pl.disabled = viewStart <= 0;
  pr.disabled = viewEnd >= dur;
}

function zoomOutStep(){
  if(!abuf) return;
  const FACTOR = 1.5;
  const center = (viewStart + viewEnd) / 2;
  const newHalf = (viewEnd - viewStart) * FACTOR / 2;
  let ns = center - newHalf;
  let ne = center + newHalf;
  // Limiter aux bornes du fichier
  if(ns < 0){ ne = Math.min(dur, ne - ns); ns = 0; }
  if(ne > dur){ ns = Math.max(0, ns - (ne - dur)); ne = dur; }
  viewStart = Math.max(0, ns);
  viewEnd   = Math.min(dur, ne);
  // Si on couvre tout le fichier → quitter le zoom
  if(viewStart <= 0 && viewEnd >= dur){ exitZoom(); return; }
  setZoomBadge(true);
  updatePanButtons();
  const w=playing; if(w) pause();
  ph.style.display='none';
  clearStretchCache();
  const job=busy;
  analyze(job).then(()=>{
    if(job!==busy) return;
    const winLen=viewEnd-viewStart;
    const r=winLen>0?(offset-viewStart)/winLen:0;
    pf.style.width=(r*100)+'%'; pr.value=Math.round(r*1000);
    td.textContent=fmt(offset)+' / '+fmt(viewEnd);
    ph.style.display='block'; drawPlayhead(offset);
    if(w) play();
  });
}

function panView(dir){
  if(!abuf) return;
  const winLen = viewEnd - viewStart;
  const step = winLen * 0.5;
  let ns = viewStart + dir*step;
  let ne = viewEnd   + dir*step;
  if(ns < 0){ ne -= ns; ns = 0; }
  if(ne > dur){ ns -= (ne-dur); ne = dur; }
  viewStart = Math.max(0,ns); viewEnd = Math.min(dur,ne);
  setZoomBadge(true);
  updatePanButtons();
  const w=playing; if(w) pause();
  ph.style.display='none';
  clearStretchCache();
  const job=busy;
  analyze(job).then(()=>{
    if(job!==busy) return;
    // Recadrer offset dans la nouvelle fenêtre
    if(offset < viewStart) offset = viewStart;
    if(offset > viewEnd)   offset = viewEnd;
    const winLen = viewEnd - viewStart;
    const r = winLen>0 ? (offset-viewStart)/winLen : 0;
    pf.style.width=(r*100)+'%'; pr.value=Math.round(r*1000);
    td.textContent=fmt(offset)+' / '+fmt(viewEnd);
    ph.style.display='block'; drawPlayhead(offset);
    if(w)play();
  });
}
document.getElementById('panLeft').addEventListener('click',  e=>{ e.stopPropagation(); panView(-1); });
document.getElementById('panLeft').addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); panView(-1); });

document.getElementById('zoomOut').addEventListener('click',  e=>{ e.stopPropagation(); zoomOutStep(); });
