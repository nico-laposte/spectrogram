function color(t){
  t=Math.pow(Math.max(0,Math.min(1,t)),.35);
  const s=[[0,[10,15,10]],[.15,[10,40,30]],[.35,[20,80,60]],[.55,[60,150,80]],[.72,[140,210,60]],[.88,[230,220,40]],[1,[255,240,180]]];
  for(let i=1;i<s.length;i++){if(t<=s[i][0]){const lo=s[i-1][1],hi=s[i][1],f=(t-s[i-1][0])/(s[i][0]-s[i-1][0]);return[lo[0]+f*(hi[0]-lo[0]),lo[1]+f*(hi[1]-lo[1]),lo[2]+f*(hi[2]-lo[2])].map(Math.round);}}
  return[255,240,180];
}

// ── PLAYBACK ──────────────────────────────────────────────────────────────
// ── TIME-STRETCH (OLA, hauteur préservée) ───────────────────────────────────
// Cache des buffers ralentis par vitesse. ×1 = abuf direct (pas de traitement).
let stretchCache = {};        // { "0.5": AudioBuffer, ... }
let specFull = null;          // spectrogramme basse résolution du fichier entier
let gMaxHiGlobal = 0;         // normalisation stable calculée dès le chargement

async function computeGMaxHi(){
  if(!abuf) return;
  const FFTN_HI = 2048;
  const data = monoMix(abuf);
  const sr = abuf.sampleRate;
  const total = data.length;
  const binsHi = FFTN_HI / 2;
  const maxBinHi = Math.min(binsHi-1, Math.floor(MFREQ/(sr/2)*binsHi));
  const winHi = hann(FFTN_HI);
  let g = 0;
  const COLS_SCAN = 50;
  for(let c=0; c<COLS_SCAN; c++){
    if(c % 10 === 0) await tick(1);
    const start = Math.floor(c / COLS_SCAN * (total - FFTN_HI));
    const m = fftMag(data, start, FFTN_HI, winHi, maxBinHi);
    for(let b=0; b<maxBinHi; b++) if(m[b]>g) g=m[b];
  }
  gMaxHiGlobal = g;
}
let playBuf = null;           // buffer actuellement joué (abuf ou version étirée)
let stretchMode = 'oiseau';   // 'oiseau' | 'voix' | 'musique'
let logScale  = false;        // true = axe Y logarithmique
// ── AFFICHAGE DU SPECTROGRAMME ────────────────────────────────────────────
let dispMode      = 'vert';   // 'vert' (dégradé, amplitude^0.35) | 'praat' (gris inversé, dB)
let praatDyn      = 50;       // plage dynamique en dB sous le maximum
let praatWinMs    = 5;        // durée effective de la fenêtre gaussienne (ms)
let praatPreemph  = 6;        // pré-accentuation en dB/octave
let praatLocalRef = true;     // true = réf. sur la vue courante, false = fichier entier
let multiPitch = false;       // true = détection multi-notes (mode musique)
let stretchAlgo = 'wsola-oiseau';  // 'wsola-oiseau' | 'wsola-musique' | 'pv'
let stereo = false;  // traitement stéréo du time-stretching


// Calcule un spectrogramme basse résolution du fichier entier.
// Utilisé pour le rendu en temps réel pendant le glissement.
// Dessine le spectrogramme basse résolution pour la fenêtre [vs, ve]
// Utilisé pendant le glissement pour un rendu temps réel sans recalcul FFT
// Dessine la courbe haute résolution sauvegardée, décalée selon la nouvelle fenêtre
function drawCurveFromFull(vs, ve){
  const ctx=pc.getContext('2d'), W=pc.width, H=pc.height;
  ctx.clearRect(0,0,W,H);
  if(!showP) return;
  const winLen = ve - vs;
  const snapLen = slideVESnapshot - slideVSSnapshot;
  if(winLen<=0 || snapLen<=0) return;
  const yOf=hz=>hzToY(hz,H);

  if(multiPitch || pitchAlgo==='multi'){
    ctx.fillStyle='rgba(255,80,80,.9)';
    const visible = [];
    for(const frame of curveMusic){
      const tAbs = slideVSSnapshot + frame.t * snapLen;
      if(tAbs < vs || tAbs > ve) continue;
      const x = (tAbs - vs) / winLen * W;
      for(const n of frame.notes){
        const y = yOf(n.hz);
        ctx.beginPath(); ctx.arc(x,y,1.8,0,6.283); ctx.fill();
      }
      visible.push({t:(tAbs-vs)/winLen, notes:frame.notes});
    }
    if(showNotes && visible.length >= 2){
      const savedCM = curveMusic;
      curveMusic = visible;
      try{ labelHeldNotesMusic(ctx,W,H,yOf); }catch(e){}
      curveMusic = savedCM;
    }
    ctx.fillStyle='rgba(255,80,80,.9)';
    return;
  }

  // Mode oiseau / voix — courbe mono-voix depuis snapshot
  // La courbe snapshot couvre [slideVSSnapshot, slideVESnapshot] en proportion t∈[0,1]
  // On la remonte en temps absolu, puis on la projette sur la nouvelle fenêtre [vs, ve]
  ctx.fillStyle='rgba(255,80,80,.9)';
  const visible=[];
  for(const p of slideCurveSnapshot){
    if(!p) continue;
    const tAbs = slideVSSnapshot + p.t * snapLen;
    if(tAbs < vs || tAbs > ve) continue;
    const x = (tAbs - vs) / winLen * W;
    const y = yOf(p.hz);
    ctx.beginPath(); ctx.arc(x,y,1.6,0,6.283); ctx.fill();
    visible.push({t:(tAbs-vs)/winLen, hz:p.hz});
  }
  if(showNotes && visible.length >= 2){
    const savedCurve = curve;
    curve = visible;
    const savedML = window._overrideMinLen;
    window._overrideMinLen = slideMinLen;
    try { labelHeldNotes(ctx, W, H, yOf); } catch(e){}
    curve = savedCurve;
    window._overrideMinLen = savedML;
  }
  ctx.fillStyle='rgba(255,80,80,.9)';

  // Formants pendant le glissement — reprojection du snapshot
  if(showFormants && stretchMode==='voix' && formants.length){
    const fctx = fc.getContext('2d');
    fctx.clearRect(0,0,W,H);
    for(const p of formants){
      if(!p) continue;
      const tAbs = slideVSSnapshot + p.t * snapLen;
      if(tAbs < vs || tAbs > ve) continue;
      const x = (tAbs - vs) / winLen * W;
      if(p.f1 !== null){ fctx.fillStyle='rgba(74,200,240,.85)'; fctx.beginPath(); fctx.arc(x,yOf(p.f1),1.8,0,6.283); fctx.fill(); }
      if(p.f2 !== null){ fctx.fillStyle='rgba(180,100,255,.85)'; fctx.beginPath(); fctx.arc(x,yOf(p.f2),1.8,0,6.283); fctx.fill(); }
    }
  }
}

function drawSpecFromFull(vs, ve){
  if(!specFull) return;
  const {out, cols, maxBin, gMax, dur:totalDur} = specFull;
  const W=sc.width, H=sc.height;
  const ctx=sc.getContext('2d');
  const img=ctx.createImageData(W,H), px=img.data;
  // specFull.maxBin couvre jusqu'à Nyquist — utiliser sr/2 pour le mapping
  const nyquist = abuf.sampleRate / 2;
  // Même rendu qu'en vue normale pour éviter un clignotement pendant le
  // glissement — la référence est celle du spectrogramme basse résolution,
  // donc cohérente avec ses propres magnitudes.
  const praat = dispMode==='praat';
  let gainY=null, ref=1, invDyn=1;
  if(praat){
    gainY = new Float32Array(H);
    for(let y=0;y<H;y++) gainY[y] = Math.pow(10, preemphDb(yToHz(y,H))/20);
    const lo = specFull.loMaxBins;
    ref = 0;
    if(lo) for(let b=0;b<lo.length;b++){
      const v = lo[b] * Math.pow(10, preemphDb((b+0.5)/maxBin*nyquist)/20);
      if(v>ref) ref = v;
    }
    if(!(ref>0)) ref = gMax||1;
    invDyn = 1/Math.max(1, praatDyn);
  }
  for(let x=0; x<W; x++){
    const t = vs + (x/W) * (ve-vs);
    const ci = Math.min(Math.floor(t/totalDur * cols), cols-1);
    const off = ci * maxBin;
    for(let y=0; y<H; y++){
      const hz = yToHz(y, H);
      const binF = hz/nyquist*maxBin;
      const b0 = Math.min(Math.floor(binF), maxBin-1);
      const b1 = Math.min(b0+1, maxBin-1);
      const tf  = binF - b0;
      const val = (out[off+b0]||0)*(1-tf) + (out[off+b1]||0)*tf;
      let r,g,b;
      if(praat){
        const db = LN_TO_DB * Math.log(val*gainY[y]/ref + 1e-12);
        const u  = Math.max(0, Math.min(1, 1 + db*invDyn));
        r = g = b = Math.round(255*(1-u));
      } else {
        [r,g,b]=color(val/(gMax||1));
      }
      const i=(y*W+x)*4; px[i]=r; px[i+1]=g; px[i+2]=b; px[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

async function computeSpecFull(){
  if(!abuf) return;
  const COLS_LO = 400, FFTN_LO = 512;
  const data = monoMix(abuf);
  const sr = abuf.sampleRate;
  const total = data.length;
  const bins = FFTN_LO / 2;
  // Toujours couvrir jusqu'à Nyquist pour que autoDetectMode soit stable
  // quel que soit le mode courant au moment du calcul
  const maxBin = bins - 1;
  const win = hann(FFTN_LO);
  const out = new Float32Array(COLS_LO * maxBin);
  let gMax = 0;
  // Traitement par chunks pour ne pas bloquer le thread
  for(let c=0; c<COLS_LO; c++){
    if(c % 20 === 0) await tick(1);  // pause toutes les 20 colonnes
    const start = Math.floor(c / COLS_LO * (total - FFTN_LO));
    const m = fftMag(data, start, FFTN_LO, win, maxBin);
    const off = c * maxBin;
    for(let b=0; b<maxBin; b++){ out[off+b]=m[b]; if(m[b]>gMax) gMax=m[b]; }
  }

  // gMax haute résolution sur 50 points échantillonnés
  const FFTN_HI = 2048;
  const binsHi = FFTN_HI / 2;
  const maxBinHi = Math.min(binsHi-1, Math.floor(MFREQ/(sr/2)*binsHi));
  const winHi = hann(FFTN_HI);
  let gMaxHi = 0;
  // Max par bin sur tout le fichier : sert de référence « Glob » en mode Praat
  const gMaxHiBins = new Float32Array(maxBinHi);
  const COLS_SCAN = 50;
  for(let c=0; c<COLS_SCAN; c++){
    if(c % 10 === 0) await tick(1);
    const start = Math.floor(c / COLS_SCAN * (total - FFTN_HI));
    const m = fftMag(data, start, FFTN_HI, winHi, maxBinHi);
    for(let b=0; b<maxBinHi; b++){
      if(m[b]>gMaxHi) gMaxHi=m[b];
      if(m[b]>gMaxHiBins[b]) gMaxHiBins[b]=m[b];
    }
  }

  // Max par bin du spectrogramme basse résolution : référence Praat pour
  // l'aperçu pendant le glissement (drawSpecFromFull)
  const loMaxBins = new Float32Array(maxBin);
  for(let c=0;c<COLS_LO;c++){
    const off=c*maxBin;
    for(let b=0;b<maxBin;b++) if(out[off+b]>loMaxBins[b]) loMaxBins[b]=out[off+b];
  }

  specFull = {out, cols:COLS_LO, maxBin, gMax, gMaxHi, dur,
              gMaxHiBins, gMaxHiDf:(sr/2)/binsHi, gMaxHiSumW:sumWindow(winHi), loMaxBins};

  // Détection automatique du mode — specFull est maintenant prêt
  autoDetectMode();

  // Courbe de pitch sur tout le fichier
  const p1=(v=>isNaN(v)?1000:v)(parseInt(pmin.value)), p2=(v=>isNaN(v)?8000:v)(parseInt(pmax.value));
  const b1f=Math.floor(p1/MFREQ*maxBin), b2f=Math.ceil(p2/MFREQ*maxBin);
  curveFull=[];
  for(let c=0;c<COLS_LO;c++){
    const off=c*maxBin; let mv=0,pk=-1;
    for(let b=b1f;b<=Math.min(b2f,maxBin-1);b++){if(out[off+b]>mv){mv=out[off+b];pk=b;}}
    const t = c/COLS_LO * total/sr;
    curveFull.push(pk>=0&&mv>gMaxHi*0.04 ? {t, hz:pk/maxBin*MFREQ} : null);
  }
}

// Détecte automatiquement le mode parmi oiseau / voix / musique.
// Trois métriques sur 16 extraits répartis dans le fichier :
//   ratioHigh  : énergie > 2kHz / totale   → élevé chez l'oiseau
//   nPeaks     : nombre de pics spectraux   → élevé en musique polyphonique
//   ratioLow   : énergie < 300Hz / totale   → élevé en musique (basses)
let _detectingMode = false;

function autoDetectMode(){
  if(!specFull || !specFull.out || _detectingMode) return;
  _detectingMode = true;

  const { out, cols, maxBin } = specFull;
  // Utiliser la fréquence de Nyquist réelle, pas MFREQ (qui peut être 1200 en mode musique)
  const nyquist = abuf.sampleRate / 2;

  let totalEnergy=0, birdEnergy=0, voiceEnergy=0;
  let centroidSum=0, frameCount=0;

  for(let c=0; c<cols; c++){
    const off = c*maxBin;
    let colE=0, colCNum=0;
    for(let b=0; b<maxBin; b++){
      const e = out[off+b]*out[off+b];
      const hz = (b/maxBin)*nyquist;
      colE     += e;
      colCNum  += e*hz;
      if(hz>=2000 && hz<=8000) birdEnergy  += e;
      if(hz>=80   && hz<=1000) voiceEnergy += e;
    }
    if(colE > 0){
      totalEnergy  += colE;
      centroidSum  += colCNum/colE;
      frameCount++;
    }
  }

  if(frameCount===0){ _detectingMode=false; return; }

  const avgCentroid = centroidSum/frameCount;
  const birdRatio   = birdEnergy  / (totalEnergy||1);
  const voiceRatio  = voiceEnergy / (totalEnergy||1);

  let detectedMode;
  if(birdRatio > 0.4){
    detectedMode = 'oiseau';
  } else if(avgCentroid > 500){
    detectedMode = 'voix';
  } else {
    detectedMode = 'musique';
  }

  if(detectedMode === stretchMode && document.getElementById('mode'+detectedMode.charAt(0).toUpperCase()+detectedMode.slice(1)).classList.contains('on')){
    _detectingMode=false; return;
  }
  stretchMode = detectedMode;
  // Appliquer directement sans .click() pour éviter les problèmes de disabled/timing
  document.querySelectorAll('#modeSbs .mdb').forEach(b=>b.classList.remove('on'));
  document.getElementById('mode'+detectedMode.charAt(0).toUpperCase()+detectedMode.slice(1)).classList.add('on');
  if(detectedMode==='oiseau'){
    ymin.value=80; ymax.value=8000; applyAxis();
    pmin.value=1000; pmax.value=8000;
    showNotes=true; ntg.classList.add('on');
    setScaleLog(false); setMultiPitch(false); setPitchAlgo('peak');
    setAlgo('wsola-oiseau');
    $('rowFormants').style.display='none';
    showChordStrip(false);
    $('phraseToggleLabel').style.display=''; $('phtg').style.display='';
    detectPhrases();
  } else if(detectedMode==='musique'){
    ymin.value=80; ymax.value=1600; applyAxis();
    pmin.value=80; pmax.value=1200;
    showNotes=true; ntg.classList.add('on');
    showP=true; ptg.classList.add('on');
    setScaleLog(true); setMultiPitch(true); setPitchAlgo('multi');
    setAlgo('wsola-musique');
    $('rowFormants').style.display='none';
    showChordStrip(true);
    $('phraseToggleLabel').style.display='none'; $('phtg').style.display='none';
  } else {
    ymin.value=80; ymax.value=8000; applyAxis();
    pmin.value=80; pmax.value=1100;
    showNotes=false; ntg.classList.remove('on');
    setScaleLog(true); setMultiPitch(false); setPitchAlgo('peak');
    setAlgo('pv');
    $('rowFormants').style.display='flex';
    showChordStrip(false);
    $('phraseToggleLabel').style.display='none'; $('phtg').style.display='none';
  }
  _detectingMode = false;
}

// Overlap-add time stretch. factor>1 allonge (ralentit) sans changer la hauteur.
// Sur un signal mono. Fenêtre de Hann, recouvrement 50%.
function timeStretchOLA(input, sr, factor){
  const N = input.length;
  const frame = 1024;
  const synHop = frame >> 1;
  const anaHop = synHop / factor;
  const outLen = Math.ceil(N * factor) + frame;
  const out = new Float32Array(outLen);
  const winSum = new Float32Array(outLen);
  const w = hann(frame);
  let ana = 0, syn = 0;
  while(ana + frame < N){
    const a0 = Math.floor(ana);
    for(let i=0;i<frame;i++){
      const s = (input[a0+i]||0) * w[i];
      out[syn+i]    += s;
      winSum[syn+i] += w[i];
    }
    ana += anaHop;
    syn += synHop;
  }
  for(let i=0;i<outLen;i++){ if(winSum[i]>1e-6) out[i] /= winSum[i]; }
  const buf = actx.createBuffer(1, outLen, sr);
  buf.getChannelData(0).set(out);
  return buf;
}

// Phase vocoder time stretch — meilleur sur la voix humaine.
// Préserve la cohérence de phase entre trames successives.
function timeStretchPV(input, sr, factor){
  const N = input.length;
  const fftSize = factor >= 3 ? 8192 : factor >= 2 ? 4096 : 2048;
  const maxHop = Math.floor(fftSize * 0.75 / factor);  // garantit overlap suffisant
  const hop = Math.min(fftSize >> 2, maxHop);
  const synHop = Math.round(hop * factor);
  const outLen = Math.ceil(N * factor) + fftSize;
  const out = new Float32Array(outLen);
  const winSum = new Float32Array(outLen);
  // sqrt-Hann pour meilleure reconstruction
  const w = new Float32Array(fftSize);
  for(let i=0;i<fftSize;i++) w[i]=Math.sqrt(0.5-0.5*Math.cos(2*Math.PI*i/(fftSize-1)));

  const phaseAcc  = new Float32Array(fftSize/2);
  const lastPhase = new Float32Array(fftSize/2);
  const TWO_PI = 2*Math.PI;

  let anaPos=0, synPos=0;
  const totalFrames = Math.ceil((N-fftSize)/hop)||1;
  let frameCount=0;

  while(anaPos + fftSize < N){
    const re = new Float32Array(fftSize);
    const im = new Float32Array(fftSize);
    for(let i=0;i<fftSize;i++) re[i]=(input[Math.floor(anaPos)+i]||0)*w[i];
    fftInPlace(re, im);

    // Magnitudes et phases
    const mag   = new Float32Array(fftSize/2);
    const phase = new Float32Array(fftSize/2);
    for(let k=0;k<fftSize/2;k++){
      mag[k]  =Math.sqrt(re[k]*re[k]+im[k]*im[k]);
      phase[k]=Math.atan2(im[k],re[k]);
    }

    // Identity phase locking : détecter les pics
    const isPeak = new Uint8Array(fftSize/2);
    for(let k=1;k<fftSize/2-1;k++){
      if(mag[k]>mag[k-1]&&mag[k]>mag[k+1]) isPeak[k]=1;
    }

    // 1) Propager la phase des pics
    for(let k=0;k<fftSize/2;k++){
      if(!isPeak[k]) continue;
      let dPhase=phase[k]-lastPhase[k]-(TWO_PI*k*hop/fftSize);
      dPhase-=TWO_PI*Math.round(dPhase/TWO_PI);
      phaseAcc[k]+=synHop*(TWO_PI*k/fftSize+dPhase/hop);
    }

    // 2) Bins voisins : phase relative au pic le plus proche — O(N) deux passes
    const nearestPeak=new Int32Array(fftSize/2).fill(-1);
    let last=-1;
    for(let k=0;k<fftSize/2;k++){if(isPeak[k])last=k; if(last>=0)nearestPeak[k]=last;}
    last=-1;
    for(let k=fftSize/2-1;k>=0;k--){
      if(isPeak[k])last=k;
      if(last>=0&&(nearestPeak[k]<0||Math.abs(last-k)<Math.abs(nearestPeak[k]-k)))nearestPeak[k]=last;
    }
    const newRe=new Float32Array(fftSize);
    const newIm=new Float32Array(fftSize);
    for(let k=0;k<fftSize/2;k++){
      const p=nearestPeak[k];
      const accPhase=isPeak[k]?phaseAcc[k]:(p>=0?phaseAcc[p]+(phase[k]-phase[p]):phaseAcc[k]);
      lastPhase[k]=phase[k];
      newRe[k]=mag[k]*Math.cos(accPhase);
      newIm[k]=mag[k]*Math.sin(accPhase);
      if(k>0&&k<fftSize/2){newRe[fftSize-k]=newRe[k];newIm[fftSize-k]=-newIm[k];}
    }

    ifftInPlace(newRe, newIm);
    for(let i=0;i<fftSize;i++){
      out[synPos+i]    +=newRe[i]*w[i];
      winSum[synPos+i] +=w[i]*w[i];
    }
    anaPos+=hop; synPos+=synHop;
    frameCount++;
    if(frameCount%30===0) setOv(true, undefined, Math.min(95,Math.round(frameCount/totalFrames*100)));
  }

  for(let i=0;i<outLen;i++){if(winSum[i]>1e-6) out[i]/=winSum[i];}
  const buf=actx.createBuffer(1,outLen,sr);
  buf.getChannelData(0).set(out);
  return buf;
}

// FFT en place (Cooley-Tukey radix-2)
function fftInPlace(re, im){
  const N = re.length;
  for(let i=1,j=0;i<N;i++){
    let bit=N>>1;
    for(;j&bit;bit>>=1) j^=bit;
    j^=bit;
    if(i<j){ let t=re[i]; re[i]=re[j]; re[j]=t; t=im[i]; im[i]=im[j]; im[j]=t; }
  }
  for(let len=2;len<=N;len<<=1){
    const ang=-2*Math.PI/len;
    const wRe=Math.cos(ang), wIm=Math.sin(ang);
    for(let i=0;i<N;i+=len){
      let curRe=1, curIm=0;
      for(let j=0;j<len/2;j++){
        const uRe=re[i+j], uIm=im[i+j];
        const vRe=re[i+j+len/2]*curRe-im[i+j+len/2]*curIm;
        const vIm=re[i+j+len/2]*curIm+im[i+j+len/2]*curRe;
        re[i+j]=uRe+vRe; im[i+j]=uIm+vIm;
        re[i+j+len/2]=uRe-vRe; im[i+j+len/2]=uIm-vIm;
        const newRe=curRe*wRe-curIm*wIm;
        curIm=curRe*wIm+curIm*wRe; curRe=newRe;
      }
    }
  }
}

function ifftInPlace(re, im){
  for(let i=0;i<im.length;i++) im[i]=-im[i];
  fftInPlace(re, im);
  const N=re.length;
  for(let i=0;i<N;i++){ re[i]/=N; im[i]=-im[i]/N; }
}

// ── WEB WORKER POUR LE TIME-STRETCH ─────────────────────────────────────────
// Le Worker contient toutes les fonctions de calcul (hann, FFT, WSOLA, PV).
// Il tourne dans un thread séparé → l'interface reste réactive pendant le calcul.
const WORKER_CODE = `
function hann(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=0.5*(1-Math.cos(2*Math.PI*i/(N-1)));return w;}

function fftInPlace(re,im){
  const N=re.length;
  for(let i=1,j=0;i<N;i++){
    let bit=N>>1;
    for(;j&bit;bit>>=1)j^=bit;
    j^=bit;
    if(i<j){let t=re[i];re[i]=re[j];re[j]=t;t=im[i];im[i]=im[j];im[j]=t;}
  }
  for(let len=2;len<=N;len<<=1){
    const ang=-2*Math.PI/len,wRe=Math.cos(ang),wIm=Math.sin(ang);
    for(let i=0;i<N;i+=len){
      let cRe=1,cIm=0;
      for(let j=0;j<len/2;j++){
        const uRe=re[i+j],uIm=im[i+j];
        const vRe=re[i+j+len/2]*cRe-im[i+j+len/2]*cIm;
        const vIm=re[i+j+len/2]*cIm+im[i+j+len/2]*cRe;
        re[i+j]=uRe+vRe;im[i+j]=uIm+vIm;
        re[i+j+len/2]=uRe-vRe;im[i+j+len/2]=uIm-vIm;
        const nr=cRe*wRe-cIm*wIm;cIm=cRe*wIm+cIm*wRe;cRe=nr;
      }
    }
  }
}
function ifftInPlace(re,im){
  for(let i=0;i<im.length;i++)im[i]=-im[i];
  fftInPlace(re,im);
  const N=re.length;
  for(let i=0;i<N;i++){re[i]/=N;im[i]=-im[i]/N;}
}

function wsola(input,factor,options){
  options=options||{};
  if(factor<=0)return input;
  if(Math.abs(factor-1)<0.001){const b=new Float32Array(input.length);b.set(input);return b;}
  const frameSize=options.frameSize||1024;
  const overlap=options.overlap||0.75;
  const searchRadius=options.searchRadius||128;
  const synthesisHop=Math.floor(frameSize*(1-overlap));
  const analysisHop=synthesisHop/factor;
  const outputLength=Math.round(input.length*factor);
  const output=new Float32Array(outputLength);
  const weight=new Float32Array(outputLength);
  const win=new Float32Array(frameSize);
  for(let i=0;i<frameSize;i++)win[i]=0.5-0.5*Math.cos(2*Math.PI*i/(frameSize-1));
  let inPos=0,outPos=0;
  const totalFrames=Math.ceil((outputLength-frameSize)/synthesisHop)||1;
  let frameCount=0;
  for(let i=0;i<frameSize;i++){output[i]+=(input[i]||0)*win[i];weight[i]+=win[i];}
  inPos+=analysisHop;outPos+=synthesisHop;
  while(outPos+frameSize<outputLength&&inPos+frameSize<input.length){
    const expectedInPos=Math.round(inPos);
    let bestOffset=0,bestScore=-Infinity;
    const prevOutPos=outPos-synthesisHop;
    for(let offset=-searchRadius;offset<=searchRadius;offset++){
      const candidatePos=expectedInPos+offset;
      if(candidatePos<0||candidatePos+frameSize>=input.length)continue;
      let corr=0,eA=0,eB=0;
      for(let i=0;i<synthesisHop;i++){
        const a=input[candidatePos+i];
        const b=output[prevOutPos+synthesisHop+i];
        corr+=a*b;eA+=a*a;eB+=b*b;
      }
      const score=corr/(Math.sqrt(eA*eB)+1e-12);
      if(score>bestScore){bestScore=score;bestOffset=offset;}
    }
    const bestInPos=expectedInPos+bestOffset;
    for(let i=0;i<frameSize;i++){
      const outIndex=outPos+i;
      if(outIndex>=outputLength)break;
      output[outIndex]+=(input[bestInPos+i]||0)*win[i];
      weight[outIndex]+=win[i];
    }
    inPos+=analysisHop;outPos+=synthesisHop;
    frameCount++;
    if(frameCount%30===0)postMessage({type:'progress',pct:Math.round(frameCount/totalFrames*100)});
  }
  for(let i=0;i<outputLength;i++)if(weight[i]>1e-12)output[i]/=weight[i];
  return output;
}

function timeStretchPV(input,factor){
  const N=input.length;
  const fftSize=2048;
  const maxHop=Math.floor(fftSize*0.75/factor);const hop=Math.min(fftSize>>2,maxHop);
  const synHop=Math.round(hop*factor);
  const outLen=Math.ceil(N*factor)+fftSize;
  const out=new Float32Array(outLen);
  const winSum=new Float32Array(outLen);
  const w=new Float32Array(fftSize);
  for(let i=0;i<fftSize;i++)w[i]=Math.sqrt(0.5-0.5*Math.cos(2*Math.PI*i/(fftSize-1)));
  const phaseAcc=new Float32Array(fftSize/2);
  const lastPhase=new Float32Array(fftSize/2);
  const TWO_PI=2*Math.PI;
  let anaPos=0,synPos=0;
  const totalFrames=Math.ceil((N-fftSize)/hop)||1;
  let frameCount=0;
  while(anaPos+fftSize<N){
    const re=new Float32Array(fftSize),im=new Float32Array(fftSize);
    for(let i=0;i<fftSize;i++)re[i]=(input[Math.floor(anaPos)+i]||0)*w[i];
    fftInPlace(re,im);
    const mag=new Float32Array(fftSize/2),phase=new Float32Array(fftSize/2);
    for(let k=0;k<fftSize/2;k++){mag[k]=Math.sqrt(re[k]*re[k]+im[k]*im[k]);phase[k]=Math.atan2(im[k],re[k]);}
    const isPeak=new Uint8Array(fftSize/2);
    for(let k=1;k<fftSize/2-1;k++)if(mag[k]>mag[k-1]&&mag[k]>mag[k+1])isPeak[k]=1;
    for(let k=0;k<fftSize/2;k++){
      if(!isPeak[k])continue;
      let dPhase=phase[k]-lastPhase[k]-(TWO_PI*k*hop/fftSize);
      dPhase-=TWO_PI*Math.round(dPhase/TWO_PI);
      phaseAcc[k]+=synHop*(TWO_PI*k/fftSize+dPhase/hop);
    }
    const nearestPeak2=new Int32Array(fftSize/2).fill(-1);
    let lp2=-1;
    for(let k=0;k<fftSize/2;k++){if(isPeak[k])lp2=k;if(lp2>=0)nearestPeak2[k]=lp2;}
    lp2=-1;
    for(let k=fftSize/2-1;k>=0;k--){
      if(isPeak[k])lp2=k;
      if(lp2>=0&&(nearestPeak2[k]<0||Math.abs(lp2-k)<Math.abs(nearestPeak2[k]-k)))nearestPeak2[k]=lp2;
    }
    const newRe=new Float32Array(fftSize),newIm=new Float32Array(fftSize);
    for(let k=0;k<fftSize/2;k++){
      const p=nearestPeak2[k];
      const accPhase=isPeak[k]?phaseAcc[k]:(p>=0?phaseAcc[p]+(phase[k]-phase[p]):phaseAcc[k]);
      lastPhase[k]=phase[k];
      newRe[k]=mag[k]*Math.cos(accPhase);newIm[k]=mag[k]*Math.sin(accPhase);
      if(k>0&&k<fftSize/2){newRe[fftSize-k]=newRe[k];newIm[fftSize-k]=-newIm[k];}
    }
    ifftInPlace(newRe,newIm);
    for(let i=0;i<fftSize;i++){out[synPos+i]+=newRe[i]*w[i];winSum[synPos+i]+=w[i]*w[i];}
    anaPos+=hop;synPos+=synHop;
    frameCount++;
    if(frameCount%30===0)postMessage({type:'progress',pct:Math.round(frameCount/totalFrames*100)});
  }
  for(let i=0;i<outLen;i++)if(winSum[i]>1e-6)out[i]/=winSum[i];
  return out;
}

let stretchWorker = null;
let workerFailed = false;  // si le Worker a échoué, on bascule en synchrone

function getStretchWorker(){
  if(workerFailed) return null;

// Fallback synchrone (même code que le Worker mais sur le thread principal)
function timeStretchSync(samples, mode, factor){
  if(mode==='voix'){
    // PV inline simplifié
    const N=samples.length;
    const fftSize=factor>=3?8192:factor>=2?4096:2048;
    const maxHop=Math.floor(fftSize*0.75/factor);const hop=Math.min(fftSize>>2,maxHop);
    const synHop=Math.round(hop*factor);
    const outLen=Math.ceil(N*factor)+fftSize;
    const out=new Float32Array(outLen);
    const winSum=new Float32Array(outLen);
    const w=new Float32Array(fftSize);
    for(let i=0;i<fftSize;i++) w[i]=Math.sqrt(0.5-0.5*Math.cos(2*Math.PI*i/(fftSize-1)));
    const phaseAcc=new Float32Array(fftSize/2);
    const lastPhase=new Float32Array(fftSize/2);
    const TWO_PI=2*Math.PI;
    let anaPos=0,synPos=0;
    while(anaPos+fftSize<N){
      const re=new Float32Array(fftSize),im=new Float32Array(fftSize);
      for(let i=0;i<fftSize;i++) re[i]=(samples[Math.floor(anaPos)+i]||0)*w[i];
      fftInPlace(re,im);
      const mag=new Float32Array(fftSize/2),phase=new Float32Array(fftSize/2);
      for(let k=0;k<fftSize/2;k++){mag[k]=Math.sqrt(re[k]*re[k]+im[k]*im[k]);phase[k]=Math.atan2(im[k],re[k]);}
      const isPeak=new Uint8Array(fftSize/2);
      for(let k=1;k<fftSize/2-1;k++) if(mag[k]>mag[k-1]&&mag[k]>mag[k+1]) isPeak[k]=1;
      for(let k=0;k<fftSize/2;k++){
        if(!isPeak[k]) continue;
        let dPhase=phase[k]-lastPhase[k]-(TWO_PI*k*hop/fftSize);
        dPhase-=TWO_PI*Math.round(dPhase/TWO_PI);
        phaseAcc[k]+=synHop*(TWO_PI*k/fftSize+dPhase/hop);
      }
      // Précalcul O(N) du pic le plus proche
      const nearPeak=new Int32Array(fftSize/2).fill(-1);
      let lp=-1;
      for(let k=0;k<fftSize/2;k++){if(isPeak[k])lp=k;if(lp>=0)nearPeak[k]=lp;}
      lp=-1;
      for(let k=fftSize/2-1;k>=0;k--){
        if(isPeak[k])lp=k;
        if(lp>=0&&(nearPeak[k]<0||Math.abs(lp-k)<Math.abs(nearPeak[k]-k)))nearPeak[k]=lp;
      }
      const nRe=new Float32Array(fftSize),nIm=new Float32Array(fftSize);
      for(let k=0;k<fftSize/2;k++){
        let acc;
        if(isPeak[k]){acc=phaseAcc[k];}
        else{const p=nearPeak[k];acc=p>=0?phaseAcc[p]+(phase[k]-phase[p]):phaseAcc[k];}
        lastPhase[k]=phase[k];
        nRe[k]=mag[k]*Math.cos(acc);nIm[k]=mag[k]*Math.sin(acc);
        if(k>0&&k<fftSize/2){nRe[fftSize-k]=nRe[k];nIm[fftSize-k]=-nIm[k];}
      }
      ifftInPlace(nRe,nIm);
      for(let i=0;i<fftSize;i++){out[synPos+i]+=nRe[i]*w[i];winSum[synPos+i]+=w[i]*w[i];}
      anaPos+=hop;synPos+=synHop;
    }
    for(let i=0;i<outLen;i++) if(winSum[i]>1e-6) out[i]/=winSum[i];
    return out;
  } else {
    // WSOLA
    const opts=mode==='musique'
      ?{frameSize:4096,overlap:0.75,searchRadius:512}
      :mode==='wsola-voix'
      ?{frameSize:2048,overlap:0.75,searchRadius:256}
      :{frameSize:1024,overlap:0.75,searchRadius:128};
    const frameSize=opts.frameSize,overlap=opts.overlap,searchRadius=opts.searchRadius;
    const synthesisHop=Math.floor(frameSize*(1-overlap));
    const analysisHop=synthesisHop/factor;
    const outputLength=Math.round(samples.length*factor);
    const output=new Float32Array(outputLength);
    const weight=new Float32Array(outputLength);
    const win=new Float32Array(frameSize);
    for(let i=0;i<frameSize;i++) win[i]=0.5-0.5*Math.cos(2*Math.PI*i/(frameSize-1));
    let inPos=0,outPos=0;
    for(let i=0;i<frameSize;i++){output[i]+=(samples[i]||0)*win[i];weight[i]+=win[i];}
    inPos+=analysisHop;outPos+=synthesisHop;
    while(outPos+frameSize<outputLength&&inPos+frameSize<samples.length){
      const exp=Math.round(inPos);
      let bestOffset=0,bestScore=-Infinity;
      const prev=outPos-synthesisHop;
      for(let offset=-searchRadius;offset<=searchRadius;offset++){
        const cp=exp+offset;
        if(cp<0||cp+frameSize>=samples.length) continue;
        let corr=0,eA=0,eB=0;
        for(let i=0;i<synthesisHop;i++){const a=samples[cp+i],b=output[prev+synthesisHop+i];corr+=a*b;eA+=a*a;eB+=b*b;}
        const score=corr/(Math.sqrt(eA*eB)+1e-12);
        if(score>bestScore){bestScore=score;bestOffset=offset;}
      }
      const bp=exp+bestOffset;
      for(let i=0;i<frameSize;i++){const oi=outPos+i;if(oi>=outputLength)break;output[oi]+=(samples[bp+i]||0)*win[i];weight[oi]+=win[i];}
      inPos+=analysisHop;outPos+=synthesisHop;
    }
    for(let i=0;i<outputLength;i++) if(weight[i]>1e-12) output[i]/=weight[i];
    return output;
  }
}

function clearStretchCache(){ stretchCache={}; }

// Récupère (ou calcule) le buffer à jouer pour la vitesse demandée
const STRETCH_CACHE_MAX = 3;
async function getPlayBuffer(spd, silent=false){
  if(!spd||isNaN(spd)||spd<=0) spd=1;
  if(Math.abs(spd-1)<0.001) return abuf;
  const key=stretchMode+':'+stretchAlgo+':'+(stereo?'s':'m')+':'+String(spd);
  if(stretchCache[key]) return stretchCache[key];
  _stretchCancelled = false;
  if(!silent){
    _lastOvPct = 0;
    setOv(true,'Préparation ×'+spd+'…',0);
    cancelBtn.style.display='block';
    await tick(20);
  }
  const factor=1/spd;
  const algoMode = stretchAlgo==='pv'           ? 'voix'
                 : stretchAlgo==='wsola-musique' ? 'musique'
                 : stretchAlgo==='wsola-voix'    ? 'wsola-voix'
                 : 'oiseau';
  const worker = stretchAlgo !== 'pv' ? getStretchWorker() : null;

  // Fonction qui étire un canal (Float32Array) via Worker ou fallback
  async function stretchChannel(samples){
    let _wasCancelled = false;
    let result;
    if(worker){
      const s = samples.slice();
      result = await new Promise((resolve,reject)=>{
        const timeout=setTimeout(()=>{ reject(new Error('Worker timeout')); }, 30000);
        _cancelReject = ()=>{ _wasCancelled=true; clearTimeout(timeout); reject(new Error('cancelled')); };
        function onMsg(e){
          if(e.data.type==='progress'){ if(!silent) setOv(true, undefined, e.data.pct); }
          else if(e.data.type==='done'){
            clearTimeout(timeout); _cancelReject=null;
            worker.removeEventListener('message',onMsg);
            worker.removeEventListener('error',onErr);
            resolve(new Float32Array(e.data.samples));
          }
        }
        function onErr(e){
          clearTimeout(timeout); _cancelReject=null;
          worker.removeEventListener('message',onMsg);
          worker.removeEventListener('error',onErr);
          reject(e);
        }
        worker.addEventListener('message',onMsg);
        worker.addEventListener('error',onErr);
        worker.postMessage({mode:algoMode,factor,samples:s.buffer},[s.buffer]);
      }).catch(err=>{
        if(err.message==='cancelled'){ _wasCancelled=true; return null; }
        console.warn('Worker failed, falling back to sync:', err);
        stretchWorker=null; workerFailed=true;
        return null;
      });
    }
    if(!result && !_wasCancelled){
      result = await timeStretchSyncAsync(samples, algoMode, factor);
    }
    return result || null;
  }

  let buf;
  if(stereo && abuf.numberOfChannels >= 2){
    const left  = new Float32Array(abuf.getChannelData(0));
    const right = new Float32Array(abuf.getChannelData(1));
    // Utiliser le fallback async pour les deux canaux — le Worker ne peut pas
    // être appelé deux fois de suite avec des buffers transférés
    const strL = await timeStretchSyncAsync(left,  algoMode, factor, 0,  50);
    if(!strL || _stretchCancelled){ cancelBtn.style.display='none'; if(!silent) setOv(false); return null; }
    const strR = await timeStretchSyncAsync(right, algoMode, factor, 50, 100);
    if(!strR || _stretchCancelled){ cancelBtn.style.display='none'; if(!silent) setOv(false); return null; }
    buf = actx.createBuffer(2, strL.length, abuf.sampleRate);
    buf.getChannelData(0).set(strL);
    buf.getChannelData(1).set(strR);
  } else {
    // Mono (comportement d'origine)
    const mono = monoMix(abuf);
    const stretched = await stretchChannel(mono);
    if(!stretched){ cancelBtn.style.display='none'; if(!silent) setOv(false); return abuf; }
    buf = actx.createBuffer(1, stretched.length, abuf.sampleRate);
    buf.getChannelData(0).set(stretched);
  }
  const keys=Object.keys(stretchCache);
  if(keys.length >= STRETCH_CACHE_MAX) delete stretchCache[keys[0]];
  stretchCache[key]=buf;
  cancelBtn.style.display='none';
  if(!silent) setOv(false);
  return buf;
}

// ── PLAYBACK ────────────────────────────────────────────────────────────────
// On joue playBuf à playbackRate=1 → hauteur préservée.
// Lecture confinée à la fenêtre visible [viewStart, viewEnd] (temps réel).
// Le buffer étiré a une échelle = temps_réel / speed.
// Garantit un contexte audio en état 'running'. Gère l'état iOS 'interrupted'.
async function ensureContext(){
  if(actx && actx.state==='running') return;
  // 1) tenter resume()
  if(actx){
    try{ await actx.resume(); }catch(e){}
    let tries=0;
    while(actx.state!=='running' && actx.state!=='closed' && tries<8){ await tick(10); tries++; }
    if(actx.state==='running') return;
  }
  // 2) échec → recréer un contexte neuf et y reconstruire le buffer PCM
  const oldBuf = abuf;
  try{ if(actx) actx.close(); }catch(e){}
  actx = new (window.AudioContext||window.webkitAudioContext)();
  try{ await actx.resume(); }catch(e){}
  if(oldBuf){
    // recopier les données PCM dans un buffer du nouveau contexte
    const nb = actx.createBuffer(oldBuf.numberOfChannels, oldBuf.length, oldBuf.sampleRate);
    for(let ch=0; ch<oldBuf.numberOfChannels; ch++){
      nb.copyToChannel ? nb.copyToChannel(oldBuf.getChannelData(ch), ch)
                       : nb.getChannelData(ch).set(oldBuf.getChannelData(ch));
    }
    abuf = nb;
  }
  clearStretchCache();   // les buffers étirés appartenaient à l'ancien contexte
}

// iosAudio keep-alive : maintient la session audio iOS active (mode silencieux)
// Joue un WAV silencieux court en boucle — aucun lien avec le contenu réel
function makeSilentWavURL(){
  const sr=44100, dur=2, len=sr*dur;
  const buf=new ArrayBuffer(44+len*2);
  const v=new DataView(buf);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  w(0,'RIFF'); v.setUint32(4,36+len*2,true); w(8,'WAVE');
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,1,true); v.setUint32(24,sr,true);
  v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,'data'); v.setUint32(40,len*2,true);
  // données = zéros (silence)
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}
const SILENT_WAV_URL = makeSilentWavURL();

async function play(){
  if(!abuf) return;
  clearTimeout(stopTimer);
  try{
    if(actx){ actx.resume();
      const b=actx.createBuffer(1,1,actx.sampleRate);
      const s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); s.start(0);
    }
  }catch(e){}
  await ensureContext();
  playBuf = await getPlayBuffer(speed);

  // iosAudio keep-alive : active la session audio iOS → mode silencieux contourné
  try{
    if(iosAudio.paused){
      iosAudio.src = SILENT_WAV_URL;
      iosAudio.loop = true;
      iosAudio.volume = 0;
      await iosAudio.play();
    }
  }catch(e){ console.warn('iosAudio.play:', e); }

  stopSrc();
  src=actx.createBufferSource(); src.buffer=playBuf;
  src.playbackRate.value=1; src.connect(actx.destination);

  const lo = viewStart / speed, hi = viewEnd / speed;
  if(offset < viewStart) offset = viewStart;
  if(offset >= viewEnd) offset = viewStart;  // hors région → retour début seulement si dépassement réel
  const bufOffset = offset / speed;

  src.loop = true;   // toujours en boucle native — c'est loop() qui gère l'arrêt
  src.loopStart = lo;
  src.loopEnd   = hi;

  t0=actx.currentTime;
  try{
    src.start(0, bufOffset);
  }catch(err){ console.error('start error:', err); return; }
  playing=true; setIcon(true); ph.style.display='block';
  src.onended=()=>{ if(playing){ stopAll(); } };
  loop();
}

function pause(){
  if(!playing) return;
  clearTimeout(stopTimer);
  offset = currentPlayPos;  // position exacte telle que vue par loop()
  if(offset > viewEnd) offset = viewEnd;
  if(offset < viewStart) offset = viewStart;
  if(!iosAudio.paused) iosAudio.pause();
  stopSrc();
  playing=false; setIcon(false); cancelAnimationFrame(raf);
}

function stopAll(){
  clearTimeout(stopTimer);

}
function stopSrc(){ if(src){src.onended=null;try{src.stop();}catch(e){}src.disconnect();src=null;} }
function loop(){
  if(!playing)return;
  const winLen = viewEnd - viewStart;
  let pos = offset + (actx.currentTime - t0) * speed;
  if(looping && winLen>0){
    while(pos >= viewEnd) pos -= winLen;
  } else if(pos >= viewEnd){
    // Fin naturelle sans boucle → curseur reste à la fin
    currentPlayPos = viewEnd;
    stopSrc();
    iosAudio.pause();
    playing=false; setIcon(false); cancelAnimationFrame(raf);
    offset = viewEnd;
    if(drawn){
      drawPlayhead(viewEnd);
      pf.style.width='100%'; pr.value=1000;
      td.textContent=fmt(viewEnd)+' / '+fmt(viewEnd);
    }
    return;
  }
  currentPlayPos = pos;
  drawPlayhead(pos);
  const r = winLen>0 ? (pos - viewStart)/winLen : 0;
  pf.style.width=(r*100)+'%'; pr.value=Math.round(r*1000);
  td.textContent=fmt(pos)+' / '+fmt(viewEnd);
  raf=requestAnimationFrame(loop);
}
// Place la tête de lecture (pos en temps réel) relativement à la fenêtre
function drawPlayhead(pos){
  if(!drawn) return;
  const winLen = viewEnd - viewStart;
  const r = winLen>0 ? (pos - viewStart)/winLen : 0;
  ph.style.left = (Math.max(0,Math.min(1,r))*100)+'%';
}

// ── SÉLECTION PAR GLISSEMENT (zoom sur région) ──────────────────────────────
const viz = sc.parentElement;
function evX(e){
  const rect = viz.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return Math.max(0, Math.min(rect.width, cx)) / rect.width;  // 0..1 dans la fenêtre
}
function xToTime(r){ return viewStart + r*(viewEnd-viewStart); }

function selStart(e){
  if(!drawn) return;
  if(e.target && e.target.closest && e.target.closest('#zoomBadge')) return;

  // Un doigt sur le curseur blanc → drag de position
  if(e.target && e.target.closest && e.target.closest('#ph')){
    draggingPH=true;
    draggingPHWasPlaying=playing;
    if(playing) pause();
    e.preventDefault(); return;
  }

  // En vue générale : sélection simple, pas de long press
  if(!viz.classList.contains('zoomed')){
    selecting=true; selX0=evX(e); selX1=selX0;
    sel.style.display='block'; selrd.style.display='block';
    updateSelUI(); e.preventDefault(); return;
  }

  // Mode zoom : long press (400ms) → slide, court tap → sélection zoom
  const startX = e.touches ? e.touches[0].clientX : e.clientX;
  const startY = e.touches ? e.touches[0].clientY : e.clientY;
  slideTimer = setTimeout(()=>{
    if(selecting){
      selecting=false;
      sel.style.display='none'; selrd.style.display='none';
      sliding=true;
      slideStartX=startX;
      slideStartVS=viewStart; slideStartVE=viewEnd;
      slideCurveSnapshot = curve.slice();
      slideVSSnapshot = viewStart;
      slideVESnapshot = viewEnd;
      const nonNull = curve.filter(p=>p).length;
      slideMinLen = Math.max(1, Math.floor(nonNull / 20));
      drawSpecFromFull(viewStart, viewEnd);
      drawCurveFromFull(viewStart, viewEnd);
      tlbl.innerHTML='<span style="position:absolute;left:0;right:0;text-align:center;color:var(--acc);font-size:10px">← Glisser →</span>';
      sc.style.outline='2px solid rgba(126,207,110,.5)';
    }
  }, 400);

  selecting=true; selX0=evX(e); selX1=selX0;
  sel.style.display='block'; selrd.style.display='block';
  updateSelUI();
  e.preventDefault();
}
function selMove(e){
  if(sliding){
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const rect = viz.getBoundingClientRect();
    const dx = (slideStartX - cx) / rect.width;  // déplacement relatif
    const winLen = slideStartVE - slideStartVS;
    let ns = slideStartVS + dx * winLen;
    let ne = slideStartVE + dx * winLen;
    if(ns<0){ ne-=ns; ns=0; }
    if(ne>dur){ ns-=(ne-dur); ne=dur; }
    viewStart=Math.max(0,ns); viewEnd=Math.min(dur,ne);
    // Redessiner depuis specFull en temps réel
    drawSpecFromFull(viewStart, viewEnd);
    drawCurveFromFull(viewStart, viewEnd);
    updatePanButtons();
    // Maintenir le curseur visible pendant le glissement
    if(!playing && offset >= viewStart && offset < viewEnd){
      ph.style.display='block';
      drawPlayhead(offset);
    } else if(!playing){
      ph.style.display='none';  // hors zone → on le cache
    }
    setZoomBadge(true);
    e.preventDefault(); return;
  }
  if(draggingPH){
    const r=evX(e);
    offset=xToTime(r);
    offset=Math.max(viewStart, Math.min(viewEnd, offset));
    const winLen=viewEnd-viewStart;
    const rr=winLen>0?(offset-viewStart)/winLen:0;
    pf.style.width=(rr*100)+'%'; pr.value=Math.round(rr*1000);
    td.textContent=fmt(offset)+' / '+fmt(viewEnd);
    drawPlayhead(offset);
    e.preventDefault(); return;
  }
  if(!selecting) return;
  if(slideTimer){ clearTimeout(slideTimer); slideTimer=null; }
  selX1=evX(e); updateSelUI(); e.preventDefault();
}
function selEnd(e){
  clearTimeout(slideTimer); slideTimer=null;
  if(sliding){
    sliding=false;
    sc.style.outline='';
    const wasPlaying = playing;
    if(wasPlaying) ph.style.display='none';  // loop() la remettra ; en pause on garde visible

    const snap = {offset0: offset, t0_0: t0, vs0: viewStart, ve0: viewEnd};
    pushView();
    setZoomBadge(true);
    const job=busy;
    analyze(job).then(()=>{ afterAnalyze(job, wasPlaying, snap); });
    e.preventDefault(); return;
  }
  if(draggingPH){
    draggingPH=false;
    if(draggingPHWasPlaying) play();
    e.preventDefault(); return;
  }
  if(!selecting) return;
  selecting=false;
  const a=Math.min(selX0,selX1), b=Math.max(selX0,selX1);
  sel.style.display='none'; selrd.style.display='none';
  // Ignorer les sélections trop petites (tap accidentel)
  if(b-a < 0.02){ return; }
  const t0s=xToTime(a), t1s=xToTime(b);
  const snap = {offset0: offset, t0_0: t0, vs0: viewStart, ve0: viewEnd};
  const wasPlaying = playing;
  pushView();
  viewStart=t0s; viewEnd=t1s;

  setZoomBadge(true);
  ph.style.display='none';
  const job=busy;
  analyze(job).then(()=>{ afterAnalyze(job, wasPlaying, snap); });
}
// Appelé après toute ré-analyse suite à un zoom/dézoom/pan/glissement.
// Recadre offset, met à jour l'UI, relance la lecture si elle était active.
async function afterAnalyze(job, wasPlaying, snap){
  if(job !== busy) return;
  // snap = {offset0, t0_0, vs0, ve0} capturés AVANT tout changement de vue
  // On recalcule la position exacte ICI, après l'analyse, depuis l'horloge audio
  let livePos;
  if(wasPlaying && playing && snap){
    livePos = snap.offset0 + (actx.currentTime - snap.t0_0) * speed;
    // Appliquer le modulo de boucle avec les ANCIENNES bornes (avant zoom/dézoom)
    if(looping && snap.vs0 !== undefined){
      const oldWin = snap.ve0 - snap.vs0;
      if(oldWin > 0){
        while(livePos >= snap.ve0) livePos -= oldWin;
        while(livePos <  snap.vs0) livePos += oldWin;
      }
    }
  } else if(snap){
    livePos = snap.offset0;
  } else {
    livePos = offset;
  }
  const outOfView = livePos < viewStart || livePos >= viewEnd;

  if(wasPlaying && playing && !outOfView){
    offset = livePos;
    t0 = actx.currentTime;
    if(src){
      src.loopStart = viewStart / speed;
      src.loopEnd   = viewEnd   / speed;
    }
  } else if(outOfView){
    offset = viewStart;
  } else {
    offset = livePos;
  }

  const winLen = viewEnd - viewStart;
  const r = winLen > 0 ? (offset - viewStart) / winLen : 0;
  pf.style.width = (r * 100) + '%'; pr.value = Math.round(r * 1000);
  td.textContent = fmt(offset) + ' / ' + fmt(viewEnd);
  timeLabels();

  if(wasPlaying){
    if(!playing){
      offset = outOfView ? viewStart : livePos;
      await play();
    } else if(outOfView){
      pause();
      offset = viewStart;
      await play();
    }
    // curseur géré par loop()
  } else {
    ph.style.display = 'block'; drawPlayhead(offset);
  }
}
function setZoomBadge(on){
  zoomBadge.classList.toggle('on', on);
  viz.classList.toggle('zoomed', on);
  if(on){ zoomTxt.textContent = fmt(viewStart)+' → '+fmt(viewEnd); updatePanButtons(); }
  updateZoomBack();
}
function updateSelUI(){
  const a=Math.min(selX0,selX1), b=Math.max(selX0,selX1);
  sel.style.left=(a*100)+'%'; sel.style.width=((b-a)*100)+'%';
  selrd.textContent = fmt(xToTime(a))+' → '+fmt(xToTime(b));
}
viz.addEventListener('touchstart', selStart, {passive:false});
viz.addEventListener('touchmove',  selMove,  {passive:false});
viz.addEventListener('touchend',   selEnd);
viz.addEventListener('mousedown',  selStart);
window.addEventListener('mousemove',selMove);
window.addEventListener('mouseup',  selEnd);
zoomExit.addEventListener('click', e=>{ e.stopPropagation(); exitZoom(); });
zoomExit.addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); exitZoom(); });

function goBack(){
  if(!abuf || zoomHistory.length === 0) return;
  const prev = zoomHistory.pop();
  const snap = {offset0: offset, t0_0: t0, vs0: viewStart, ve0: viewEnd};
  const wasPlaying = playing;
  viewStart = prev.vs; viewEnd = prev.ve;
  const isGeneral = viewStart <= 0 && viewEnd >= dur;
  if(isGeneral) phraseIdx = -1;
  isGeneral ? setZoomBadge(false) : setZoomBadge(true);
  updateZoomBack();
  ph.style.display = 'none';
  const job = busy;
  analyze(job).then(()=>{ afterAnalyze(job, wasPlaying, snap); });
}
$('zoomBack').addEventListener('click',  e=>{ e.stopPropagation(); goBack(); });
$('zoomBack').addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); goBack(); });

function updatePanButtons(){
  const pl=document.getElementById('panLeft');
  const pr=document.getElementById('panRight');
  if(!pl||!pr) return;
  pl.disabled = viewStart <= 0;
  pr.disabled = viewEnd >= dur;
}

function zoomOutStep(){
  if(!abuf) return;
  const FACTOR = 1.5;
  const center = (viewStart + viewEnd) / 2;
  const newHalf = (viewEnd - viewStart) * FACTOR / 2;
  let ns = center - newHalf;
  let ne = center + newHalf;
  if(ns < 0){ ne = Math.min(dur, ne - ns); ns = 0; }
  if(ne > dur){ ns = Math.max(0, ns - (ne - dur)); ne = dur; }
  const snap = {offset0: offset, t0_0: t0, vs0: viewStart, ve0: viewEnd};
  pushView();
  viewStart = Math.max(0, ns);
  viewEnd   = Math.min(dur, ne);
  if(viewStart <= 0 && viewEnd >= dur){ exitZoom(); return; }
  setZoomBadge(true);
  updatePanButtons();
  const wasPlaying = playing;
  ph.style.display='none';

  const job=busy;
  analyze(job).then(()=>{ afterAnalyze(job, wasPlaying, snap); });
}

function panView(dir){
  if(!abuf) return;
  const winLen = viewEnd - viewStart;
  const step = winLen * 0.5;
  let ns = viewStart + dir*step;
  let ne = viewEnd   + dir*step;
  if(ns < 0){ ne -= ns; ns = 0; }
  if(ne > dur){ ns -= (ne-dur); ne = dur; }
  const snap = {offset0: offset, t0_0: t0, vs0: viewStart, ve0: viewEnd};
  pushView();
  viewStart = Math.max(0,ns); viewEnd = Math.min(dur,ne);
  setZoomBadge(true);
  updatePanButtons();
  const wasPlaying = playing;
  ph.style.display='none';

  const job=busy;
  analyze(job).then(()=>{ afterAnalyze(job, wasPlaying, snap); });
}
document.getElementById('panLeft').addEventListener('click',  e=>{ e.stopPropagation(); panView(-1); });
document.getElementById('panLeft').addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); panView(-1); });
document.getElementById('panRight').addEventListener('click',  e=>{ e.stopPropagation(); panView(1); });
document.getElementById('panRight').addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); panView(1); });
document.getElementById('zoomOut').addEventListener('click',  e=>{ e.stopPropagation(); zoomOutStep(); });
document.getElementById('zoomOut').addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); zoomOutStep(); });

// ── BOUTONS RÉGION ──────────────────────────────────────────────────────────
loopBtn.addEventListener('click',()=>{
  looping=!looping; loopBtn.classList.toggle('on',looping);
  if(playing && !looping){
    // Recalibrer offset/t0 avec la position exacte actuelle
    // pour éviter que loop() détecte une fausse fin de région
    offset = currentPlayPos;
    t0 = actx.currentTime;
  }
});
function exitZoom(){
  if(!abuf) return;
  const snap = {offset0: offset, t0_0: t0, vs0: viewStart, ve0: viewEnd};
  const wasPlaying = playing;
  zoomHistory = [];
  phraseIdx = -1;
  viewStart=0; viewEnd=dur;
  setZoomBadge(false);

  ph.style.display='none';
  const job=busy;
  analyze(job).then(()=>{ afterAnalyze(job, wasPlaying, snap); });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
let _lastOvPct = 0;
function setOv(on, txt, pct){
  ov.classList.toggle('on', on);
  if(txt !== undefined) ot.textContent = txt;
  if(!on){ ob.style.width = '0%'; _lastOvPct = 0; if(drawn) ph.style.display='block'; return; }
  ph.style.display='none';
  if(pct !== undefined){ ob.style.width = pct + '%'; _lastOvPct = pct; }
}
function tick(ms){ return new Promise(r=>setTimeout(r,ms||0)); }
function fmt(s){ s=Math.max(0,s||0); return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function setIcon(p){ pi.innerHTML=p?'<rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/>':'<polygon points="4,2 14,8 4,14"/>'; }

// (Removed global touchend preventDefault — it was swallowing button clicks.
//  Zoom is already disabled via user-scalable=no in the viewport meta tag.)

// ── PIANO ─────────────────────────────────────────────────────────────────
// 2 octaves de F3 à E5 : MIDI 53 → 88 (inclus)
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK_CHROMA = new Set([1,3,6,8,10]); // C#,D#,F#,G#,A#
const PIANO_START = 55; // G3
const PIANO_END   = 76; // E5
const PIANO_MIDI  = [];
for(let m=PIANO_START; m<=PIANO_END; m++) PIANO_MIDI.push(m);

// Construire le clavier dans #piano
(function buildPiano(){
  const wrap = document.getElementById('piano');
  const whites = PIANO_MIDI.filter(m=>!BLACK_CHROMA.has(m%12));
  const totalW = whites.length;
  const wPct = 100/totalW;
  const whiteIdx = {};
  let wi=0;
  for(const m of PIANO_MIDI){
    if(!BLACK_CHROMA.has(m%12)){ whiteIdx[m]=wi; wi++; }
  }
  for(const m of PIANO_MIDI){
    const isBlack = BLACK_CHROMA.has(m%12);
    const btn = document.createElement('button');
    btn.className = 'pk ' + (isBlack ? 'b' : 'w');
    btn.dataset.midi   = m;
    btn.dataset.chroma = m%12;
    if(!isBlack){
      const idx = whiteIdx[m];
      btn.style.left  = (idx*wPct)+'%';
      btn.style.width = wPct+'%';
      // Label sur les do
      if(m%12===0){
        const oct = Math.floor(m/12)-1;
        const lbl = document.createElement('span');
        lbl.className='pk-lbl';
        lbl.textContent='C'+oct;
        btn.appendChild(lbl);
      }
    } else {
      let prevWhite = m-1;
      while(prevWhite>=PIANO_START && BLACK_CHROMA.has(prevWhite%12)) prevWhite--;
      const idx = whiteIdx[prevWhite] ?? 0;
      btn.style.left  = ((idx+1)*wPct - wPct*0.3)+'%';
      btn.style.width = (wPct*0.6)+'%';
    }
    wrap.appendChild(btn);
  }
})();

// ── Son piano via AudioContext + oscillateur ─────────────────────────────
let pianoOsc = null;
let pianoOsc2 = null;
let pianoOsc3 = null;

function playPianoNote(midi){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  actx.resume();
  // Débloquer le mode silencieux iOS — même mécanisme que play()
  if(iosAudio.paused){
    iosAudio.src = SILENT_WAV_URL;
    iosAudio.loop = true;
    iosAudio.volume = 0;
    iosAudio.play().catch(()=>{});
  }
  try{
    const b=actx.createBuffer(1,1,actx.sampleRate);
    const s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); s.start(0);
  }catch(e){}
  // Stopper les oscillateurs précédents
  [pianoOsc, pianoOsc2, pianoOsc3].forEach(o=>{ if(o){ try{ o.stop(); }catch(e){} } });
  pianoOsc=pianoOsc2=pianoOsc3=null;

  const hz  = 440*Math.pow(2,(midi-69)/12);
  const now = (actx.currentTime||0)+0.05;

  // Enveloppe commune : attaque 8ms, déclin naturel sur 2.5s
  function makeVoice(freq, gain){
    const osc = actx.createOscillator();
    const env = actx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(gain, now+0.008);   // attaque rapide
    env.gain.exponentialRampToValueAtTime(gain*0.3, now+0.3);  // déclin initial
    env.gain.exponentialRampToValueAtTime(0.0001, now+2.5);    // extinction sur 2.5s
    osc.connect(env); env.connect(actx.destination);
    osc.start(now); osc.stop(now+2.6);
    return osc;
  }

  pianoOsc  = makeVoice(hz,       0.20);  // fondamentale
  pianoOsc2 = makeVoice(hz*2,     0.08);  // 2e harmonique
  pianoOsc3 = makeVoice(hz*3,     0.04);  // 3e harmonique
}
let pianoNote = null;  // chroma actif (0-11) ou null

// ── Canvas highlight ───────────────────────────────────────────────────────
const hc = document.getElementById('hc');

function drawHighlight(){
  hc.width=sc.width; hc.height=sc.height;
  const W=hc.width, H=hc.height;
  const ctx=hc.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(pianoNote===null || !drawn) return;
  ctx.fillStyle='rgba(240,200,74,.5)';
  if(stretchMode==='musique'){
    for(const frame of curveMusic){
      for(const n of frame.notes){
        if(((n.midi%12)+12)%12===pianoNote){
          ctx.beginPath(); ctx.arc(frame.t*W, hzToY(n.hz,H), 5,0,6.283); ctx.fill();
        }
      }
    }
  } else {
    for(const p of curve){
      if(!p) continue;
      const note=hzToNote(p.hz);
      if(note && ((note.midi%12)+12)%12===pianoNote){
        ctx.beginPath(); ctx.arc(p.t*W, hzToY(p.hz,H), 5,0,6.283); ctx.fill();
      }
    }
  }
}

function highlightNote(chroma, pressedEl){
  pianoNote=chroma;
  drawHighlight();
  document.querySelectorAll('.pk').forEach(k=> k.classList.remove('active'));
  if(pressedEl) pressedEl.classList.add('active');
}

// ── Interactions piano ─────────────────────────────────────────────────────
const pianoEl = document.getElementById('piano');

function pianoKeyAtPoint(clientX, clientY){
  const keys = pianoEl.querySelectorAll('.pk');
  let best = null, bestDist = Infinity;
  for(const k of keys){
    const r = k.getBoundingClientRect();
    if(clientX >= r.left-4 && clientX <= r.right+4 &&
       clientY >= r.top-4  && clientY <= r.bottom+4){
      const isBlack = k.classList.contains('b');
      const cx = (r.left+r.right)/2, cy = (r.top+r.bottom)/2;
      const dist = Math.hypot(clientX-cx, clientY-cy) - (isBlack ? 20 : 0);
      if(dist < bestDist){ bestDist=dist; best=k; }
    }
  }
  return best;
}

// Cache des positions des touches — recalculé à chaque touchstart
// pour éviter getBoundingClientRect() en boucle pendant touchmove
let _pianoKeyCache = null;
function buildPianoCache(){
  _pianoKeyCache = Array.from(pianoEl.querySelectorAll('.pk')).map(k=>({
    el: k,
    r: k.getBoundingClientRect(),
    isBlack: k.classList.contains('b'),
    midi: parseInt(k.dataset.midi),
    chroma: parseInt(k.dataset.chroma),
  }));
}
function pianoKeyFromCache(clientX, clientY){
  if(!_pianoKeyCache) return null;
  let best = null, bestDist = Infinity;
  for(const k of _pianoKeyCache){
    const r = k.r;
    if(clientX >= r.left-4 && clientX <= r.right+4 &&
       clientY >= r.top-4  && clientY <= r.bottom+4){
      const cx = (r.left+r.right)/2, cy = (r.top+r.bottom)/2;
      const dist = Math.hypot(clientX-cx, clientY-cy) - (k.isBlack ? 20 : 0);
      if(dist < bestDist){ bestDist=dist; best=k; }
    }
  }
  return best;
}

function pianoPress(e){
  if(!abuf) return;
  e.preventDefault();
  buildPianoCache();
  const t=e.touches ? e.changedTouches[0] : e;
  const k = pianoKeyFromCache(t.clientX, t.clientY);
  if(!k) return;
  _lastSlideMidi = k.midi;
  requestAnimationFrame(()=>{ highlightNote(k.chroma, k.el); });

  // Débloquer iOS si nécessaire, puis jouer
  if(iosAudio.paused){
    iosAudio.src = SILENT_WAV_URL;
    iosAudio.loop = true;
    iosAudio.volume = 0;
    const onPlay = ()=>{
      iosAudio.removeEventListener('play', onPlay);
      playPianoNote(k.midi);
    };
    iosAudio.addEventListener('play', onPlay);
    iosAudio.play().catch(()=>{ playPianoNote(k.midi); });
  } else {
    playPianoNote(k.midi);
  }
}

let _lastSlideMidi = null;

function pianoSlide(e){
  if(!abuf) return;
  e.preventDefault();
  const t=e.touches ? e.changedTouches[0] : e;
  const k = pianoKeyFromCache(t.clientX, t.clientY);
  if(!k || k.midi === _lastSlideMidi) return;
  _lastSlideMidi = k.midi;
  playPianoNote(k.midi);
  requestAnimationFrame(()=>{ highlightNote(k.chroma, k.el); });
}

function pianoRelease(e){
  _lastSlideMidi = null;
  // Maintenir la couleur au moins 120ms pour les taps brefs
  setTimeout(()=>{ highlightNote(null, null); }, 120);
}

pianoEl.addEventListener('mousedown',  pianoPress);
pianoEl.addEventListener('mousemove',  pianoSlide);
pianoEl.addEventListener('mouseup',    pianoRelease);
pianoEl.addEventListener('mouseleave', pianoRelease);
pianoEl.addEventListener('touchstart', pianoPress,   {passive:false});
pianoEl.addEventListener('touchmove',  pianoSlide,   {passive:false});
pianoEl.addEventListener('touchend',   pianoRelease, {passive:false});
pianoEl.addEventListener('touchcancel',pianoRelease, {passive:false});
