<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f0a">
<title>Merle — Analyse Sonore</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap');
:root{--bg:#0a0f0a;--surf:#111a11;--bdr:#1e2e1e;--acc:#7ecf6e;--acc2:#f0c84a;--txt:#c8d8c0;--mut:#4a5e44}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;height:100%;overflow:hidden;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
header{padding:14px 20px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;color:var(--acc)}
header .sub-title{font-size:10px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase;flex:1}
.iz{position:relative;display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px dashed var(--bdr);border-radius:8px;cursor:pointer;flex-shrink:0;max-width:160px;overflow:hidden}
.iz.has{border-color:var(--acc);border-style:solid}
.iz input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.icn{width:16px;height:16px;flex-shrink:0;fill:none;stroke:var(--acc);stroke-width:1.8}
.lbl{font-size:10px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.tip{display:none;margin:6px 16px 0;font-size:10px;color:var(--mut);line-height:1.6;padding:10px 12px;background:var(--surf);border-radius:8px;border:1px solid var(--bdr)}
.tip strong{color:var(--acc2)}
.viz{flex:1;margin:8px 16px;position:relative;border-radius:10px;overflow:hidden;background:var(--surf);border:1px solid var(--bdr);min-height:0}
canvas{position:absolute;inset:0;width:100%;height:100%}
#pc{pointer-events:none}
#fc{pointer-events:none}
.em{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mut);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.em svg{opacity:.3}
#ph{position:absolute;top:0;bottom:0;width:40px;transform:translateX(-50%);display:none;cursor:ew-resize;touch-action:none;z-index:10}
#ph::after{content:'';position:absolute;top:0;bottom:0;left:50%;width:1.5px;transform:translateX(-50%);background:rgba(255,255,255,.7);box-shadow:0 0 6px rgba(255,255,255,.4)}
.fl{position:absolute;left:4px;top:0;bottom:0;pointer-events:none}
.fl span{position:absolute;font-size:8px;color:rgba(200,216,192,.45);transform:translateY(-50%)}
.tl{position:absolute;bottom:4px;left:28px;right:8px;display:flex;justify-content:space-between;pointer-events:none}
.tl span{font-size:8px;color:rgba(200,216,192,.4)}
.ov{position:absolute;inset:0;background:rgba(10,15,10,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ov.on{display:flex}
.sp{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.ot{font-size:11px;color:var(--acc);letter-spacing:.1em;text-transform:uppercase}
.ob{width:150px;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
#ob{height:100%;width:0%;background:var(--acc);transition:width .12s}
.ctrl{flex-shrink:0;padding:0 16px 12px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:10px}
.rl{font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;min-width:40px;flex-shrink:0}
#pb{width:40px;height:40px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#rwb{width:30px;height:30px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#rwb:disabled{opacity:.3}#rwb svg{fill:var(--acc)}
#pb:disabled{opacity:.3}#pb svg{fill:var(--bg)}
.pw{flex:1;height:28px;position:relative;display:flex;align-items:center}
.pt{width:100%;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
#pf{height:100%;width:0%;background:var(--acc)}
.pw input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0}
#td{font-size:10px;color:var(--mut);white-space:nowrap;min-width:60px;text-align:right}
.sbs{display:flex;gap:5px;flex:1}
.sb,.mdb{flex:1;height:30px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px}
.sb{border-radius:14px;height:30px;flex:1;font-size:11px;color:var(--txt);padding:0 4px}
#modeSbs .mdb{flex:0 0 auto;width:34px;font-size:16px;padding:0}
.mdb:disabled{opacity:.35;cursor:default}
.fic{display:flex;align-items:center;gap:6px;flex:1}
.fic label{font-size:9px;color:var(--mut)}
.fic input{width:62px;height:28px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px;text-align:center;-webkit-appearance:none}
.fic input:focus{outline:none;border-color:var(--acc)}

.dot{width:8px;height:8px;border-radius:50%;background:rgb(255,80,80);flex-shrink:0}
#sel{position:absolute;top:0;bottom:0;background:rgba(126,207,110,.15);border-left:1.5px solid var(--acc);border-right:1.5px solid var(--acc);display:none;pointer-events:none}
#selrd{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--acc);background:rgba(10,15,10,.8);padding:3px 8px;border-radius:6px;display:none;pointer-events:none;white-space:nowrap}
.trsp-btn{width:30px;height:30px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--mut)}
.trsp-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(126,207,110,.08)}
.sb.on,.mdb.on{background:rgba(126,207,110,.15);border-color:var(--acc);color:var(--acc)}
#zoomBadge{position:absolute;top:6px;right:6px;display:none;align-items:center;gap:6px;background:rgba(240,200,74,.14);border:1px solid var(--acc2);border-radius:8px;padding:4px 6px;z-index:20}
#zoomBadge.on{display:flex}
#zoomTxt{font-size:10px;color:var(--acc2);white-space:nowrap}
#zoomExit{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--acc2);color:#0a0f0a;border:none;border-radius:50%;font-family:'DM Mono',monospace;font-size:12px;line-height:1;padding:0}
#panLeft,#panRight,#zoomOut,#zoomBack,#phraseLeft,#phraseRight{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(240,200,74,.15);border:1px solid var(--acc2);border-radius:6px;color:var(--acc2);font-size:13px;padding:0;cursor:pointer}
#zoomBack:disabled,#panLeft:disabled,#panRight:disabled,#phraseLeft:disabled,#phraseRight:disabled{opacity:.25;cursor:default}
#phc{pointer-events:none;z-index:2}
.viz.zoomed{border-color:var(--acc2);box-shadow:inset 0 0 0 1px rgba(240,200,74,.4)}
.pl{width:36px;height:20px;background:var(--bdr);border-radius:10px;position:relative;border:none;flex-shrink:0;transition:background .2s}
.pl.on{background:rgba(240,200,74,.3)}
.pl::after{content:'';position:absolute;width:14px;height:14px;background:var(--mut);border-radius:50%;top:3px;left:3px;transition:transform .2s,background .2s}
.pl.on::after{transform:translateX(16px);background:var(--acc2)}
/* ── PIANO ───────────────────────────────────────────────────────────────── */
#pianoWrap{flex-shrink:0;padding:0 16px 10px;touch-action:none;user-select:none;-webkit-user-select:none}
#piano{position:relative;height:64px;width:100%;-webkit-touch-callout:none}
.pk{position:absolute;top:0;border-radius:0 0 4px 4px;cursor:pointer;transition:background .06s;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
.pk.w{background:#ffffff;border:1px solid #2a3e2a;z-index:1;height:100%}
.pk.b{background:#111;border:1px solid #0a0f0a;z-index:2;height:62%;top:0}
.pk.w.active{background:#a0a0a0}
.pk.b.active{background:#555}
.pk-lbl{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:7px;color:#666;pointer-events:none;font-family:'DM Mono',monospace;white-space:nowrap}
#hc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Merle</h1><span class="sub-title">analyse sonore</span>
    <div class="iz" id="iz">
      <svg class="icn" viewBox="0 0 32 32"><path d="M16 4v16M10 14l6 6 6-6M6 22v4a2 2 0 002 2h16a2 2 0 002-2v-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="lbl" id="ilbl">Importer</span>
      <input type="file" id="fi" accept="audio/*,video/*,.mov,.mp4,.m4a,.mp3,.wav,.aac">
    </div>
  </header>
  <audio id="iosAudio" playsinline preload="auto" style="display:none"></audio>
  <div class="tip" id="tip"></div>

  <div class="viz">
    <canvas id="sc"></canvas><canvas id="pc"></canvas><canvas id="fc"></canvas><canvas id="hc"></canvas>
    <div id="sel"></div>
    <div id="ph"></div>
    <div class="fl" id="flbl"></div>
    <div class="tl" id="tlbl"></div>
    <div id="selrd"></div>
    <div id="keyBadge" style="display:none;position:absolute;top:6px;left:8px;z-index:12;background:rgba(10,15,10,.72);border:1px solid var(--bdr);border-radius:8px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:rgba(255,225,140,.95);cursor:pointer;user-select:none" title="Tonalité détectée — cliquer pour désactiver"></div>
    <div id="zoomBadge">
      <button id="panLeft" aria-label="Décaler gauche">◀</button>
      <span id="zoomTxt"></span>
      <button id="panRight" aria-label="Décaler droite">▶</button>
      <button id="zoomOut" aria-label="Dézoomer">−</button>
      <button id="zoomBack" aria-label="Vue précédente" title="Vue précédente">↩</button>
      <span id="phraseSep" style="display:none;width:1px;height:18px;background:rgba(240,200,74,.3)"></span>
      <button id="phraseLeft"  aria-label="Phrase précédente" title="Phrase précédente" style="display:none">«</button>
      <span id="phraseTxt" style="display:none;font-size:10px;color:var(--acc2);white-space:nowrap"></span>
      <button id="phraseRight" aria-label="Phrase suivante"   title="Phrase suivante"  style="display:none">»</button>
      <button id="zoomExit" aria-label="Vue complète">✕</button>
    </div>
    <canvas id="phc"></canvas>
    <div class="em" id="em">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="20" cy="20" r="14"/><path d="M15 16c0-2.8 2.2-5 5-5s5 2.2 5 5v6" stroke-linecap="round"/><circle cx="20" cy="25" r="2" fill="currentColor"/>
      </svg><span>importer un fichier · glisser pour zoomer</span>
    </div>
    <div class="ov" id="ov"><div class="sp"></div><div class="ot" id="ot">Analyse…</div><div class="ob"><div id="ob"></div></div><button id="cancelBtn" style="display:none;margin-top:8px;padding:4px 14px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--mut);font-size:11px;cursor:pointer">Annuler</button></div>
  </div>
  <div id="chordStrip" style="display:none;flex-shrink:0;margin:0 16px 6px;height:24px;position:relative;background:var(--surf);border:1px solid var(--bdr);border-top:none;border-radius:0 0 7px 7px;overflow:hidden"></div>

  <div class="ctrl">
    <div class="row">
      <button id="rwb" disabled><svg width="14" height="14" viewBox="0 0 14 14" fill="var(--bg)"><polygon points="1,7 7,1 7,13"/><rect x="7" y="1" width="2" height="12"/><rect x="0" y="1" width="2" height="12"/></svg></button>
      <button id="pb" disabled><svg id="pi" width="16" height="16" viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg></button>
      <div class="pw"><div class="pt"><div id="pf"></div></div><input type="range" id="pr" min="0" max="1000" value="0"></div>
      <div id="td">0:00 / 0:00</div>
      <button id="loopBtn" class="trsp-btn on" title="Boucle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="10,1 13,4 10,7"/>
          <path d="M1,4 Q1,1 4,1 L13,1"/>
          <polyline points="4,13 1,10 4,7"/>
          <path d="M13,10 Q13,13 10,13 L1,13"/>
        </svg>
      </button>
      <button id="settingsBtn" class="trsp-btn" title="Réglages">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="7" cy="7" r="2"/><line x1="7" y1="1" x2="7" y2="3"/><line x1="7" y1="11" x2="7" y2="13"/><line x1="1" y1="7" x2="3" y2="7"/><line x1="11" y1="7" x2="13" y2="7"/><line x1="2.9" y1="2.9" x2="4.3" y2="4.3"/><line x1="9.7" y1="9.7" x2="11.1" y2="11.1"/><line x1="11.1" y1="2.9" x2="9.7" y2="4.3"/><line x1="4.3" y1="9.7" x2="2.9" y2="11.1"/>
        </svg>
      </button>
    </div>
    <div class="row" style="gap:8px">
      <div class="sbs" id="modeSbs" style="flex:0 0 auto;gap:4px">
        <button class="mdb" id="modeOiseau" title="Oiseau">🐦</button>
        <button class="mdb" id="modeVoix" title="Voix">🎤</button>
        <button class="mdb" id="modeMusique" title="Musique">🎵</button>
      </div>
      <div class="sbs" style="justify-content:flex-end;gap:4px;flex:1">
        <button class="sb" data-s="0.25">x0.25</button>
        <button class="sb" data-s="0.5">x0.5</button>
        <button class="sb" data-s="0.75">x0.75</button>
        <button class="sb on" data-s="1">x1</button>
      </div>
    </div>
    <div id="settingsPanel" style="display:none;flex-direction:column;gap:10px">
      <div class="row">
        <div class="rl">Rendu</div>
        <div class="sbs" id="algoSbs">
          <button class="mdb on" id="algoWsolaOiseau">WSOLA 🐦</button>
          <button class="mdb" id="algoWsolaVoix">WSOLA 🎤</button>
          <button class="mdb" id="algoWsolaMusique">WSOLA 🎵</button>
          <button class="mdb" id="algoPV">Phase vocoder</button>
          <button id="stereoBtn" title="Mono/Stéréo" style="flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-size:9px;cursor:pointer">Mono</button>
        </div>
      </div>
      <div class="row" id="rowAxis">
        <div class="rl">Axe Y</div>
        <div class="fic">
          <label>min</label><input type="number" id="ymin" value="80"  min="20"  max="10000" step="10" onfocus="this.select()">
          <span style="color:var(--mut)">–</span>
          <label>max</label><input type="number" id="ymax" value="8000" min="100" max="20000" step="100" onfocus="this.select()">
          <span style="color:var(--mut);font-size:9px">Hz</span>
          <button id="scaleToggle" title="Basculer linéaire/logarithmique" style="flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-size:9px;cursor:pointer">Lin</button>
          <button id="dispToggle" title="Affichage : vert / Praat (niveaux de gris, dB)" style="flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-size:8px;cursor:pointer">Vert</button>
        </div>
      </div>
      <div class="row" id="rowPraat" style="display:none">
        <div class="rl">Praat</div>
        <div class="fic">
          <label title="Plage dynamique (dB)">dyn</label><input type="number" id="praatDynIn" value="50" min="10" max="120" step="5" style="width:48px" onfocus="this.select()">
          <label title="Durée effective de la fenêtre (ms)">fen</label><input type="number" id="praatWinIn" value="5" min="1" max="40" step="1" style="width:48px" onfocus="this.select()">
          <label title="Pré-accentuation (dB/octave)">pré</label><input type="number" id="praatPreIn" value="6" min="0" max="18" step="1" style="width:48px" onfocus="this.select()">
          <button id="refToggle" title="Référence de normalisation : vue courante / fichier entier" style="flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-size:9px;cursor:pointer">Vue</button>
        </div>
      </div>
      <div class="row" id="rowPitch">
        <div class="rl">Pitch</div>
        <div class="fic">
          <label>min</label><input type="number" id="pmin" value="1000" min="20" max="10000" step="10" onfocus="this.select()">
          <span style="color:var(--mut)">–</span>
          <label>max</label><input type="number" id="pmax" value="8000" min="100" max="12000" step="100" onfocus="this.select()">
          <span style="color:var(--mut);font-size:9px">Hz</span>
          <button id="pitchToggle" title="Basculer mono/multi" style="flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-size:9px;cursor:pointer">Mono</button>
        </div>
      </div>
      <div class="row">
        <div class="rl">Courbe</div><div class="dot"></div>
        <button class="pl on" id="ptg"></button>
        <div class="rl" style="min-width:0;margin-left:14px">Notes</div>
        <button class="pl on" id="ntg"></button>
        <div class="rl" id="chordToggleLabel" style="min-width:0;margin-left:14px;display:none">Accords</div>
        <button class="pl on" id="chtg" style="display:none"></button>
        <div class="rl" id="phraseToggleLabel" style="min-width:0;margin-left:14px;display:none">Phrases</div>
        <button class="pl" id="phtg" style="display:none"></button>
      </div>
      <div class="row" id="rowFormants" style="display:none">
        <div class="rl">F1 F2</div>
        <div class="dot" style="background:#4ac8f0"></div>
        <button class="pl" id="ftg"></button>
        <button id="vowelLangBtn" title="Langue des voyelles" style="flex:0 0 auto;height:24px;padding:0 8px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;margin-left:8px;white-space:nowrap">FR</button>
        <span style="font-size:9px;color:var(--mut);margin-left:6px">Formants (LPC)</span>
      </div>
    </div>
  </div>
  <div id="pianoWrap" style="display:none"><div id="piano"></div></div>

<script>
const FFTN = 4096, NCOLS = 600;
let MFREQ = 8000;  // fréquence max du spectrogramme — change selon le mode

let actx, abuf, src, dur=0, speed=1, offset=0, t0=0;

// L'AudioContext est créé à la demande dans playPianoNote ou load()

let playing=false, showP=true, showNotes=true, showFormants=false, showChords=true, showPhrases=false, busy=0, drawn=false, raf;
let currentPlayPos=0;  // position réelle mise à jour à chaque frame par loop()
let curve=[], spec=null;
let formants=[];  // [{t, f1, f2}] ou null par frame
let curveFull=[];  // courbe de pitch haute résolution sur tout le fichier
// Fenêtre visible (zoom) en secondes + mode boucle + sélection en cours
let viewStart=0, viewEnd=0, looping=true;
let zoomHistory = [];  // pile de {vs, ve} — vue précédente
function isFullView(){ return !abuf || (viewStart===0 && Math.abs(viewEnd - abuf.duration) < 0.01); }
function pushView(){ zoomHistory.push({vs: viewStart, ve: viewEnd}); updateZoomBack(); }
function updateZoomBack(){ const btn=$('zoomBack'); if(btn) btn.disabled = zoomHistory.length === 0; }
let selX0=null, selX1=null, selecting=false, draggingPH=false, draggingPHWasPlaying=false;
let sliding=false, slideStartX=0, slideStartVS=0, slideStartVE=0, slideTimer=null;
let slideCurveSnapshot=[], slideVSSnapshot=0, slideVESnapshot=0, slideMinLen=1;
let stopTimer=null;

const $ = id => document.getElementById(id);
const iz=$('iz'), ilbl=$('ilbl'), tip=$('tip'), sc=$('sc'), pc=$('pc'), ph=$('ph');
const flbl=$('flbl'), tlbl=$('tlbl'), em=$('em'), ov=$('ov'), ot=$('ot'), ob=$('ob'), cancelBtn=$('cancelBtn');
const pb=$('pb'), rwb=$('rwb'), pi=$('pi'), pf=$('pf'), pr=$('pr'), td=$('td'), ptg=$('ptg'), ntg=$('ntg'), ftg=$('ftg'), chtg=$('chtg');
const fc=$('fc');
const pmin=$('pmin'), pmax=$('pmax');
const ymin=$('ymin'), ymax=$('ymax');
const sel=$('sel'), selrd=$('selrd'), loopBtn=$('loopBtn');
const zoomBadge=$('zoomBadge'), zoomTxt=$('zoomTxt'), zoomExit=$('zoomExit');
const iosAudio=$('iosAudio');

// ── IMPORT ────────────────────────────────────────────────────────────────
$('fi').addEventListener('change', e => { const f=e.target.files[0]; if(f) load(f); });

async function load(source){
  // source = File (import manuel) ou ArrayBuffer (depuis hash URL)
  const job = ++busy;
  tip.style.display='none';
  setOv(true,'Décodage…',5);
  stopAll();

  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();

  let bytes, name;
  if(source instanceof File){
    name = source.name;
    try { bytes = await source.arrayBuffer(); }
    catch(e){ if(job!==busy)return; setOv(false); return fail(source); }
  } else {
    // ArrayBuffer passé directement (chemin URL hash)
    bytes = source;
    name = 'enregistrement.m4a';
  }
  if(job!==busy) return;

  setOv(true,'Décodage audio…',15);
  try {
    abuf = await actx.decodeAudioData(bytes.slice(0));
  } catch(e){
    if(job!==busy)return; setOv(false);
    if(source instanceof File) fail(source);
    return;
  }
  if(job!==busy) return;

  dur = abuf.duration;
  viewStart = 0; viewEnd = dur; offset = 0;
  zoomHistory = [];
  setZoomBadge(false);
  showPhrases = false;
  $('phtg').classList.remove('on');
  phrases = []; phraseIdx = -1;
  clearStretchCache();
  specFull = null;
  gMaxHiGlobal = 0;
  // Arrêter l'oscillateur piano s'il tourne encore
  if(typeof pianoOsc !== 'undefined' && pianoOsc){
    try{ pianoOsc.stop(); pianoOsc.disconnect(); }catch(e){}
    pianoOsc = null;
  }

  ilbl.textContent = name;
  iz.classList.add('has');
  document.getElementById('pianoWrap').style.display = 'block';
  document.querySelectorAll('#modeSbs .mdb').forEach(b=>b.disabled=false);
  const sb=$('settingsBtn'); sb.disabled=false; sb.style.opacity='';
  em.style.display='none';
  pb.disabled=false; rwb.disabled=false;

  // computeSpecFull appelle autoDetectMode() qui pose ymax/MFREQ/mode
  // Il faut l'attendre avant analyze() pour que le premier tracé soit correct
  await computeSpecFull().catch(e=>console.warn('specFull:', e));

  await analyze(job);
}

// ── CHARGEMENT AUTOMATIQUE DEPUIS L'URL (#data=base64) ───────────────────
async function loadFromGithub(){
  setOv(true,'Chargement…',5);
  const fname = 'input.m4a';
  try {
    const resp = await fetch(
      'https://api.github.com/repos/nico-laposte/spectrogram/contents/'+fname,
      { headers: { 'Accept': 'application/vnd.github.v3.raw' } }
    );
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const bytes = await resp.arrayBuffer();
    await load(bytes);
    // Afficher le nom du fichier GitHub dans le bouton d'import
    ilbl.textContent = fname;
    iz.classList.add('has');
  } catch(e){
    setOv(false);
    console.warn('loadFromGithub:', e.message);
  }
}
window.addEventListener('load', ()=>{
  if(location.search.includes('auto') || location.href.includes('auto')) loadFromGithub();
});

// ── ANALYSE ───────────────────────────────────────────────────────────────
async function analyze(job){
  drawn=false;
  setOv(true,'Analyse…',30);
  await tick(30);

  const W = sc.parentElement.clientWidth||320;
  const H = sc.parentElement.clientHeight||200;
  sc.width=W; sc.height=H; pc.width=W; pc.height=H; fc.width=W; fc.height=H;
  const phc=$('phc'); phc.width=W; phc.height=H;

  const sr   = abuf.sampleRate;
  const data = monoMix(abuf);
  const total= data.length;
  const bins = FFTN/2;
  const maxBin = Math.min(bins-1, Math.floor(MFREQ/(sr/2)*bins));
  const cols = Math.min(NCOLS, W*2);
  // Fenêtre d'analyse : Hann pleine longueur (vert) ou gaussienne courte (Praat)
  const win  = dispMode==='praat' ? gaussWin(FFTN, sr, praatWinMs) : hann(FFTN);
  const sumW = sumWindow(win);
  const out  = new Float32Array(cols*maxBin);
  let gMax=0;

  // Fenêtre visible en échantillons
  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(FFTN+1, ve - vs);   // au moins une fenêtre FFT

  const STEP=12;
  for(let ci=0; ci<cols; ci+=STEP){
    if(job!==busy) return setOv(false);
    const end=Math.min(ci+STEP,cols);
    for(let c=ci;c<end;c++){
      const start=vs + Math.floor(c/cols*(span-FFTN));
      const m=fftMag(data,start,FFTN,win,maxBin);
      const off=c*maxBin;
      for(let b=0;b<maxBin;b++){ out[off+b]=m[b]; if(m[b]>gMax)gMax=m[b]; }
    }
    setOv(true,'Analyse…', 30+Math.round(ci/cols*65));
    await new Promise(r=>requestAnimationFrame(r));
  }
  if(job!==busy) return setOv(false);

  spec={out,cols,maxBin,gMax,sumW};
  try{
    drawSpec(W,H);
    if(multiPitch || pitchAlgo==='multi'){
      makeCurveMusic();
      if(isFullView()) runKeyDetection();
      makeChords();
      drawCurveMusic(H);
      drawChords();
    } else {
      makeCurve && (pitchAlgo==='amdf' ? makeCurveAMDF() : pitchAlgo==='yin' ? makeCurveYIN() : makeCurve());
      drawCurve(H);
    }
    if(!(multiPitch || pitchAlgo==='multi') && isFullView()) runKeyDetection();
    if(stretchMode==='voix'){ makeFormants(); drawFormants(H); }
    else { formants=[]; fc.width=fc.width; }  // effacer si autre mode
    drawPhrases();
    updatePhraseNav();
    freqLabels();
    timeLabels();
  }catch(err){ console.error('draw error:', err); }
  drawn=true;
  if(!playing){
    ph.style.display='block';
    drawPlayhead(offset);
  }
  setOv(false);
  if(typeof drawHighlight==='function') drawHighlight();
}

function monoMix(buf){
  if(buf.numberOfChannels===1) return buf.getChannelData(0);
  const a=buf.getChannelData(0), b=buf.getChannelData(1), o=new Float32Array(a.length);
  for(let i=0;i<a.length;i++) o[i]=(a[i]+b[i])*0.5;
  return o;
}

// FFT magnitude, returns first maxBin bins
function fftMag(data,start,N,win,maxBin){
  const re=new Float32Array(N), im=new Float32Array(N);
  for(let i=0;i<N;i++) re[i]=(data[start+i]||0)*win[i];
  for(let i=1,j=0;i<N;i++){let bit=N>>1;for(;j&bit;bit>>=1)j^=bit;j^=bit;if(i<j){const t=re[i];re[i]=re[j];re[j]=t;}}
  for(let len=2;len<=N;len<<=1){
    const ang=-2*Math.PI/len, wR=Math.cos(ang), wI=Math.sin(ang);
    for(let i=0;i<N;i+=len){
      let cR=1,cI=0;
      for(let k=0;k<len>>1;k++){
        const h=i+k+(len>>1), vR=re[h]*cR-im[h]*cI, vI=re[h]*cI+im[h]*cR;
        re[h]=re[i+k]-vR; im[h]=im[i+k]-vI; re[i+k]+=vR; im[i+k]+=vI;
        const nR=cR*wR-cI*wI; cI=cR*wI+cI*wR; cR=nR;
      }
    }
  }
  const mag=new Float32Array(maxBin);
  for(let i=0;i<maxBin;i++) mag[i]=Math.sqrt(re[i]*re[i]+im[i]*im[i]);
  return mag;
}

function hann(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=0.5*(1-Math.cos(2*Math.PI*i/(N-1)));return w;}

// Fenêtre gaussienne de Praat, de durée EFFECTIVE msEff : la durée physique
// vaut le double (comme dans Praat), et la fenêtre est centrée puis complétée
// par des zéros dans les N points de la FFT. Le zero-padding donne la
// résolution temporelle voulue sans changer la taille de la FFT ni maxBin.
function gaussWin(N, sr, msEff){
  const w = new Float32Array(N);
  let L = Math.round(2 * msEff / 1000 * sr);   // longueur physique en échantillons
  if(L < 8) L = 8;
  if(L > N) L = N;                             // au-delà, la fenêtre sature la FFT
  const start = Math.floor((N - L) / 2);
  const mid = 0.5 * (L + 1), edge = Math.exp(-12);
  for(let i=1; i<=L; i++){
    const d = (i - mid) / (L + 1);
    w[start + i - 1] = (Math.exp(-48 * d * d) - edge) / (1 - edge);
  }
  return w;
}

// Somme d'une fenêtre — sert à comparer des magnitudes issues de fenêtres
// de longueurs différentes (gain cohérent).
function sumWindow(w){ let s=0; for(let i=0;i<w.length;i++) s+=w[i]; return s||1; }

// ── DRAW ──────────────────────────────────────────────────────────────────
// Conversion Hz ↔ position Y selon l'échelle (linéaire ou log)
let FMIN_LOG = 80;   // borne basse de l'échelle log (Hz) — dynamique en mode musique
function hzToY(hz, H){ 
  if(!logScale) return (1 - hz/MFREQ) * H;
  const lo=Math.log2(FMIN_LOG), hi=Math.log2(MFREQ);
  return (1 - (Math.log2(Math.max(hz,FMIN_LOG)) - lo) / (hi - lo)) * H;
}
function yToHz(y, H){
  if(!logScale) return (1 - y/H) * MFREQ;
  const lo=Math.log2(FMIN_LOG), hi=Math.log2(MFREQ);
  return Math.pow(2, lo + (1 - y/H) * (hi - lo));
}

// ── MODE PRAAT : dB, gris inversé, pré-accentuation ───────────────────────
// Gain de pré-accentuation en dB à la fréquence hz. La fréquence de référence
// (1 kHz) est arbitraire : c'est un décalage constant, absorbé par la
// normalisation au maximum.
function preemphDb(hz){
  if(praatPreemph <= 0) return 0;
  return praatPreemph * Math.log2(Math.max(hz, 50) / 1000);
}

// Référence de normalisation « Vue » : maximum de la fenêtre affichée,
// après pré-accentuation. C'est le comportement de Praat (l'image se
// réétalonne à chaque zoom).
function praatRefLocal(){
  const {out, cols, maxBin} = spec;
  const g = new Float32Array(maxBin);
  for(let b=0;b<maxBin;b++) g[b] = Math.pow(10, preemphDb((b+0.5)/maxBin*MFREQ)/20);
  let m=0;
  for(let c=0;c<cols;c++){
    const off=c*maxBin;
    for(let b=0;b<maxBin;b++){ const v=out[off+b]*g[b]; if(v>m) m=v; }
  }
  return m;
}

// Référence « Glob » : maximum du fichier entier, estimé au chargement par
// computeSpecFull(). Comme la pré-accentuation est un gain constant par bin,
// max_t max_b (m·g) = max_b (g · max_t m) : le max par bin mémorisé suffit,
// aucune FFT à refaire quand la pré-accentuation change.
// Le scan utilise une fenêtre de Hann 2048, plus longue que la gaussienne de
// Praat : on corrige le rapport des gains cohérents (somme des fenêtres).
// Correction exacte pour un signal tonal, approchée sur les transitoires.
function praatRefGlobal(){
  if(!specFull || !specFull.gMaxHiBins) return praatRefLocal();
  const bins = specFull.gMaxHiBins, df = specFull.gMaxHiDf;
  let m=0;
  for(let b=0;b<bins.length;b++){
    const v = bins[b] * Math.pow(10, preemphDb((b+0.5)*df)/20);
    if(v>m) m=v;
  }
  return m * ((spec.sumW||1) / (specFull.gMaxHiSumW||1));
}

const LN_TO_DB = 8.685889638065035;   // 20/ln(10)

function drawSpec(W,H){
  const {out,cols,maxBin,gMax}=spec;
  const ctx=sc.getContext('2d'), img=ctx.createImageData(W,H), px=img.data;
  const praat = dispMode==='praat';
  // En mode Praat, le gain de pré-accentuation ne dépend que de y : on le
  // précalcule une fois par ligne de pixels au lieu d'une fois par pixel.
  let gainY=null, ref=1, invDyn=1;
  if(praat){
    gainY = new Float32Array(H);
    for(let y=0;y<H;y++) gainY[y] = Math.pow(10, preemphDb(yToHz(y,H))/20);
    ref = (praatLocalRef ? praatRefLocal() : praatRefGlobal()) || 1;
    invDyn = 1/Math.max(1, praatDyn);
  }
  for(let x=0;x<W;x++){
    const ci=Math.min(Math.floor(x/W*cols),cols-1), off=ci*maxBin;
    for(let y=0;y<H;y++){
      const hz = yToHz(y, H);
      const binF = hz/MFREQ*maxBin;          // bin flottant
      const b0 = Math.floor(binF);
      const b1 = Math.min(b0+1, maxBin-1);
      const t  = binF - b0;                  // fraction pour interpolation
      const val = (out[off+b0]||0)*(1-t) + (out[off+b1]||0)*t;
      let r,g,b;
      if(praat){
        const db = LN_TO_DB * Math.log(val*gainY[y]/ref + 1e-12);
        const u  = Math.max(0, Math.min(1, 1 + db*invDyn));   // 0 à -dyn dB, 1 au max
        r = g = b = Math.round(255*(1-u));                    // gris inversé
      } else {
        [r,g,b]=color(val/(gMax||1));
      }
      const i=(y*W+x)*4; px[i]=r;px[i+1]=g;px[i+2]=b;px[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

let pitchAlgo = 'peak'; // 'peak' | 'amdf' | 'yin' | 'multi'

// ── AMDF : Average Magnitude Difference Function ──────────────────────────
// Détecte la période fondamentale en cherchant le minimum de la différence
// moyenne entre le signal et sa version décalée. Plus robuste que le peak-
// picking contre les sauts d'octave.
function makeCurveAMDF(){
  const {cols} = spec;
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const total = data.length;
  const p1 = (v=>isNaN(v)?80:v)(parseInt(pmin.value)), p2 = (v=>isNaN(v)?8000:v)(parseInt(pmax.value));
  // Bornes de période en samples (inverses des fréquences)
  const lagMin = Math.floor(sr / p2);
  const lagMax = Math.ceil(sr / p1);
  const frameSize = lagMax * 2;  // fenêtre temporelle = 2× période max
  const vs = Math.floor(viewStart > 0 ? viewStart * sr : 0);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(frameSize + 1, ve - vs);
  const gMaxRef = gMaxHiGlobal || spec.gMax;

  curve = [];
  for(let c = 0; c < cols; c++){
    const pos = vs + Math.floor(c / cols * (span - frameSize));
    // Calculer l'énergie RMS pour le seuil de silence
    let rms = 0;
    for(let i = 0; i < frameSize; i++){
      const s = data[pos+i]||0; rms += s*s;
    }
    rms = Math.sqrt(rms / frameSize);
    if(rms < 0.01){ curve.push(null); continue; }

    // Calculer l'AMDF pour chaque lag
    let bestLag = -1, bestVal = Infinity;
    for(let lag = lagMin; lag <= lagMax; lag++){
      let sum = 0;
      const n = frameSize - lag;
      for(let i = 0; i < n; i++) sum += Math.abs((data[pos+i]||0) - (data[pos+i+lag]||0));
      const amdf = sum / n;
      if(amdf < bestVal){ bestVal = amdf; bestLag = lag; }
    }
    const hz = bestLag > 0 ? sr / bestLag : 0;
    curve.push(hz > 0 ? {t: c/cols, hz} : null);
  }
}

// ── YIN : algorithme de détection de pitch robuste ────────────────────────
// Basé sur la fonction de différence normalisée (d'après de Cheveigné & Kawahara 2002).
// Résistant aux sauts d'octave grâce à la normalisation cumulative.
function makeCurveYIN(){
  const {cols} = spec;
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const total = data.length;
  const p1 = (v=>isNaN(v)?80:v)(parseInt(pmin.value)), p2 = (v=>isNaN(v)?8000:v)(parseInt(pmax.value));
  const lagMin = Math.floor(sr / p2);
  const lagMax = Math.ceil(sr / p1);
  const frameSize = lagMax * 2;
  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(frameSize + 1, ve - vs);
  const threshold = 0.15;  // seuil YIN standard

  curve = [];
  for(let c = 0; c < cols; c++){
    const pos = vs + Math.floor(c / cols * (span - frameSize));

    // Seuil de silence
    let rms = 0;
    for(let i = 0; i < frameSize; i++){ const s=data[pos+i]||0; rms+=s*s; }
    rms = Math.sqrt(rms / frameSize);
    if(rms < 0.01){ curve.push(null); continue; }

    // Étape 1 : fonction de différence d²(τ)
    const d = new Float32Array(lagMax + 1);
    for(let lag = 0; lag <= lagMax; lag++){
      let sum = 0;
      const n = frameSize - lag;
      for(let i = 0; i < n; i++){
        const diff = (data[pos+i]||0) - (data[pos+i+lag]||0);
        sum += diff * diff;
      }
      d[lag] = sum;
    }

    // Étape 2 : normalisation cumulative d'(τ)
    const dn = new Float32Array(lagMax + 1);
    dn[0] = 1;
    let runSum = 0;
    for(let lag = 1; lag <= lagMax; lag++){
      runSum += d[lag];
      dn[lag] = runSum > 1e-12 ? d[lag] * lag / runSum : 1;
    }

    // Étape 3 : chercher le premier minimum sous le seuil
    let bestLag = -1;
    for(let lag = lagMin; lag <= lagMax - 1; lag++){
      if(dn[lag] < threshold && dn[lag] < dn[lag+1]){
        bestLag = lag; break;
      }
    }
    // Si aucun minimum sous le seuil, prendre le minimum absolu
    if(bestLag < 0){
      let minVal = Infinity;
      for(let lag = lagMin; lag <= lagMax; lag++){
        if(dn[lag] < minVal){ minVal = dn[lag]; bestLag = lag; }
      }
      if(minVal > 0.5){ curve.push(null); continue; }  // pas assez périodique
    }

    // Étape 4 : interpolation parabolique pour précision sub-sample
    if(bestLag > lagMin && bestLag < lagMax){
      const a=dn[bestLag-1], b=dn[bestLag], c2=dn[bestLag+1];
      const denom = 2*(2*b - a - c2);
      if(Math.abs(denom) > 1e-6) bestLag += (a - c2) / denom;
    }

    const hz = bestLag > 0 ? sr / bestLag : 0;
    curve.push(hz > 0 ? {t: c/cols, hz} : null);
  }
}

function makeCurve(){
  const {out,cols,maxBin}=spec;
  // Utiliser le gMax global (specFull) comme référence stable — évite que le seuil
  // change selon la région affichée (sinon plus de points apparaissent sur les régions calmes)
  const gMaxRef = gMaxHiGlobal || spec.gMax;
  const p1=(v=>isNaN(v)?1000:v)(parseInt(pmin.value)), p2=(v=>isNaN(v)?8000:v)(parseInt(pmax.value));
  const b1=Math.floor(p1/MFREQ*maxBin), b2=Math.ceil(p2/MFREQ*maxBin);
  curve=[];
  for(let c=0;c<cols;c++){
    const off=c*maxBin; let mv=0,pk=-1;
    for(let b=b1;b<=Math.min(b2,maxBin-1);b++){if(out[off+b]>mv){mv=out[off+b];pk=b;}}
    curve.push(pk>=0&&mv>gMaxRef*0.04 ? {t:c/cols,hz:pk/maxBin*MFREQ} : null);
  }
}

// Convertit une fréquence en nom de note anglais + octave (ex: 440 -> "A4")
// ── MODE MUSIQUE : courbe multi-voix avec suppression des harmoniques ────────
let curveMusic = [];  // tableau de tableaux : curveMusic[col] = [{hz, midi}, ...]

function makeCurveMusic(){
  // Utiliser FFTN=4096 pour une meilleure résolution dans les graves
  // (bin = sr/4096 ≈ 10.8Hz à 44100Hz, suffisant pour distinguer C3/C#3)
  const FFTN_M = 8192;
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const total = data.length;
  const win = hann(FFTN_M);
  const bins = FFTN_M / 2;
  const maxBinM = Math.min(bins - 1, Math.floor(MFREQ / (sr/2) * bins));

  const {cols} = spec;
  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(FFTN_M + 1, ve - vs);

  const MAX_VOICES = 6;
  const HARM_TOL   = 0.015;
  const gMaxRef = gMaxHiGlobal || spec.gMax;
  const THRESH  = gMaxRef * 0.02;
  const p1m = (v=>isNaN(v)?80:v)(parseInt(pmin.value));
  const p2m = (v=>isNaN(v)?4200:v)(parseInt(pmax.value));
  const b1 = Math.floor(p1m / MFREQ * maxBinM);
  const b2 = Math.ceil(p2m  / MFREQ * maxBinM);

  curveMusic = [];
  for(let c = 0; c < cols; c++){
    const start = vs + Math.floor(c / cols * (span - FFTN_M));
    const mag = fftMag(data, start, FFTN_M, win, maxBinM);

    // 1) Trouver tous les pics locaux avec interpolation de Quinn (optimisée Hann)
    const peaks = [];
    for(let b = b1+1; b < Math.min(b2, maxBinM-1); b++){
      const v = mag[b];
      if(v > THRESH && v > mag[b-1] && v > mag[b+1]){
        // Interpolation de Quinn : correction sub-bin bornée à ±0.5
        // Plus précise que la parabole simple pour les fenêtres de Hann
        const alpha = mag[b-1] / v;
        const beta  = mag[b+1] / v;
        // Formule de Quinn (approximation 1er ordre)
        let offset = 0.5 * (beta - alpha) / (1 + alpha + beta);
        // Borner l'offset pour éviter les valeurs aberrantes
        offset = Math.max(-0.5, Math.min(0.5, offset));
        const bFine = b + offset;
        const hz = bFine / bins * (sr / 2);
        peaks.push({b, hz, v});
      }
    }
    peaks.sort((a,b) => b.v - a.v);

    // 2) Supprimer les harmoniques
    const fundamentals = [];
    for(const p of peaks){
      let isHarmonic = false;
      for(const f of fundamentals){
        const ratio = p.hz / f.hz;
        const nearest = Math.round(ratio);
        if(nearest >= 2 && nearest <= 8 && Math.abs(ratio - nearest) / nearest < HARM_TOL){
          isHarmonic = true; break;
        }
      }
      if(!isHarmonic){
        const n = hzToNote(p.hz);
        if(n) fundamentals.push({hz: p.hz, midi: n.midi, label: n.label});
        if(fundamentals.length >= MAX_VOICES) break;
      }
    }
    curveMusic.push({t: c/cols, notes: fundamentals});
  }
}

function drawCurveMusic(H){
  const ctx=pc.getContext('2d'), W=pc.width;
  ctx.clearRect(0,0,W,H);
  if(!curveMusic.length) return;
  const yOf=hz=>hzToY(hz,H);

  // Points de la courbe — respecte showP
  if(showP){
    ctx.fillStyle='rgba(255,80,80,.95)';
    for(const frame of curveMusic){
      const x=frame.t*W;
      for(const n of frame.notes){
        const y=yOf(n.hz);
        ctx.beginPath(); ctx.arc(x,y,1.8,0,6.283); ctx.fill();
      }
    }
  }

  // Étiquettes des notes tenues — respecte showNotes indépendamment
  if(showNotes) labelHeldNotesMusic(ctx,W,H,yOf);
}

function labelHeldNotesMusic(ctx,W,H,yOf){
  const MIN_LEN=5;
  ctx.font='600 9px "DM Mono",monospace';
  ctx.textBaseline='top';
  ctx.textAlign='center';

  // Pour chaque voix MIDI, trouver les segments tenus
  // Regrouper par midi sur des fenêtres glissantes
  const midiMap={};  // midi → [{t, hz}]
  for(const frame of curveMusic){
    const seen=new Set();
    for(const n of frame.notes){
      seen.add(n.midi);
      if(!midiMap[n.midi]) midiMap[n.midi]=[];
      midiMap[n.midi].push({t:frame.t, hz:n.hz, label:n.label});
    }
  }

  const placed=[];
  for(const midi of Object.keys(midiMap)){
    const pts=midiMap[midi];
    let i=0;
    while(i<pts.length){
      // Grouper les points consécutifs (tolérance de 2 trames)
      let j=i+1;
      while(j<pts.length && pts[j].t-pts[j-1].t < 3/curveMusic.length) j++;
      const cnt=j-i;
      if(cnt>=MIN_LEN){
        const midT=(pts[i].t+pts[j-1].t)/2;
        const avgHz=pts.slice(i,j).reduce((s,p)=>s+p.hz,0)/cnt;
        const x=midT*W, baseY=yOf(avgHz)-16;
        const liveLabel = (hzToNote(avgHz)||{label:pts[i].label}).label;
        const w=ctx.measureText(liveLabel).width;
        let y=baseY;
        // Anti-collision : vérifier tous les labels déjà placés
        let changed=true;
        while(changed){
          changed=false;
          for(const p of placed){
            if(Math.abs(p.x-x)<w+6 && Math.abs(p.y-y)<12){ y-=13; changed=true; break; }
          }
        }
        if(y<2) y=yOf(avgHz)+5;
        placed.push({x,y});
        ctx.fillStyle='rgba(10,15,10,.55)';
        ctx.fillRect(x-w/2-2,y,w+4,11);
        ctx.fillStyle='rgba(255,225,140,.95)';
        ctx.fillText(liveLabel,x,y+1);
      }
      i=j;
    }
  }
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,80,80,.95)';
}

// ── DÉTECTION D'ACCORDS ──────────────────────────────────────────────────
// Dictionnaire : intervalles en demi-tons depuis la fondamentale
const CHORD_TYPES = [
  // Triades
  { suffix: '',    intervals: [0,4,7]         },  // major
  { suffix: 'm',   intervals: [0,3,7]         },  // minor
  { suffix: 'dim', intervals: [0,3,6]         },  // diminished
  { suffix: 'aug', intervals: [0,4,8]         },  // augmented
  // Septièmes
  { suffix: '7',   intervals: [0,4,7,10]      },  // dominant 7
  { suffix: 'maj7',intervals: [0,4,7,11]      },  // major 7
  { suffix: 'm7',  intervals: [0,3,7,10]      },  // minor 7
  { suffix: 'm7b5',intervals: [0,3,6,10]      },  // half-dim
  { suffix: 'dim7',intervals: [0,3,6,9]       },  // diminished 7
  { suffix: 'mM7', intervals: [0,3,7,11]      },  // minor major 7
  // Sus / Add
  { suffix: 'sus2',intervals: [0,2,7]         },
  { suffix: 'sus4',intervals: [0,5,7]         },
  { suffix: 'add9',intervals: [0,4,7,14]      },  // 14 = 2+octave
  { suffix: 'madd9',intervals:[0,3,7,14]      },
];

let chords = [];      // [{t0,t1,label}]  — segments d'accords

// Nom de note pour une classe de hauteur, en respectant la tonalité
function pcToName(pc) {
  const names = (keyNames && keyEnabled)
    ? keyNames
    : ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return names[((pc % 12) + 12) % 12];
}

function scoreChord(activePCs, rootPC, type) {
  // Score = nb d'intervalles du type présents dans les PCs actifs
  // Pénalité légère pour chaque note active qui n'appartient pas à l'accord
  const chordPCs = new Set(type.intervals.map(i => (rootPC + i) % 12));
  let hits = 0, extra = 0;
  for (const pc of chordPCs) if (activePCs.has(pc)) hits++;
  for (const pc of activePCs) if (!chordPCs.has(pc)) extra++;
  // Score normalisé : couverture − bruit
  const coverage = hits / type.intervals.length;
  const noise    = extra / Math.max(activePCs.size, 1);
  return coverage - 0.3 * noise;
}

function classifyChord(activePCs) {
  // activePCs : Set de pitch-classes (0–11) présentes dans la fenêtre
  if (activePCs.size < 2) return null;
  let bestLabel = null, bestScore = 0.55;  // seuil minimal
  for (let root = 0; root < 12; root++) {
    if (!activePCs.has(root)) continue;   // la fondamentale doit être présente
    for (const type of CHORD_TYPES) {
      const s = scoreChord(activePCs, root, type);
      if (s > bestScore) {
        bestScore = s;
        bestLabel = pcToName(root) + type.suffix;
      }
    }
  }
  return bestLabel;
}

function makeChords() {
  chords = [];
  if (!curveMusic.length) return;

  const N = curveMusic.length;

  // ── 1. Fenêtre adaptée à la durée : ~500 ms, pas ~125 ms
  const framesPerSec = N / (abuf ? abuf.duration : 1);
  const WIN_SEC  = Math.min(0.6, abuf ? abuf.duration * 0.12 : 0.5);
  const STEP_SEC = WIN_SEC * 0.25;
  const WIN  = Math.max(6, Math.round(framesPerSec * WIN_SEC));
  const STEP = Math.max(2, Math.round(framesPerSec * STEP_SEC));

  // ── 2. Accumulation pondérée par présence temporelle
  const raw = [];
  for (let i = 0; i < N; i += STEP) {
    const j = Math.min(N, i + WIN);
    const pcWeight = new Float32Array(12);
    let totalNotes = 0;
    for (let k = i; k < j; k++) {
      for (const n of curveMusic[k].notes) {
        pcWeight[((n.midi % 12) + 12) % 12] += 1;
        totalNotes++;
      }
    }
    if (totalNotes < 3) { raw.push({ t: curveMusic[Math.floor((i+j)/2)].t, label: null }); continue; }

    const maxW = Math.max(...pcWeight);
    const activePCs = new Set();
    for (let pc = 0; pc < 12; pc++) {
      if (pcWeight[pc] / maxW >= 0.15) activePCs.add(pc);
    }

    // Score pondéré sur tous les accords possibles
    let bestLabel = null, bestScore = 0.45;
    for (let root = 0; root < 12; root++) {
      if (!activePCs.has(root)) continue;
      for (const type of CHORD_TYPES) {
        let hit = 0;
        for (const iv of type.intervals) hit += pcWeight[(root + iv) % 12] / maxW;
        let noise = 0;
        for (const pc of activePCs)
          if (!type.intervals.some(iv => (root + iv) % 12 === pc)) noise++;
        const score = (hit / type.intervals.length) - 0.2 * (noise / Math.max(activePCs.size, 1));
        if (score > bestScore) { bestScore = score; bestLabel = pcToName(root) + type.suffix; }
      }
    }
    raw.push({ t: curveMusic[Math.floor((i + j) / 2)].t, label: bestLabel });
  }

  // ── 3. Lissage médian sur 3 voisins
  const smoothed = raw.map((r, i) => {
    const nb = raw.slice(Math.max(0, i-1), Math.min(raw.length, i+2)).map(x => x.label);
    const counts = {};
    for (const l of nb) if (l) counts[l] = (counts[l] || 0) + 1;
    const best = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    return { t: r.t, label: best ? best[0] : null };
  });

  // ── 4. Fusion des segments consécutifs (min 2 fenêtres)
  const MIN_WIN = 2;
  let i = 0;
  while (i < smoothed.length) {
    const lbl = smoothed[i].label;
    if (!lbl) { i++; continue; }
    let j = i + 1;
    while (j < smoothed.length && smoothed[j].label === lbl) j++;
    if (j - i >= MIN_WIN) {
      const t0 = i === 0 ? 0 : (smoothed[i].t + smoothed[i-1].t) / 2;
      const t1 = j >= smoothed.length ? 1 : (smoothed[j-1].t + smoothed[j].t) / 2;
      chords.push({ t0, t1, label: lbl });
    }
    i = j;
  }
}

function drawChords() {
  const strip = $('chordStrip');
  strip.innerHTML = '';
  if (!showChords || !chords.length) return;

  const W = strip.clientWidth || strip.offsetWidth || 300;

  for (const c of chords) {
    const left  = c.t0 * 100;
    const width = Math.max(0, (c.t1 - c.t0) * 100);
    if (width < 0.5) continue;

    const el = document.createElement('div');
    el.style.cssText = [
      'position:absolute',
      `left:${left}%`,
      `width:${width}%`,
      'top:0','bottom:0',
      'display:flex','align-items:center','justify-content:center',
      'font-family:"DM Mono",monospace','font-size:10px','font-weight:600',
      'color:rgba(240,200,74,.95)',
      'border-right:1px solid rgba(240,200,74,.18)',
      'overflow:hidden','white-space:nowrap',
      'cursor:default',
    ].join(';');
    el.textContent = c.label;
    el.title = c.label;
    strip.appendChild(el);
  }
}

// Profils de saillance tonale (major / minor) — Krumhansl & Kessler 1982

// Règle : une tonalité à n bémols utilise les bémols, n dièses utilise les dièses.
// Les noms sont ordonnés par classe de hauteur (0=C, 1=C#/Db, …, 11=B/Cb).

};

let detectedKey = null;    // ex. 'Bb min' | null
let keyEnabled  = true;    // toggle via clic sur le badge
let keyNames    = null;    // tableau[12] de noms actuellement actif

function ksCorrelate(profile, weights) {
  // Corrélation de Pearson entre le profil de référence et les poids mesurés
  const n = 12;
  const mP = profile.reduce((a,b)=>a+b)/n;
  const mW = weights.reduce((a,b)=>a+b)/n;
  let num=0, dP=0, dW=0;
  for(let i=0;i<n;i++){
    const dp=profile[i]-mP, dw=weights[i]-mW;
    num+=dp*dw; dP+=dp*dp; dW+=dw*dw;
  }
  return (dP*dW)<1e-12 ? 0 : num/Math.sqrt(dP*dW);
}

function detectKey(pitchWeights) {
  // pitchWeights : Float32Array[12] — énergie par classe de hauteur (0=C)
  let bestKey=null, bestR=-Infinity;
  for(let root=0;root<12;root++){
    // Décaler le profil pour aligner root sur la position 0
    const rotated = Array.from({length:12}, (_,i) => pitchWeights[(i+root)%12]);
    const rMaj = ksCorrelate(KS_MAJOR, rotated);
    const rMin = ksCorrelate(KS_MINOR, rotated);
    const NOTE=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
    if(rMaj>bestR){ bestR=rMaj; bestKey=NOTE[root]+' maj'; }
    if(rMin>bestR){ bestR=rMin; bestKey=NOTE[root]+' min'; }
  }
  return bestKey;
}

// Accumule les poids de pitch depuis curveMusic (mode multi uniquement)
function computePitchWeights() {
  const w = new Float32Array(12);
  for(const frame of curveMusic){
    for(const n of frame.notes){
      const pc = ((n.midi%12)+12)%12;
      w[pc] += 1;
    }
  }
  return w;
}

function applyDetectedKey(key) {
  detectedKey = key;
  keyNames = KEY_NOTE_NAMES[key] || null;
  const badge = $('keyBadge');
  if(key && keyEnabled && showChords){
    badge.textContent = '♩ ' + key;
    badge.style.display = 'block';
    badge.style.opacity = '1';
  } else {
    badge.style.display = 'none';
  }
}

function runKeyDetection() {
  if(!multiPitch || !curveMusic.length){ detectedKey=null; keyNames=null; $('keyBadge').style.display='none'; return; }
  const w = computePitchWeights();
  const key = detectKey(w);
  applyDetectedKey(key);
}

// ── DÉTECTION DE PHRASES (mode oiseau) ──────────────────────────────────
let phrases      = [];   // [{t0, t1}, …] en secondes
let phraseIdx    = -1;   // index de la phrase zoomée (-1 = aucune)

// Palette de couleurs pour les phrases (teintes distinctes, semi-transparentes)
const PHRASE_COLORS = [
  'rgba(74,200,240,.28)',   // cyan
  'rgba(180,100,255,.28)',  // violet
  'rgba(74,240,140,.28)',   // vert
  'rgba(240,180,74,.28)',   // orange
  'rgba(240,74,120,.28)',   // rose
  'rgba(74,160,240,.28)',   // bleu
];

function detectPhrases(){
  phrases = []; phraseIdx = -1;
  if(!specFull) return;
  const {out, cols, maxBin, dur: totalDur} = specFull;

  // 1. Énergie par colonne (RMS des bins)
  const energy = new Float32Array(cols);
  for(let c=0; c<cols; c++){
    const off = c * maxBin;
    let s = 0;
    for(let b=0; b<maxBin; b++) s += out[off+b] * out[off+b];
    energy[c] = Math.sqrt(s / maxBin);
  }

  // 2. Lissage (fenêtre glissante de 5 colonnes)
  const smooth = new Float32Array(cols);
  const WIN = 5;
  for(let c=0; c<cols; c++){
    let sum=0, n=0;
    for(let k=Math.max(0,c-WIN); k<=Math.min(cols-1,c+WIN); k++){ sum+=energy[k]; n++; }
    smooth[c] = sum/n;
  }

  // 3. Seuil global p10/p90
  const sorted = Float32Array.from(smooth).sort();
  const p10 = sorted[Math.floor(cols * 0.10)];
  const p90 = sorted[Math.floor(cols * 0.90)];
  const THRESH = p10 + (p90 - p10) * 0.55;
  // Log énergie zone 22-26s
  const c22=Math.floor(22/totalDur*cols), c26=Math.floor(26/totalDur*cols);
  const zone=Array.from(smooth.slice(c22,c26));
  console.log('[phrases] THRESH=',THRESH.toFixed(5),' zone 22-26s max=',Math.max(...zone).toFixed(5));

  // 4. Segmentation : colonnes actives → intervalles temporels
  const colDur = totalDur / cols;
  const MIN_DUR  = 0.30;   // phrase min 300 ms
  const MIN_GAP  = 0.45;   // silence min 450 ms
  const MARGIN   = 0.05;

  const raw = [];
  let inPhrase = false, t0 = 0;
  for(let c=0; c<cols; c++){
    const t = c * colDur;
    if(!inPhrase && smooth[c] > THRESH){ inPhrase=true; t0=t; }
    if(inPhrase && smooth[c] <= THRESH){ inPhrase=false; raw.push({t0, t1:t}); }
  }
  if(inPhrase) raw.push({t0, t1: totalDur});

  // 5. Fusionner les silences courts, éliminer les phrases trop courtes
  const merged = [];
  for(const seg of raw){
    if(seg.t1 - seg.t0 < MIN_DUR) continue;
    if(merged.length && seg.t0 - merged[merged.length-1].t1 < MIN_GAP){
      merged[merged.length-1].t1 = seg.t1;
    } else {
      merged.push({...seg});
    }
  }
  phrases = merged.filter(s => s.t1 - s.t0 >= MIN_DUR);
  console.log('[phrases]', phrases.length, phrases.map(p=>p.t0.toFixed(2)+'-'+p.t1.toFixed(2)).join(', '));
  phrases._margin = MARGIN;
}

function drawPhrases(){
  const phc = $('phc');
  if(!phc) return;
  const W = phc.width, H = phc.height;
  const ctx = phc.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!showPhrases || !phrases.length || stretchMode !== 'oiseau') return;

  for(let i=0; i<phrases.length; i++){
    const {t0, t1} = phrases[i];
    // Projeter sur la vue courante
    const winLen = viewEnd - viewStart;
    const x0 = Math.max(0, (t0 - viewStart) / winLen * W);
    const x1 = Math.min(W, (t1 - viewStart) / winLen * W);
    if(x1 <= x0) continue;
    const color = 'rgba(74,200,240,.25)';

    // Fond de la phrase
    ctx.fillStyle = i === phraseIdx ? 'rgba(74,200,240,.42)' : 'rgba(74,200,240,.18)';
    ctx.fillRect(x0, 0, x1-x0, H);

    // Bordures verticales
    const borderColor = i === phraseIdx ? 'rgba(74,200,240,.9)' : 'rgba(74,200,240,.6)';
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = i === phraseIdx ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(x0,0); ctx.lineTo(x0,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1,0); ctx.lineTo(x1,H); ctx.stroke();

    // Numéro de phrase
    if(x1-x0 > 18){
      ctx.font = `${i===phraseIdx?'700':'500'} 9px "DM Mono",monospace`;
      ctx.fillStyle = borderColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(i+1, (x0+x1)/2, 3);
    }
  }
}

  $('phraseSep').style.display   = show ? 'block' : 'none';
  $('phraseLeft').style.display  = show ? '' : 'none';
  $('phraseTxt').style.display   = show ? '' : 'none';
  $('phraseRight').style.display = show ? '' : 'none';
  if(!show) return;
  $('phraseTxt').textContent = phraseIdx >= 0
    ? `${phraseIdx+1}/${phrases.length}`
    : `·/${phrases.length}`;
  $('phraseLeft').disabled  = phraseIdx <= 0;
  $('phraseRight').disabled = phraseIdx >= phrases.length - 1;
}

function goToPhrase(idx){
  if(idx < 0 || idx >= phrases.length) return;
  phraseIdx = idx;
  const {t0, t1} = phrases[idx];
  const margin = Math.max(0.1, (t1-t0) * 0.08);
  const vs = Math.max(0, t0 - margin);
  const ve = Math.min(dur, t1 + margin);
  const snap = {offset0: offset, t0_0: t0, vs0: viewStart, ve0: viewEnd};
  const wasPlaying = playing;
  pushView();
  viewStart = vs; viewEnd = ve;
  setZoomBadge(true);
  updatePhraseNav();
  drawPhrases();
  ph.style.display = 'none';
  const job = busy;
  analyze(job).then(()=>{ afterAnalyze(job, wasPlaying, snap); });
}

$('phraseLeft').addEventListener('click',  e=>{ e.stopPropagation(); goToPhrase(phraseIdx - 1); });
$('phraseLeft').addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); goToPhrase(phraseIdx - 1); });
$('phraseRight').addEventListener('click', e=>{ e.stopPropagation(); goToPhrase(phraseIdx + 1); });
$('phraseRight').addEventListener('touchend', e=>{ e.stopPropagation(); e.preventDefault(); goToPhrase(phraseIdx + 1); });

function hzToNote(hz){
  if(!hz||hz<=0) return null;
  const names = (keyNames && keyEnabled) ? keyNames : ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const midi=Math.round(69 + 12*Math.log2(hz/440));
  const name=names[((midi%12)+12)%12];
  const oct=Math.floor(midi/12)-1;
  return {label:name+oct, midi, cents:Math.round(100*(69+12*Math.log2(hz/440)-midi))};
}

function drawCurve(H){
  const ctx=pc.getContext('2d'), W=pc.width; H=H||pc.height;
  ctx.clearRect(0,0,W,H);
  if(!curve.length) return;
  const yOf=hz=>hzToY(hz,H);

  if(showP){
    const p1=(v=>isNaN(v)?1000:v)(parseInt(pmin.value)), p2=(v=>isNaN(v)?8000:v)(parseInt(pmax.value));
    // Bande de plage pitch (discrète)
    const y1=(1-p2/MFREQ)*H, y2=(1-p1/MFREQ)*H;
    ctx.fillStyle='rgba(240,200,74,.04)'; ctx.fillRect(0,y1,W,y2-y1);
    ctx.strokeStyle='rgba(240,200,74,.15)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    [y1,y2].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});
    ctx.setLineDash([]);
    // Points de pitch façon Praat
    ctx.fillStyle='rgba(255,80,80,.95)';
    for(const p of curve){
      if(!p) continue;
      const x=p.t*W, y=yOf(p.hz);
      ctx.beginPath(); ctx.arc(x,y,1.6,0,6.283); ctx.fill();
    }
  }

  // Étiquettes de notes (indépendantes de l'affichage de la courbe)
  if(showNotes) labelHeldNotes(ctx,W,H,yOf);
}

// ── FORMANTS F1 / F2 (LPC) ───────────────────────────────────────────────
// Calcule les coefficients LPC d'ordre p par la méthode d'autocorrélation
// (algorithme de Levinson-Durbin), puis extrait les racines du polynôme A(z)
// par la méthode de Newton pour trouver les pics de l'enveloppe spectrale.
// F1 : 200–1000 Hz   F2 : 700–3500 Hz  (voix humaine adulte)

function lpcCoeffs(frame, order) {
  const N = frame.length;
  // Autocorrélations R[0..order]
  const R = new Float64Array(order + 1);
  for (let k = 0; k <= order; k++) {
    let s = 0;
    for (let n = 0; n < N - k; n++) s += frame[n] * frame[n + k];
    R[k] = s;
  }
  if (R[0] < 1e-12) return null;  // silence

  // Levinson-Durbin
  const a   = new Float64Array(order + 1);  // coefficients LPC (1-indexés)
  const tmp = new Float64Array(order + 1);
  a[1] = -R[1] / R[0];
  let err = R[0] + R[1] * a[1];
  for (let m = 2; m <= order; m++) {
    let lambda = 0;
    for (let k = 1; k < m; k++) lambda += a[k] * R[m - k];
    lambda = -(R[m] + lambda) / err;
    for (let k = 1; k < m; k++) tmp[k] = a[k] + lambda * a[m - k];
    tmp[m] = lambda;
    for (let k = 1; k <= m; k++) a[k] = tmp[k];
    err *= 1 - lambda * lambda;
    if (err < 1e-12) break;
  }
  return a;  // a[1..order], polynôme A(z) = 1 + a[1]z^-1 + … + a[order]z^-order
}

// Évalue |1/A(e^{j2πf/sr})|² pour trouver les pics (formants)
function lpcSpectrum(a, order, sr, nPoints) {
  const spec = new Float32Array(nPoints);
  for (let i = 0; i < nPoints; i++) {
    const freq = i / nPoints * (sr / 2);
    const omega = 2 * Math.PI * freq / sr;
    // A(z) = 1 + Σ a[k] * e^{-jkω}
    let re = 1, im = 0;
    for (let k = 1; k <= order; k++) {
      re += a[k] * Math.cos(-k * omega);
      im += a[k] * Math.sin(-k * omega);
    }
    const power = re * re + im * im;
    spec[i] = power < 1e-20 ? 1e20 : 1 / power;
  }
  return spec;
}

function makeFormants() {
  if (!spec || !abuf) return;
  const ORDER = 12;        // ordre LPC standard pour la voix
  const SPEC_PTS = 512;    // résolution de l'enveloppe spectrale
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const total = data.length;
  const { cols } = spec;

  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(FFTN + 1, ve - vs);
  const frameSize = Math.min(FFTN, 1024);  // fenêtre LPC : 1024 samples suffit
  const winLPC = hann(frameSize);

  // Plages formants en indices dans le spectre LPC (0..SPEC_PTS → 0..sr/2)
  const f1Min = Math.floor(200  / (sr / 2) * SPEC_PTS);
  const f1Max = Math.ceil(1000  / (sr / 2) * SPEC_PTS);
  const f2Min = Math.floor(700  / (sr / 2) * SPEC_PTS);
  const f2Max = Math.ceil(3500  / (sr / 2) * SPEC_PTS);

  formants = [];
  for (let c = 0; c < cols; c++) {
    const pos = vs + Math.floor(c / cols * (span - frameSize));

    // Appliquer la fenêtre de Hann
    const frame = new Float64Array(frameSize);
    let rms = 0;
    for (let i = 0; i < frameSize; i++) {
      const s = (data[pos + i] || 0) * winLPC[i];
      frame[i] = s;
      rms += s * s;
    }
    rms = Math.sqrt(rms / frameSize);
    if (rms < 0.005) { formants.push(null); continue; }

    const a = lpcCoeffs(frame, ORDER);
    if (!a) { formants.push(null); continue; }

    const lSpec = lpcSpectrum(a, ORDER, sr, SPEC_PTS);

    // Chercher le pic de F1 dans sa plage
    let f1Idx = -1, f1Val = -Infinity;
    for (let i = f1Min + 1; i < f1Max - 1; i++) {
      if (lSpec[i] > lSpec[i - 1] && lSpec[i] > lSpec[i + 1] && lSpec[i] > f1Val) {
        f1Val = lSpec[i]; f1Idx = i;
      }
    }
    // Chercher le pic de F2 dans sa plage, au-dessus de F1
    const f2Start = f1Idx > 0 ? Math.max(f2Min, f1Idx + 3) : f2Min;
    let f2Idx = -1, f2Val = -Infinity;
    for (let i = f2Start + 1; i < f2Max - 1; i++) {
      if (lSpec[i] > lSpec[i - 1] && lSpec[i] > lSpec[i + 1] && lSpec[i] > f2Val) {
        f2Val = lSpec[i]; f2Idx = i;
      }
    }

    const idxToHz = idx => idx / SPEC_PTS * (sr / 2);
    const f1 = f1Idx >= 0 ? idxToHz(f1Idx) : null;
    const f2 = f2Idx >= 0 ? idxToHz(f2Idx) : null;
    const vowel = (f1 && f2) ? classifyVowel(f1, f2) : null;
    formants.push((f1 || f2) ? { t: c / cols, f1, f2, vowel } : null);
  }
}

// ── TABLES DE VOYELLES PAR LANGUE ────────────────────────────────────────
// Sources : Derivery 1997, Calliope 1989 (FR) ; Arai 2003, Nishi 2008 (JA)
const VOWELS_FR = [
  { label: 'i',  f1:  270, f2: 2290 },
  { label: 'e',  f1:  400, f2: 2060 },
  { label: 'ɛ',  f1:  550, f2: 1820 },
  { label: 'a',  f1:  800, f2: 1500 },

  { label: 'o',  f1:  400, f2:  740 },

  { label: 'y',  f1:  280, f2: 1660 },
  { label: 'ø',  f1:  400, f2: 1420 },
  { label: 'œ',  f1:  550, f2: 1340 },
  { label: 'ə',  f1:  440, f2: 1380 },
  { label: 'ɑ̃', f1:  700, f2:  900 },
  { label: 'ɛ̃', f1:  530, f2: 1620 },

];

// Japonais : 5 voyelles /a i ɯ e o/ — katakana + romaji
// /ɯ/ (u japonais) : lèvres non-arrondies, F2 bien plus bas que le /u/ français
const VOWELS_JA = [
  { label: 'ア a', f1:  820, f2: 1240 },
  { label: 'イ i', f1:  300, f2: 2240 },
  { label: 'ウ ɯ', f1:  320, f2: 1370 },
  { label: 'エ e', f1:  460, f2: 2000 },
  { label: 'オ o', f1:  430, f2:  820 },
];

let vowelLang = 'FR';   // 'FR' | 'JA'
let VOWELS = VOWELS_FR;

// Distance dans l'espace F1/F2 — F2 compressé (×0.4) pour équilibrer les échelles
function vowelDist(f1, f2, v) {
  const df1 = f1 - v.f1, df2 = (f2 - v.f2) * 0.4;
  return Math.sqrt(df1 * df1 + df2 * df2);
}

function classifyVowel(f1, f2) {
  if (f1 === null || f2 === null) return null;
  let best = null, bestD = Infinity;
  for (const v of VOWELS) {
    const d = vowelDist(f1, f2, v);
    if (d < bestD) { bestD = d; best = v; }
  }
  // Seuil de confiance plus serré en japonais (seulement 5 voyelles)
  const threshold = vowelLang === 'JA' ? 500 : 400;
  return bestD < threshold ? best : null;
}

function drawFormants(H) {
  const W = fc.width;
  const ctx = fc.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (!showFormants || !formants.length) return;
  const yOf = hz => hzToY(hz, H);

  // ── Points F1 / F2 ──────────────────────────────────────────────────────
  for (const p of formants) {
    if (!p) continue;
    const x = p.t * W;
    if (p.f1 !== null) {
      ctx.fillStyle = 'rgba(74,200,240,.85)';
      ctx.beginPath(); ctx.arc(x, yOf(p.f1), 1.8, 0, 6.283); ctx.fill();
    }
    if (p.f2 !== null) {
      ctx.fillStyle = 'rgba(180,100,255,.85)';
      ctx.beginPath(); ctx.arc(x, yOf(p.f2), 1.8, 0, 6.283); ctx.fill();
    }
  }

  // ── Étiquettes de voyelles sur les segments stables ──────────────────────
  // Un segment stable = même voyelle classifiée ≥ MIN_STABLE frames consécutives
  const MIN_STABLE = 6;

  // 1) Classifier chaque frame (depuis le cache stocké dans formants[])
  const classified = formants.map(p => {
    if (!p || p.f1 === null || p.f2 === null) return null;
    const v = p.vowel;  // déjà calculé par makeFormants / reclassifié par changement de langue
    return v ? { label: v.label, t: p.t,
                 yMid: (yOf(p.f1) + yOf(p.f2)) / 2 } : null;
  });

  // 2) Regrouper en segments de même voyelle
  // Police légèrement plus grande pour les kana+romaji japonais
  const isJA = vowelLang === 'JA';
  ctx.font = isJA ? 'bold 10px "DM Mono",monospace' : 'bold 11px "DM Mono",monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const placed = [];

  let i = 0;
  while (i < classified.length) {
    if (!classified[i]) { i++; continue; }
    const label = classified[i].label;
    let j = i + 1;
    while (j < classified.length && classified[j] && classified[j].label === label) j++;
    const cnt = j - i;
    if (cnt >= MIN_STABLE) {
      // Midpoint temporel et vertical du segment
      const midT = (classified[i].t + classified[j - 1].t) / 2;
      const x = midT * W;
      const sumY = classified.slice(i, j).reduce((s, p) => s + p.yMid, 0);
      let y = sumY / cnt - 14;  // légèrement au-dessus de la zone F1-F2

      // Anti-collision — largeur adaptée à la longueur du label
      const tw = ctx.measureText(label).width;
      const collW = tw + 8;
      let moved = true;
      while (moved) {
        moved = false;
        for (const pl of placed) {
          if (Math.abs(pl.x - x) < (collW + pl.tw) / 2 + 2 && Math.abs(pl.y - y) < 14) {
            y -= 15; moved = true; break;
          }
        }
      }
      y = Math.max(6, Math.min(H - 12, y));
      placed.push({ x, y, tw });

      // Fond semi-transparent
      ctx.fillStyle = 'rgba(10,15,10,.68)';
      ctx.fillRect(x - tw / 2 - 3, y - 7, tw + 6, 14);

      // Texte violet clair
      ctx.fillStyle = 'rgba(200,160,255,.97)';
      ctx.fillText(label, x, y);
    }
    i = j;
  }

  // ── Légendes F1 / F2 en haut à gauche ────────────────────────────────────
  ctx.font = '600 8px "DM Mono",monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(74,200,240,.9)';
  ctx.fillText('F1', 4, 4);
  ctx.fillStyle = 'rgba(180,100,255,.9)';
  ctx.fillText('F2', 18, 4);
}

// Détecte les plateaux de hauteur stables et y pose une étiquette de note,
// en évitant les superpositions (espacement minimal en pixels).
function labelHeldNotes(ctx,W,H,yOf){
  const MIN_LEN = window._overrideMinLen !== undefined ? window._overrideMinLen : 5;
  ctx.font='600 9px "DM Mono", monospace';
  ctx.textBaseline='middle';
  ctx.textAlign='center';

  // 1) collecter les segments tenus candidats
  const labels=[];
  let i=0;
  while(i<curve.length){
    if(!curve[i]){ i++; continue; }
    const n0=hzToNote(curve[i].hz);
    let j=i+1, sumHz=curve[i].hz, cnt=1;
    while(j<curve.length && curve[j]){
      const nj=hzToNote(curve[j].hz);
      if(!nj || nj.midi!==n0.midi) break;
      sumHz+=curve[j].hz; cnt++; j++;
    }
    if(cnt>=MIN_LEN){
      const midT=(curve[i].t+curve[j-1].t)/2;
      const avgHz=sumHz/cnt;
      labels.push({x:midT*W, y:yOf(avgHz), lab:hzToNote(avgHz).label});
    }
    i=j;
  }

  if(!labels.length) return;

  // 2) chaque étiquette est posée juste AU-DESSUS de son point sur la courbe
  ctx.textBaseline='top';
  for(const L of labels){
    const w=ctx.measureText(L.lab).width;
    let y=L.y-28;                      // au-dessus du point de la courbe
    if(y < 0) y=L.y+5;                 // si trop haut, repasser en dessous
    ctx.fillStyle='rgba(10,15,10,.55)';
    ctx.fillRect(L.x-w/2-2, y, w+4, 11);
    ctx.fillStyle='rgba(255,225,140,.95)';
    ctx.fillText(L.lab, L.x, y+1);
  }
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,80,80,.95)';
}
