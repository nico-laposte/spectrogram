<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f0a">
<title>Merle — Analyse Sonore</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap');
:root{--bg:#0a0f0a;--surf:#111a11;--bdr:#1e2e1e;--acc:#7ecf6e;--acc2:#f0c84a;--txt:#c8d8c0;--mut:#4a5e44}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;height:100%;overflow:hidden;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
header{padding:14px 20px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:baseline;gap:12px;flex-shrink:0}
header h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;color:var(--acc)}
header span{font-size:10px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase}
.iz{flex-shrink:0;margin:12px 16px 0;border:1px dashed var(--bdr);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.iz.has{border-color:var(--acc);border-style:solid}
.iz input{position:absolute;inset:0;opacity:0;width:100%;height:100%}
.icn{width:32px;height:32px;flex-shrink:0;fill:none;stroke:var(--acc);stroke-width:1.5}
.lbl{font-size:12px}.sub{font-size:10px;color:var(--mut);margin-top:2px}
.tip{display:none;margin:6px 16px 0;font-size:10px;color:var(--mut);line-height:1.6;padding:10px 12px;background:var(--surf);border-radius:8px;border:1px solid var(--bdr)}
.tip strong{color:var(--acc2)}
.viz{flex:1;margin:12px 16px;position:relative;border-radius:10px;overflow:hidden;background:var(--surf);border:1px solid var(--bdr);min-height:0}
canvas{position:absolute;inset:0;width:100%;height:100%}
#pc{pointer-events:none}
.em{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mut);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.em svg{opacity:.3}
#ph{position:absolute;top:0;bottom:0;width:40px;transform:translateX(-50%);display:none;cursor:ew-resize;touch-action:none;z-index:10}
#ph::after{content:'';position:absolute;top:0;bottom:0;left:50%;width:1.5px;transform:translateX(-50%);background:rgba(255,255,255,.7);box-shadow:0 0 6px rgba(255,255,255,.4)}
.fl{position:absolute;left:4px;top:0;bottom:0;pointer-events:none}
.fl span{position:absolute;font-size:8px;color:rgba(200,216,192,.45);transform:translateY(-50%)}
.tl{position:absolute;bottom:4px;left:28px;right:8px;display:flex;justify-content:space-between;pointer-events:none}
.tl span{font-size:8px;color:rgba(200,216,192,.4)}
.ov{position:absolute;inset:0;background:rgba(10,15,10,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ov.on{display:flex}
.sp{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.ot{font-size:11px;color:var(--acc);letter-spacing:.1em;text-transform:uppercase}
.ob{width:150px;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.ob div{height:100%;width:0%;background:var(--acc);transition:width .12s}
.ctrl{flex-shrink:0;padding:0 16px 12px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:10px}
.rl{font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;min-width:40px;flex-shrink:0}
#pb{width:40px;height:40px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#rwb{width:30px;height:30px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#rwb:disabled{opacity:.3}#rwb svg{fill:var(--acc)}
#pb:disabled{opacity:.3}#pb svg{fill:var(--bg)}
.pw{flex:1;height:28px;position:relative;display:flex;align-items:center}
.pt{width:100%;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
#pf{height:100%;width:0%;background:var(--acc)}
.pw input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0}
#td{font-size:10px;color:var(--mut);white-space:nowrap;min-width:60px;text-align:right}
.sbs{display:flex;gap:5px;flex:1}
.sb,.mdb{flex:1;height:30px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;color:var(--mut);font-family:'DM Mono',monospace;font-size:11px}
.sb.on,.mdb.on{background:rgba(126,207,110,.1);border-color:var(--acc);color:var(--acc)}
.fic{display:flex;align-items:center;gap:6px;flex:1}
.fic label{font-size:9px;color:var(--mut)}
.fic input{width:62px;height:28px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px;text-align:center;-webkit-appearance:none}
.fic input:focus{outline:none;border-color:var(--acc)}

.dot{width:8px;height:8px;border-radius:50%;background:rgb(255,80,80);flex-shrink:0}
#sel{position:absolute;top:0;bottom:0;background:rgba(126,207,110,.15);border-left:1.5px solid var(--acc);border-right:1.5px solid var(--acc);display:none;pointer-events:none}
#selrd{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--acc);background:rgba(10,15,10,.8);padding:3px 8px;border-radius:6px;display:none;pointer-events:none;white-space:nowrap}
.trsp-btn{width:30px;height:30px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--mut)}
.trsp-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(126,207,110,.08)}
#zoomBadge{position:absolute;top:6px;right:6px;display:none;align-items:center;gap:6px;background:rgba(240,200,74,.14);border:1px solid var(--acc2);border-radius:8px;padding:4px 6px;z-index:20}
#zoomBadge.on{display:flex}
#zoomTxt{font-size:10px;color:var(--acc2);white-space:nowrap}
#zoomExit{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--acc2);color:#0a0f0a;border:none;border-radius:50%;font-family:'DM Mono',monospace;font-size:12px;line-height:1;padding:0}
#panLeft,#panRight,#zoomOut{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(240,200,74,.15);border:1px solid var(--acc2);border-radius:6px;color:var(--acc2);font-size:13px;padding:0;cursor:pointer}
#panLeft:disabled,#panRight:disabled{opacity:.25;cursor:default}
.viz.zoomed{border-color:var(--acc2);box-shadow:inset 0 0 0 1px rgba(240,200,74,.4)}
.pl{width:36px;height:20px;background:var(--bdr);border-radius:10px;position:relative;border:none;flex-shrink:0;transition:background .2s}
.pl.on{background:rgba(240,200,74,.3)}
.pl::after{content:'';position:absolute;width:14px;height:14px;background:var(--mut);border-radius:50%;top:3px;left:3px;transition:transform .2s,background .2s}
.pl.on::after{transform:translateX(16px);background:var(--acc2)}
</style>
</head>
<body>
<div class="app">
  <header><h1>Merle</h1><span>analyse sonore</span></header>

  <div class="iz" id="iz">
    <svg class="icn" viewBox="0 0 32 32"><path d="M16 4v16M10 14l6 6 6-6M6 22v4a2 2 0 002 2h16a2 2 0 002-2v-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div><div class="lbl" id="ilbl">Importer un fichier audio</div><div class="sub">mp3 · m4a · wav · aac</div></div>

      </svg><span>importer un fichier · glisser pour zoomer</span>

      <button id="pb" disabled><svg id="pi" width="16" height="16" viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg></button>

<script>
// ── CODE INLINE DU WEB WORKER POUR LES OPÉRATIONS LOURDES ────────────────────
const workerCode = `
self.onmessage = function(e) {
  if (e.data.type === 'stretch') {
    const { mode, samples, sampleRate, factor } = e.data;
    const input = new Float32Array(samples);
    let output;

    if (mode === 'oiseau' || mode === 'musique') {
      output = timeStretchWSOLA(input, factor, mode);
    } else {
      output = timeStretchPV(input, sampleRate, factor);
    }

    self.postMessage({ type: 'done', buffer: output.buffer }, [output.buffer]);
  }
};

// ── IMPLEMENTATION WSOLA SÉCURISÉE AVEC RÉFÉRENCE HISTORIQUE ET CONTINUITÉ DE PHASE
function timeStretchWSOLA(input, factor, mode) {
  // Ajustements selon les conseils : oiseau = fenêtres courtes, musique = fenêtres longues
  const frameSize = mode === 'oiseau' ? 1024 : 2048;
  const overlap = 0.75;
  const searchRadius = mode === 'oiseau' ? 128 : 512;

  const synthesisHop = Math.floor(frameSize * (1 - overlap));
  const analysisHop = synthesisHop / factor;
  const outputLength = Math.round(input.length * factor);
  const output = new Float32Array(outputLength);
  const weight = new Float32Array(outputLength);

  const window = new Float32Array(frameSize);
  for (let i = 0; i < frameSize; i++) {
    window[i] = 0.5 - 0.5 * Math.cos((2 * Math.PI * i) / (frameSize - 1));
  }

  // Stockage explicite du dernier segment de référence pour une corrélation parfaite (évite les clics)
  const refSegment = new Float32Array(frameSize);

  let inPos = 0;
  let outPos = 0;

  // Première trame
  for (let i = 0; i < frameSize; i++) {
    const sample = input[i] || 0;
    output[i] += sample * window[i];
    weight[i] += window[i];
    refSegment[i] = sample;
  }

  inPos += analysisHop;
  outPos += synthesisHop;

  while (outPos + frameSize < outputLength && inPos + frameSize < input.length) {
    const expectedInPos = Math.round(inPos);
    let bestOffset = 0;
    let bestScore = -Infinity;

    // Calcul de la cible de corrélation temporelle
    for (let offset = -searchRadius; offset <= searchRadius; offset++) {
      const candidatePos = expectedInPos + offset;
      if (candidatePos < 0 || candidatePos + frameSize >= input.length) continue;

      let corr = 0, energyA = 0, energyB = 0;
      // Corrélation sur la zone de chevauchement critique
      for (let i = 0; i < synthesisHop; i++) {
        const a = input[candidatePos + i];
        const b = refSegment[synthesisHop + i]; // Comparaison rigoureuse avec l'historique
        corr += a * b;
        energyA += a * a;
        energyB += b * b;
      }

      const score = corr / (Math.sqrt(energyA * energyB) + 1e-12);
      if (score > bestScore) {
        bestScore = score;
        bestOffset = offset;
      }
    }

    const bestInPos = expectedInPos + bestOffset;

    // Sauvegarde de la référence du bloc d'entrée sélectionné pour l'itération suivante
    for (let i = 0; i < frameSize; i++) {
      refSegment[i] = input[bestInPos + i] || 0;
    }

    // Overlap-Add pondéré
    for (let i = 0; i < frameSize; i++) {
      const outIndex = outPos + i;
      if (outIndex >= outputLength) break;
      const w = window[i];
      output[outIndex] += refSegment[i] * w;
      weight[outIndex] += w;
    }

    inPos += analysisHop;
    outPos += synthesisHop;
  }

  // Normalisation de l'enveloppe d'amplitude globale
  for (let i = 0; i < outputLength; i++) {
    if (weight[i] > 1e-12) output[i] /= weight[i];
  }

  return output;
}

// ── PHASE VOCODER AVEC ENHANCED IDENTITY PHASE LOCKING (MODE VOIX)
function timeStretchPV(input, sampleRate, factor) {
  const fftSize = 2048; // Idéal pour préserver la netteté des formants vocaux
  // Utilisation d'un gros overlap (87.5% soit FFT/8) pour éliminer le flou de phase lors des forts ralentissements
  const anaHop = fftSize >> 3; 
  const synHop = Math.round(anaHop * factor);

  const window = new Float32Array(fftSize);
  for (let i = 0; i < fftSize; i++) {
    window[i] = Math.sqrt(0.5 * (1 - Math.cos((2 * Math.PI * i) / (fftSize - 1)))); // Sqrt-Hann
  }

  const outputLength = Math.round(input.length * factor);
  const output = new Float32Array(outputLength + fftSize);
  const weight = new Float32Array(outputLength + fftSize);

  let inPos = 0;
  let outPos = 0;

  const lastPhase = new Float32Array(fftSize / 2 + 1);
  const phaseAcc = new Float32Array(fftSize / 2 + 1);

  const re = new Float32Array(fftSize);
  const im = new Float32Array(fftSize);

  while (inPos + fftSize < input.length && outPos + fftSize < output.length) {
    // 1) Remplissage de la trame d'analyse + application fenêtre
    for (let i = 0; i < fftSize; i++) {
      re[i] = input[Math.floor(inPos) + i] * window[i];
      im[i] = 0;
    }

    fftInPlace(re, im);

    const numBins = fftSize / 2 + 1;
    const mag = new Float32Array(numBins);
    const phase = new Float32Array(numBins);
    const peaks = new Uint8Array(numBins);

    for (let k = 0; k < numBins; k++) {
      mag[k] = Math.sqrt(re[k] * re[k] + im[k] * im[k]);
      phase[k] = Math.atan2(im[k], re[k]);
    }

    // 2) Détection des pics spectraux locaux pour l'Identity Phase Locking
    for (let k = 2; k < numBins - 2; k++) {
      if (mag[k] > mag[k - 1] && mag[k] > mag[k - 2] && mag[k] > mag[k + 1] && mag[k] > mag[k + 2]) {
        peaks[k] = 1;
      }
    }

    // 3) Propagation et verrouillage des phases (Identity Phase Locking)
    const newPhaseAcc = new Float32Array(numBins);
    let lastPeakBin = -1;

    for (let k = 0; k < numBins; k++) {
      if (peaks[k]) lastPeakBin = k;
      
      if (lastPeakBin === -1 || mag[k] === 0) {
        // Mode natif classique si aucun pic n'est encore détecté
        let deltaPh = phase[k] - lastPhase[k];
        let expectedDelta = (2 * Math.PI * anaHop * k) / fftSize;
        let diff = deltaPh - expectedDelta;
        diff = Math.atan2(Math.sin(diff), Math.cos(diff));
        let trueFreq = expectedDelta + diff;
        phaseAcc[k] += trueFreq * factor;
        newPhaseAcc[k] = phaseAcc[k];
      } else {
        // Verrouillage de phase basé sur le pic dominant (Identity Phase Locking)
        const p = lastPeakBin;
        if (k === p) {
          let deltaPh = phase[p] - lastPhase[p];
          let expectedDelta = (2 * Math.PI * anaHop * p) / fftSize;
          let diff = deltaPh - expectedDelta;
          diff = Math.atan2(Math.sin(diff), Math.cos(diff));
          let trueFreq = expectedDelta + diff;
          phaseAcc[p] += trueFreq * factor;
          newPhaseAcc[p] = phaseAcc[p];
        } else {
          // Les bins satellites conservent rigoureusement leur relation de phase originale vis-à-vis du pic
          const phaseDiffOriginale = phase[k] - phase[p];
          newPhaseAcc[k] = phaseAcc[p] + phaseDiffOriginale;
        }
      }
      lastPhase[k] = phase[k];
    }

    // Sauvegarde de l'état d'accumulation pour la frame suivante
    for (let k = 0; k < numBins; k++) phaseAcc[k] = newPhaseAcc[k];

    // 4) Reconstruction de la trame de synthèse fréquentielle
    for (let k = 0; k < numBins; k++) {
      re[k] = mag[k] * Math.cos(newPhaseAcc[k]);
      im[k] = mag[k] * Math.sin(newPhaseAcc[k]);
      if (k > 0 && k < numBins - 1) {
        re[fftSize - k] = re[k];
        im[fftSize - k] = -im[k];
      }
    }

    ifftInPlace(re, im);

    // 5) Overlap-Add
    for (let i = 0; i < fftSize; i++) {
      const idx = Math.floor(outPos) + i;
      output[idx] += re[i] * window[i];
      weight[idx] += window[i] * window[i];
    }

    inPos += anaHop;
    outPos += synHop;
  }

  // Normalisation
  for (let i = 0; i < outputLength; i++) {
    if (weight[i] > 1e-12) output[i] /= weight[i];
  }

  return output.subarray(0, outputLength);
}

// Helpers FFT in-place légers pour le Worker
function fftInPlace(re, im) {
  const N = re.length;
  for (let i = 1, j = 0; i < N; i++) {
    let bit = N >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
      t = im[i]; im[i] = im[j]; im[j] = t;
    }
  }
  for (let len = 2; len <= N; len <<= 1) {
    const ang = -2 * Math.PI / len, wR = Math.cos(ang), wI = Math.sin(ang);
    for (let i = 0; i < N; i += len) {
      let cR = 1, cI = 0;
      for (let k = 0; k < len >> 1; k++) {
        const h = i + k + (len >> 1);
        const vR = re[h] * cR - im[h] * cI, vI = re[h] * cI + im[h] * cR;
        re[h] = re[i + k] - vR; im[h] = im[i + k] - vI;
        re[i + k] += vR; im[i + k] += vI;
        const nR = cR * wR - cI * wI; cI = cR * wI + cI * wR; cR = nR;
      }
    }
  }
}

function ifftInPlace(re, im) {
  const N = re.length;
  for (let i = 0; i < N; i++) im[i] = -im[i];
  fftInPlace(re, im);
  for (let i = 0; i < N; i++) { re[i] /= N; im[i] /= N; }
}
`;

// Initialisation du Web Worker en tâche de fond
const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
const stretchWorker = new Worker(URL.createObjectURL(workerBlob));

// Restitution des variables globales de l'UI principale
const FFTN = 2048, NCOLS = 600;
let MFREQ = 8000;  
let stretchMode = 'oiseau'; // Mode par défaut

let actx, abuf, src, dur=0, speed=1, offset=0, t0=0;
let playing=false, showP=true, showNotes=true, busy=0, drawn=false, raf;
let currentPlayPos=0;  
let curve=[], spec=null, specFull=null;
let viewStart=0, viewEnd=0, looping=true;
let selX0=null, selX1=null, selecting=false, draggingPH=false, draggingPHWasPlaying=false;
let sliding=false, slideStartX=0, slideStartVS=0, slideStartVE=0;

// Système de cache intelligent indexé par le mode ET la vitesse
let stretchCache = {};
function clearStretchCache() { stretchCache = {}; }

const $ = id => document.getElementById(id);
const iz=$('iz'), ilbl=$('ilbl'), tip=$('tip'), sc=$('sc'), pc=$('pc'), ph=$('ph');
const flbl=$('flbl'), tlbl=$('tlbl'), em=$('em'), ov=$('ov'), ot=$('ot'), ob=$('ob');
const pb=$('pb'), rwb=$('rwb'), pi=$('pi'), pf=$('pf'), pr=$('pr'), td=$('td'), ptg=$('ptg'), ntg=$('ntg');
const pmin=$('pmin'), pmax=$('pmax');
const sel=$('sel'), selrd=$('selrd'), loopBtn=$('loopBtn');
const zoomBadge=$('zoomBadge'), zoomTxt=$('zoomTxt'), zoomExit=$('zoomExit');

// Écouteurs pour le changement de Mode
$('modeOiseau').addEventListener('click', () => changeMode('oiseau', 8000, 1000, 8000));
$('modeVoix').addEventListener('click', () => changeMode('voix', 4000, 150, 2500));
$('modeMusique').addEventListener('click', () => changeMode('musique', 5000, 80, 4200));

function changeMode(mode, mfreq, pMinVal, pMaxVal) {
  if (stretchMode === mode) return;
  stretchMode = mode;
  MFREQ = mfreq;
  pmin.value = pMinVal;
  pmax.value = pMaxVal;

  document.querySelectorAll('.mdb').forEach(b => b.classList.remove('on'));
  $('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('on');

  if (abuf) {
    if (playing) pause();
    analyze(++busy);
  }
}

// Détection automatique simple au chargement du fichier
function autoDetectMode() {
  if (!abuf) return;
  const sr = abuf.sampleRate;
  const data = monoMix(abuf);
  const win = hann(1024);
  const step = Math.floor(data.length / 5);
  let highEnergy = 0, totalEnergy = 0;

  for (let i = 0; i < 4; i++) {
    const start = i * step + 2000;
    const m = fftMag(data, start, 1024, win, 512);
    for (let b = 0; b < 512; b++) {
      const hz = (b / 512) * (sr / 2);
      totalEnergy += m[b];
      if (hz > 2500) highEnergy += m[b];
    }
  }

  if (highEnergy / (totalEnergy + 1e-9) > 0.35) {
    changeMode('oiseau', 8000, 1000, 8000);
  } else {
    changeMode('voix', 4000, 150, 2500);
  }
}

// Gestion des boutons de vitesse
document.querySelectorAll('.sb').forEach(btn => {
  btn.addEventListener('click', e => {
    document.querySelectorAll('.sb').forEach(b => b.classList.remove('on'));
    e.target.classList.add('on');
    speed = parseFloat(e.target.dataset.s);
    if (playing) {
      pause();
      play();
    }
  });
});

// ── OBTENTION DU AUDIO BUFFER PAR LE WEB WORKER (CACHE INTELLIGENT) ──────────
async function getPlayBuffer(spd) {
  const cacheKey = `${stretchMode}:${spd}`; // Résout le bug du cache croisé entre modes !
  if (stretchCache[cacheKey]) return stretchCache[cacheKey];

  if (spd === 1) {
    stretchCache[cacheKey] = abuf;
    return abuf;
  }

  return new Promise((resolve, reject) => {
    setOv(true, "Calcul de l'étirement…", 50);
    const monoSamples = monoMix(abuf);

    // Envoi au Worker en transférant le buffer sans copie mémoire !
    stretchWorker.postMessage({
      type: 'stretch',
      mode: stretchMode,
      samples: monoSamples.buffer,
      sampleRate: abuf.sampleRate,
      factor: 1 / spd
    }, [monoSamples.buffer]);

    stretchWorker.onmessage = function(e) {
      if (e.data.type === 'done') {
        const outSamples = new Float32Array(e.data.buffer);
        
        // Reconstruction d'un AudioBuffer standard pour la Web Audio API
        const newBuf = actx.createBuffer(1, outSamples.length, abuf.sampleRate);
        newBuf.copyToChannel(outSamples, 0);

        stretchCache[cacheKey] = newBuf;
        setOv(false);
        resolve(newBuf);
      }
    };

    stretchWorker.onerror = function(err) {
      setOv(false);
      reject(err);
    };
  });
}

// ── ARCHITECTURE PLAY / PAUSE LOGIQUE ────────────────────────────────────────
async function play() {
  if (playing || !abuf) return;
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') await actx.resume();

  try {
    // Le calcul se fait à la demande lors du Play (zéro temps d'attente à l'import !)
    const activeBuffer = await getPlayBuffer(speed);
    
    src = actx.createBufferSource();
    src.buffer = activeBuffer;
    src.connect(actx.destination);

    // Ajustement des temps selon le facteur d'étirement en cours
    const currentDur = activeBuffer.duration;
    const ratio = currentDur / dur;

    let startPos = offset * ratio;
    if (startPos >= currentDur) startPos = viewStart * ratio;

    src.loop = looping;
    if (looping) {
      src.loopStart = viewStart * ratio;
      src.loopEnd = viewEnd * ratio;
    }

    t0 = actx.currentTime - (startPos / speed);
    src.start(0, startPos);
    playing = true;
    pi.innerHTML = '<path d="M4,2 h3 v12 h-3 z M9,2 h3 v12 h-3 z"/>'; // Icône Pause
    loop();
  } catch (e) {
    console.error("Erreur de lecture :", e);
  }
}

function pause() {
  if (!playing) return;
  playing = false;
  cancelAnimationFrame(raf);
  try { src.stop(); } catch(e){}
  pi.innerHTML = '<polygon points="4,2 14,8 4,14"/>'; // Icône Play
  // Resynchronise l'offset global réel
  offset = currentPlayPos; 
}

function stopAll() {
  pause();
  abuf = null;
  dur = 0;
  offset = 0;
  clearStretchCache();
  pb.disabled = true; rwb.disabled = true;
}

function loop() {
  if (!playing || !abuf) return;
  
  // Calcul précis du curseur temporel à la milliseconde
  const ratio = src.buffer.duration / dur;
  let elapsed = (actx.currentTime - t0) * speed / ratio;

  if (looping) {
    const wLen = viewEnd - viewStart;
    if (elapsed >= viewEnd) {
      t0 += wLen / speed * ratio;
      elapsed = viewStart + ((elapsed - viewStart) % wLen);
    }
    currentPlayPos = elapsed;
  } else {
    currentPlayPos = elapsed;
    if (currentPlayPos >= viewEnd) {
      pause();
      currentPlayPos = viewEnd;
      drawPlayhead(currentPlayPos);
      return;
    }
  }

  drawPlayhead(currentPlayPos);
  raf = requestAnimationFrame(loop);
}

function drawPlayhead(t) {
  if (!drawn) return;
  const pctx = pc.getContext('2d');
  pctx.clearRect(0, 0, pc.width, pc.height);

  const viewLen = viewEnd - viewStart;
  if (viewLen <= 0) return;

  const r = (t - viewStart) / viewLen;
  if (r >= 0 && r <= 1) {
    const x = r * pc.width;
    ph.style.left = x + 'px';
    ph.style.display = 'block';
  } else {
    ph.style.display = 'none';
  }

  // Barre de progression basse
  const totalRatio = (t - viewStart) / viewLen;
  pf.style.width = Math.min(100, Math.max(0, totalRatio * 100)) + '%';
  td.textContent = fmt(t) + ' / ' + fmt(viewEnd);
}

// ── SYSTEME DE ZOOM ET DES COUPLAGES GRAPHIQUES RESTANTS ─────────────────────
let isZoomed = false;
function setZoomBadge(on) {
  isZoomed = on;
  zoomBadge.classList.toggle('on', on);
  sc.parentElement.classList.toggle('zoomed', on);
  if (on) zoomTxt.textContent = `Zoom : ${fmt(viewStart)} – ${fmt(viewEnd)}`;
}

// Interaction de glissement sur l'axe temporel (Zoom par drag)
let startX = 0;
sc.parentElement.addEventListener('mousedown', e => {
  if (!abuf || e.target === ph) return;
  selecting = true;
  startX = e.offsetX;
  sel.style.left = startX + 'px';
  sel.style.width = '0px';
  sel.style.display = 'block';
});

window.addEventListener('mousemove', e => {
  if (!selecting) return;
  const rect = sc.getBoundingClientRect();
  let curX = e.clientX - rect.left;
  curX = Math.min(rect.width, Math.max(0, curX));

  const x0 = Math.min(startX, curX);
  const w = Math.abs(startX - curX);
  sel.style.left = x0 + 'px';
  sel.style.width = w + 'px';
});

window.addEventListener('mouseup', e => {
  if (!selecting) return;
  selecting = false;
  sel.style.display = 'none';

  const rect = sc.getBoundingClientRect();
  let endX = e.clientX - rect.left;
  endX = Math.min(rect.width, Math.max(0, endX));

  const w = Math.abs(startX - endX);
  if (w > 15) { // Seuil minimal de zoom
    const r0 = Math.min(startX, endX) / rect.width;
    const r1 = Math.max(startX, endX) / rect.width;
    const currentLen = viewEnd - viewStart;

    const nextVS = viewStart + r0 * currentLen;
    const nextVE = viewStart + r1 * currentLen;

    if (nextVE - nextVS > 0.2) { // Zoom max à 200ms
      viewStart = nextVS;
      viewEnd = nextVE;
      offset = viewStart;
      setZoomBadge(true);
      if (playing) pause();
      analyze(++busy);
    }
  } else {
    // Un simple clic déplace la tête de lecture
    const clickRatio = Math.min(rect.width, Math.max(0, startX)) / rect.width;
    offset = viewStart + clickRatio * (viewEnd - viewStart);
    currentPlayPos = offset;
    drawPlayhead(offset);
    if (playing) {
      pause();
      play();
    }
  }
});

$('zoomExit').addEventListener('click', () => {
  viewStart = 0; viewEnd = dur; offset = 0;
  setZoomBadge(false);
  if (playing) pause();
  analyze(++busy);
});

loopBtn.addEventListener('click', () => {
  looping = !looping;
  loopBtn.classList.toggle('on', looping);
  if (playing) {
    pause();
    play();
  }
});

pb.addEventListener('click', () => { if (playing) pause(); else play(); });
rwb.addEventListener('click', () => {
  offset = viewStart;
  currentPlayPos = offset;
  drawPlayhead(offset);
  if (playing) { pause(); play(); }
});

// Barre de défilement manuelle (Input range)
$('pr').addEventListener('input', e => {
  if (!abuf) return;
  const r = parseInt(e.target.value) / 1000;
  offset = viewStart + r * (viewEnd - viewStart);
  currentPlayPos = offset;
  drawPlayhead(offset);
});

$('pr').addEventListener('change', () => {
  if (playing) { pause(); play(); }
});

// ── IMPORTATION ET ANALYSE ASYNC DU FICHIER ENTIER ───────────────────────────
$('fi').addEventListener('change', e => { const f=e.target.files[0]; if(f) load(f); });

async function load(source){
  const job = ++busy;
  tip.style.display='none';
  setOv(true,'Décodage…',5);
  stopAll();

  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  let bytes, name;
  if(source instanceof File){
    name = source.name;
    try { bytes = await source.arrayBuffer(); }
    catch(e){ if(job!==busy)return; setOv(false); return fail(source); }
  } else {
    bytes = source; name = 'enregistrement.m4a';
  }
  if(job!==busy) return;

  setOv(true,'Décodage audio…',15);
  try { abuf = await actx.decodeAudioData(bytes.slice(0)); } catch(e){
    if(job!==busy)return; setOv(false); return;
  }
  if(job!==busy) return;

  dur = abuf.duration;
  viewStart = 0; viewEnd = dur; offset = 0;
  setZoomBadge(false);

  autoDetectMode();

  ilbl.textContent = name;
  iz.classList.add('has');
  em.style.display='none';
  pb.disabled=false; rwb.disabled=false;

  await analyze(job);
}

async function analyze(job){
  drawn=false;
  setOv(true,'Analyse…',30);
  await tick(10);

  const W = sc.parentElement.clientWidth||320;
  const H = sc.parentElement.clientHeight||200;
  sc.width=W; sc.height=H; pc.width=W; pc.height=H;

  const sr   = abuf.sampleRate;
  const data = monoMix(abuf);
  const total= data.length;
  const bins = FFTN/2;
  const maxBin = Math.min(bins-1, Math.floor(MFREQ/(sr/2)*bins));
  const cols = Math.min(NCOLS, W*2);
  const win  = hann(FFTN);
  const out  = new Float32Array(cols*maxBin);
  let gMax=0;

  const vs = Math.floor(viewStart * sr);
  const ve = Math.min(total, Math.floor(viewEnd * sr));
  const span = Math.max(FFTN+1, ve - vs);

  const STEP=24; // Augmenté pour accélérer le tracé graphique UI
  for(let ci=0; ci<cols; ci+=STEP){
    if(job!==busy) return setOv(false);
    const end=Math.min(ci+STEP,cols);
    for(let c=ci;c<end;c++){
      const start=vs + Math.floor(c/cols*(span-FFTN));
      const m=fftMag(data,start,FFTN,win,maxBin);
      const off=c*maxBin;
      for(let b=0;b<maxBin;b++){ out[off+b]=m[b]; if(m[b]>gMax)gMax=m[b]; }
    }
    setOv(true,'Analyse…', 30+Math.round(ci/cols*65));
    await tick(1);
  }
  if(job!==busy) return setOv(false);

  spec={out,cols,maxBin,gMax};
  try{
    drawSpec(W,H);
    makeCurve();
    drawCurve(H);
    freqLabels();
    timeLabels();
  }catch(err){ console.error(err); }
  
  drawn=true;
  ph.style.display='block';
  drawPlayhead(offset);
  setOv(false);
}

function monoMix(buf){
  if(buf.numberOfChannels===1) return buf.getChannelData(0);
  const a=buf.getChannelData(0), b=buf.getChannelData(1), o=new Float32Array(a.length);
  for(let i=0;i<a.length;i++) o[i]=(a[i]+b[i])*0.5;
  return o;
}

function fftMag(data,start,N,win,maxBin){
  const re=new Float32Array(N), im=new Float32Array(N);
  for(let i=0;i<N;i++) re[i]=(data[start+i]||0)*win[i];
  for(let i=1,j=0;i<N;i++){let bit=N>>1;for(;j&bit;bit>>=1)j^=bit;j^=bit;if(i<j){const t=re[i];re[i]=re[j];re[j]=t;}}
  for(let len=2;len<=N;len<<=1){
    const ang=-2*Math.PI/len, wR=Math.cos(ang), wI=Math.sin(ang);
    for(let i=0;i<N;i+=len){
      let cR=1,cI=0;
      for(let k=0;k<len>>1;k++){
        const h=i+k+(len>>1), vR=re[h]*cR-im[h]*cI, vI=re[h]*cI+im[h]*cR;
        re[h]=re[i+k]-vR; im[h]=im[i+k]-vI; re[i+k]+=vR; im[i+k]+=vI;
        const nR=cR*wR-cI*wI; cI=cR*wI+cI*wR; cR=nR;
      }
    }
  }
  const mag=new Float32Array(maxBin);
  for(let i=0;i<maxBin;i++) mag[i]=Math.sqrt(re[i]*re[i]+im[i]*im[i]);
  return mag;
}

function hann(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=0.5*(1-Math.cos(2*Math.PI*i/(N-1)));return w;}
function hzToY(hz, H){ return (1 - hz/MFREQ) * H; }
function yToHz(y, H){ return (1 - y/H) * MFREQ; }

function drawSpec(W,H){
  const {out,cols,maxBin,gMax}=spec;
  const ctx=sc.getContext('2d'), img=ctx.createImageData(W,H), px=img.data;
  for(let x=0;x<W;x++){
    const ci=Math.min(Math.floor(x/W*cols),cols-1), off=ci*maxBin;
    for(let y=0;y<H;y++){
      const hz = yToHz(y, H);
      const binF = hz/MFREQ*maxBin;
      const b0 = Math.floor(binF);
      const b1 = Math.min(b0+1, maxBin-1);
      const t  = binF - b0;
      const val = (out[off+b0]||0)*(1-t) + (out[off+b1]||0)*t;
      const [r,g,b]=color(val/(gMax||1));
      const i=(y*W+x)*4; px[i]=r;px[i+1]=g;px[i+2]=b;px[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

function makeCurve(){
  const {out,cols,maxBin,gMax}=spec;
  const p1=parseInt(pmin.value)||1000, p2=parseInt(pmax.value)||8000;
  const b1=Math.floor(p1/MFREQ*maxBin), b2=Math.ceil(p2/MFREQ*maxBin);
  curve=[];
  for(let c=0;c<cols;c++){
    const off=c*maxBin; let mv=0,pk=-1;
    for(let b=b1;b<=Math.min(b2,maxBin-1);b++){if(out[off+b]>mv){mv=out[off+b];pk=b;}}
    curve.push(pk>=0&&mv>gMax*0.04 ? {t:c/cols,hz:pk/maxBin*MFREQ} : null);
  }
}

function drawCurve(H){
  const ctx=pc.getContext('2d'), W=pc.width;
  if(!showP||!curve.length) return;
  ctx.fillStyle='rgb(255,80,80)';
  for(const pt of curve){
    if(!pt) continue;
    ctx.fillRect(pt.t*W - 1, hzToY(pt.hz,H) - 1, 2.5, 2.5);
  }
}

function color(v){
  v=Math.max(0,Math.min(1,v));
  // Palette Sonore Émeraude/Sombre
  return [Math.round(v*126), Math.round(v*207), Math.round(v*110)];
}

function freqLabels(){
  flbl.innerHTML='';
  const steps=4;
  for(let i=0;i<=steps;i++){
    const f=Math.round(i/steps*MFREQ);
    const y=hzToY(f,sc.height);
    const s=document.createElement('span'); s.textContent=f+'Hz'; s.style.top=y+'px';
    flbl.appendChild(s);
  }
}

function timeLabels(){
  tlbl.innerHTML='';
  const span=viewEnd-viewStart;
  const steps=3;
  for(let i=0;i<=steps;i++){
    const t=viewStart+i/steps*span;
    const s=document.createElement('span'); s.textContent=fmt(t);
    tlbl.appendChild(s);
  }
}

function fmt(s){ s=Math.max(0,s||0); return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function setOv(on,txt,pct){ ov.classList.toggle('on',on); if(txt!==undefined)ot.textContent=txt; if(pct!==undefined)ob.style.width=pct+'%'; }
function tick(ms){ return new Promise(r=>setTimeout(r,ms||0)); }

ptg.addEventListener('click', ()=>{ showP=!showP; ptg.classList.toggle('on',showP); drawPlayhead(currentPlayPos); });
ntg.addEventListener('click', ()=>{ showNotes=!showNotes; ntg.classList.toggle('on',showNotes); drawPlayhead(currentPlayPos); });
[pmin,pmax].forEach(i=>i.addEventListener('change', ()=>{ if(abuf){ makeCurve(); drawPlayhead(currentPlayPos); } }));
</script>
