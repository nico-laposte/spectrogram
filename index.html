loopBtn.addEventListener('click',()=>{

    offset = currentPlayPos;
    t0 = actx.currentTime;
  }
});
function exitZoom(){
  if(!abuf) return;
  const winLen = viewEnd - viewStart;
  let currentPos;
  if(playing){
    // currentPlayPos est maintenu à jour par loop() — position exacte même en boucle
    currentPos = Math.min(viewEnd, Math.max(viewStart, currentPlayPos));
  } else { currentPos = offset; }
  const w=playing; if(w) pause();
  viewStart=0; viewEnd=dur;
  offset = currentPos;
  setZoomBadge(false);
  clearStretchCache();
  ph.style.display='none';
  const job=busy;
  analyze(job).then(()=>{
    if(job!==busy) return;
    const winLen = viewEnd - viewStart;
    const r = winLen>0 ? (offset - viewStart)/winLen : 0;
    pf.style.width=(r*100)+'%'; pr.value=Math.round(r*1000);
    td.textContent=fmt(offset)+' / '+fmt(viewEnd);
    ph.style.display='block';
    drawPlayhead(offset);
    if(w) play();
  });
}

// ── PIANO ─────────────────────────────────────────────────────────────────
// 2 octaves de F3 à E5 : MIDI 53 → 88 (inclus)
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK_CHROMA = new Set([1,3,6,8,10]); // C#,D#,F#,G#,A#
const PIANO_START = 55; // G3
const PIANO_END   = 76; // E5
const PIANO_MIDI  = [];
for(let m=PIANO_START; m<=PIANO_END; m++) PIANO_MIDI.push(m);

// Construire le clavier dans #piano
(function buildPiano(){
  const wrap = document.getElementById('piano');
  const whites = PIANO_MIDI.filter(m=>!BLACK_CHROMA.has(m%12));
  const totalW = whites.length;
  const wPct = 100/totalW;
  const whiteIdx = {};
  let wi=0;
  for(const m of PIANO_MIDI){
    if(!BLACK_CHROMA.has(m%12)){ whiteIdx[m]=wi; wi++; }
  }
  for(const m of PIANO_MIDI){
    const isBlack = BLACK_CHROMA.has(m%12);
    const btn = document.createElement('button');
    btn.className = 'pk ' + (isBlack ? 'b' : 'w');
    btn.dataset.midi   = m;
    btn.dataset.chroma = m%12;
    if(!isBlack){
      const idx = whiteIdx[m];
      btn.style.left  = (idx*wPct)+'%';
      btn.style.width = wPct+'%';
      // Label sur les do
      if(m%12===0){
        const oct = Math.floor(m/12)-1;
        const lbl = document.createElement('span');
        lbl.className='pk-lbl';
        lbl.textContent='C'+oct;
        btn.appendChild(lbl);
      }
    } else {
      let prevWhite = m-1;
      while(prevWhite>=PIANO_START && BLACK_CHROMA.has(prevWhite%12)) prevWhite--;
      const idx = whiteIdx[prevWhite] ?? 0;
      btn.style.left  = ((idx+1)*wPct - wPct*0.3)+'%';
      btn.style.width = (wPct*0.6)+'%';
    }
    wrap.appendChild(btn);
  }
})();

// ── Son piano via AudioContext + oscillateur ─────────────────────────────
let pianoOsc = null;
let pianoOsc2 = null;
let pianoOsc3 = null;

function playPianoNote(midi){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  actx.resume();
  // Débloquer le mode silencieux iOS — même mécanisme que play()
  if(iosAudio.paused){
    iosAudio.src = SILENT_WAV_URL;
    iosAudio.loop = true;
    iosAudio.volume = 0;
    iosAudio.play().catch(()=>{});
  }
  try{
    const b=actx.createBuffer(1,1,actx.sampleRate);
    const s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); s.start(0);
  }catch(e){}
  // Stopper les oscillateurs précédents
  [pianoOsc, pianoOsc2, pianoOsc3].forEach(o=>{ if(o){ try{ o.stop(); }catch(e){} } });
  pianoOsc=pianoOsc2=pianoOsc3=null;

  const hz  = 440*Math.pow(2,(midi-69)/12);
  const now = (actx.currentTime||0)+0.05;

  // Enveloppe commune : attaque 8ms, déclin naturel sur 2.5s
  function makeVoice(freq, gain){
    const osc = actx.createOscillator();
    const env = actx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(gain, now+0.008);   // attaque rapide
    env.gain.exponentialRampToValueAtTime(gain*0.3, now+0.3);  // déclin initial
    env.gain.exponentialRampToValueAtTime(0.0001, now+2.5);    // extinction sur 2.5s
    osc.connect(env); env.connect(actx.destination);
    osc.start(now); osc.stop(now+2.6);
    return osc;
  }

  pianoOsc  = makeVoice(hz,       0.20);  // fondamentale
  pianoOsc2 = makeVoice(hz*2,     0.08);  // 2e harmonique
  pianoOsc3 = makeVoice(hz*3,     0.04);  // 3e harmonique
}
let pianoNote = null;  // chroma actif (0-11) ou null

// ── Canvas highlight ───────────────────────────────────────────────────────
const hc = document.getElementById('hc');

function drawHighlight(){
  hc.width=sc.width; hc.height=sc.height;
  const W=hc.width, H=hc.height;
  const ctx=hc.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(pianoNote===null || !drawn) return;
  ctx.fillStyle='rgba(240,200,74,.5)';
  if(stretchMode==='musique'){
    for(const frame of curveMusic){
      for(const n of frame.notes){
        if(((n.midi%12)+12)%12===pianoNote){
          ctx.beginPath(); ctx.arc(frame.t*W, hzToY(n.hz,H), 5,0,6.283); ctx.fill();
        }
      }
    }
  } else {
    for(const p of curve){
      if(!p) continue;
      const note=hzToNote(p.hz);
      if(note && ((note.midi%12)+12)%12===pianoNote){
        ctx.beginPath(); ctx.arc(p.t*W, hzToY(p.hz,H), 5,0,6.283); ctx.fill();
      }
    }
  }
}

function highlightNote(chroma, pressedEl){
  pianoNote=chroma;
  drawHighlight();
  document.querySelectorAll('.pk').forEach(k=> k.classList.remove('active'));
  if(pressedEl) pressedEl.classList.add('active');
}

// ── Interactions piano ─────────────────────────────────────────────────────
const pianoEl = document.getElementById('piano');

function pianoKeyAtPoint(clientX, clientY){
  const keys = pianoEl.querySelectorAll('.pk');
  let best = null, bestDist = Infinity;
  for(const k of keys){
    const r = k.getBoundingClientRect();
    if(clientX >= r.left-4 && clientX <= r.right+4 &&
       clientY >= r.top-4  && clientY <= r.bottom+4){
      const isBlack = k.classList.contains('b');
      const cx = (r.left+r.right)/2, cy = (r.top+r.bottom)/2;
      const dist = Math.hypot(clientX-cx, clientY-cy) - (isBlack ? 20 : 0);
      if(dist < bestDist){ bestDist=dist; best=k; }
    }
  }
  return best;
}

// Cache des positions des touches — recalculé à chaque touchstart
// pour éviter getBoundingClientRect() en boucle pendant touchmove
let _pianoKeyCache = null;
function buildPianoCache(){
  _pianoKeyCache = Array.from(pianoEl.querySelectorAll('.pk')).map(k=>({
    el: k,
    r: k.getBoundingClientRect(),
    isBlack: k.classList.contains('b'),
    midi: parseInt(k.dataset.midi),
    chroma: parseInt(k.dataset.chroma),
  }));
}
function pianoKeyFromCache(clientX, clientY){
  if(!_pianoKeyCache) return null;
  let best = null, bestDist = Infinity;
  for(const k of _pianoKeyCache){
    const r = k.r;
    if(clientX >= r.left-4 && clientX <= r.right+4 &&
       clientY >= r.top-4  && clientY <= r.bottom+4){
      const cx = (r.left+r.right)/2, cy = (r.top+r.bottom)/2;
      const dist = Math.hypot(clientX-cx, clientY-cy) - (k.isBlack ? 20 : 0);
      if(dist < bestDist){ bestDist=dist; best=k; }
    }
  }
  return best;
}

function pianoPress(e){
  if(!abuf) return;
  e.preventDefault();
  buildPianoCache();
  const t=e.touches ? e.changedTouches[0] : e;
  const k = pianoKeyFromCache(t.clientX, t.clientY);
  if(!k) return;
  _lastSlideMidi = k.midi;
  requestAnimationFrame(()=>{ highlightNote(k.chroma, k.el); });

  // Débloquer iOS si nécessaire, puis jouer
  if(iosAudio.paused){
    iosAudio.src = SILENT_WAV_URL;
    iosAudio.loop = true;
    iosAudio.volume = 0;
    const onPlay = ()=>{
      iosAudio.removeEventListener('play', onPlay);
      playPianoNote(k.midi);
    };
    iosAudio.addEventListener('play', onPlay);
    iosAudio.play().catch(()=>{ playPianoNote(k.midi); });
  } else {
    playPianoNote(k.midi);
  }
}

let _lastSlideMidi = null;

function pianoSlide(e){
  if(!abuf) return;
  e.preventDefault();
  const t=e.touches ? e.changedTouches[0] : e;
  const k = pianoKeyFromCache(t.clientX, t.clientY);
  if(!k || k.midi === _lastSlideMidi) return;
  _lastSlideMidi = k.midi;
  playPianoNote(k.midi);
  requestAnimationFrame(()=>{ highlightNote(k.chroma, k.el); });
}

function pianoRelease(e){
  _lastSlideMidi = null;
  // Maintenir la couleur au moins 120ms pour les taps brefs
  setTimeout(()=>{ highlightNote(null, null); }, 120);
}

pianoEl.addEventListener('mousedown',  pianoPress);
pianoEl.addEventListener('mousemove',  pianoSlide);
pianoEl.addEventListener('mouseup',    pianoRelease);
pianoEl.addEventListener('mouseleave', pianoRelease);
pianoEl.addEventListener('touchstart', pianoPress,   {passive:false});
pianoEl.addEventListener('touchmove',  pianoSlide,   {passive:false});
pianoEl.addEventListener('touchend',   pianoRelease, {passive:false});
pianoEl.addEventListener('touchcancel',pianoRelease, {passive:false});
</script>
</body>
